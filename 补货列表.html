    var SF_REPLENISH_PARENT_LIST_KEY = 'sf_replenish_parent_list_v1';
    function rlDefaultParentList() {
      return [
        { code: 'LFT00002261', asin: 'B083J69DSQ', album: '无', platform: 'Amazon', site: '美国', store: 'noorkie Inc-US', spu: 'ST18106', owner: '陈柏宏', days: '0/0' },
        { code: 'LFT00002260', asin: 'B09K799DH7', album: '无', platform: 'Amazon', site: '美国', store: 'STQWALKING_sandbox-US', spu: 'ST210808', owner: '黄国阳', days: '0/0' },
        { code: 'LFT00000784', asin: 'B07NV7QK7H', album: '无', platform: 'Amazon', site: '英国', store: 'STEP QUEEN INC-UK', spu: 'HK1839', owner: '黄利萍', days: '0/0' },
        { code: 'LFT00000783', asin: 'B0F8GGJ7LK', album: '无', platform: 'Amazon', site: '英国', store: 'STEP QUEEN INC-UK', spu: 'STK2527157', owner: '余滢', days: '0/0' },
        { code: 'LFT00000778', asin: 'B0F8GTKXQK', album: '无', platform: 'Amazon', site: '德国', store: 'STEP QUEEN INC-DE', spu: 'STK2527157', owner: '余滢', days: '0/0' },
        { code: 'LFT00000755', asin: 'B0GLNK47Y9', album: '无', platform: 'Amazon', site: '美国', store: 'STQ Inc-US', spu: 'WT82527258', owner: '黄利萍', days: '0/5' }
      ];
    }
    function rlLoadReplenishParentList() {
      try {
        var raw = localStorage.getItem(SF_REPLENISH_PARENT_LIST_KEY);
        if (raw) {
          var parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) return parsed;
        }
      } catch (e) {}
      var def = rlDefaultParentList();
      try {
        localStorage.setItem(SF_REPLENISH_PARENT_LIST_KEY, JSON.stringify(def));
      } catch (e2) {}

    function rlRenderTable() {
      var fullList = rlLoadReplenishParentList();
      var onlyAlertCb = document.getElementById('rl-only-alert');
      var list = (onlyAlertCb && onlyAlertCb.checked)
        ? fullList.filter(function(p) { return rlAlertsFor(p.code).length > 0; })
        : fullList;
      var tbody = document.getElementById('replenish-list-tbody');
      var tfoot = document.getElementById('replenish-list-tfoot');
      var totalEl = document.getElementById('replenish-total-label');
      tbody.innerHTML = '';
      if (totalEl) totalEl.textContent = '共 ' + list.length + ' 条';

      var ph = '<span class="cell-placeholder">—</span>';
      if (list.length === 0) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="18" style="text-align:center;padding:28px;color:#909399;">暂无父体数据。可在控制台或后续接入接口维护「补货列表」主数据。</td>';
        tbody.appendChild(tr);
        tfoot.innerHTML = '';
        return;
      }

      list.forEach(function(p) {
        var tr = document.createElement('tr');
        var daysCell = rlEsc(p.days || '');
        var alerts = rlAlertsFor(p.code);
        var alertCell = alerts.length
          ? '<span class="rl-alert-pill" data-code="' + rlEsc(p.code) + '">⚠ ' + alerts.length + '</span>'
          : '<span class="rl-alert-none">—</span>';
        tr.innerHTML =
          '<td><input type="checkbox" disabled /></td>' +
          '<td><a class="cell-link" href="./补货详情.html?code=' + encodeURIComponent(p.code) + '">' + rlEsc(p.code) + '</a></td>' +
          '<td>' + alertCell + '</td>' +
          '<td>' + rlEsc(p.asin) + '</td>' +
          '<td>' + rlEsc(p.album) + '</td>' +
          '<td>' + rlEsc(p.platform) + '</td>' +
          '<td>' + rlEsc(p.site) + '</td>' +
          '<td>' + rlEsc(p.store) + '</td>' +
          '<td>' + rlEsc(p.spu) + '</td>' +
          '<td>' + rlEsc(p.owner) + '</td>' +
          '<td>' + ph + '</td><td>' + ph + '</td><td>' + ph + '</td><td>' + ph + '</td><td>' + ph + '</td>' +
          '<td><span>' + daysCell + '</span><span class="cell-hint" title="说明">ⓘ</span></td>' +

    /* ===== 内嵌预警：悬浮速览 + 详情抽屉 ===== */
    var rlCurDrawerCode = null;

    function rlShowPop(pill) {
      var pop = document.getElementById('rl-alert-pop');
      var alerts = rlAlertsFor(pill.getAttribute('data-code'));
      if (!pop || !alerts.length) return;
      pop.innerHTML = '<div class="rl-pop-title">该父体活跃预警（' + alerts.length + '）</div>' +
        alerts.map(function(a) {
          return '<div class="rl-pop-item"><span class="rl-pop-dot"></span><div class="rl-pop-main">' +
            '<div class="rl-pop-model">' + rlEsc(a.model) + '</div>' +
            '<div class="rl-pop-sub">' + rlEsc(a.conclusion) + ' · ' + rlEsc(a.time) + '</div>' +
            '</div></div>';
        }).join('');
      pop.classList.add('show');
      var r = pill.getBoundingClientRect();
      var pr = pop.getBoundingClientRect();
      var left = Math.min(r.left, window.innerWidth - pr.width - 12);
      var top = r.bottom + 6;
      if (top + pr.height > window.innerHeight - 12) top = Math.max(12, r.top - pr.height - 6);
      pop.style.left = Math.max(12, left) + 'px';
      pop.style.top = top + 'px';
    }
    function rlHidePop() { var p = document.getElementById('rl-alert-pop'); if (p) p.classList.remove('show'); }

    function rlRenderDrawer() {
      var alerts = rlAlertsFor(rlCurDrawerCode);
      document.getElementById('rl-alert-drawer-title').textContent = '父体预警 · ' + rlCurDrawerCode;
      document.getElementById('rl-alert-drawer-sub').textContent = '共 ' + alerts.length + ' 条待处理';
      var body = document.getElementById('rl-alert-drawer-body');
      if (!alerts.length) {
        body.innerHTML = '<div class="rl-drawer-empty">该父体预警已全部处理 🎉</div>';
        return;
      }
      body.innerHTML = alerts.map(function(a) {
        var rows = (a.fields || []).map(function(f) {
          return '<div class="rl-field"><span class="k">' + rlEsc(f[0]) + '</span><span class="v">' + rlEsc(f[1]) + '</span></div>';
        }).join('');
        return '<div class="rl-alert-card">' +
          '<div class="rl-alert-card-head"><span class="rl-alert-tag">' + rlEsc(a.category) + '</span>' +
            '<span class="rl-alert-card-title">' + rlEsc(a.title || a.model) + '</span></div>' +
          '<div class="rl-field"><span class="k">预警内容</span><span class="v bold">' + rlEsc(a.conclusion) + '</span></div>' +
          rows +
          '<div class="rl-field"><span class="k">触发时间</span><span class="v">' + rlEsc(a.time) + '</span></div>' +
          '</div>';
      }).join('');
    }
    function rlOpenDrawer(code) {
      rlCurDrawerCode = code;
      rlRenderDrawer();
      document.getElementById('rl-alert-drawer-mask').classList.add('show');
      document.getElementById('rl-alert-drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function rlCloseDrawer() {
      document.getElementById('rl-alert-drawer').classList.remove('open');
      document.getElementById('rl-alert-drawer-mask').classList.remove('show');
      document.body.style.overflow = '';
    }
    function rlResolveAlert(id) {
      rlAlertState[rlCurDrawerCode] = rlAlertsFor(rlCurDrawerCode).filter(function(a) { return a.id !== id; });
      rlRenderDrawer();
      rlRenderTable();
    }

    function rlInitAlertUI() {
      var tbody = document.getElementById('replenish-list-tbody');
      tbody.addEventListener('mouseover', function(e) { var p = e.target.closest('.rl-alert-pill'); if (p) rlShowPop(p); });
      tbody.addEventListener('mouseout', function(e) { var p = e.target.closest('.rl-alert-pill'); if (p && !p.contains(e.relatedTarget)) rlHidePop(); });
      tbody.addEventListener('click', function(e) { var p = e.target.closest('.rl-alert-pill'); if (p) { rlHidePop(); rlOpenDrawer(p.getAttribute('data-code')); } });
      document.getElementById('rl-alert-drawer-body').addEventListener('click', function(e) {
        var b = e.target.closest('button[data-act]'); if (b) rlResolveAlert(b.getAttribute('data-id'));
      });
      document.getElementById('rl-alert-drawer-mask').addEventListener('click', rlCloseDrawer);
      document.getElementById('rl-alert-drawer-close').addEventListener('click', rlCloseDrawer);
      var only = document.getElementById('rl-only-alert');
      if (only) only.addEventListener('change', rlRenderTable);
      var outer = document.querySelector('.table-outer');
      if (outer) outer.addEventListener('scroll', rlHidePop);
      window.addEventListener('resize', rlHidePop);
    }

    rlRenderTable();
    rlInitAlertUI();

    window.addEventListener('pageshow', function() {
      rlRenderTable();
    });
    window.addEventListener('storage', function(e) {
      if (e.key === SF_REPLENISH_PARENT_LIST_KEY) rlRenderTable();
    });

    function initSidebarMenu() {
      var appLayout = document.querySelector('.app-layout');
      var backdrop = document.getElementById('sidebar-backdrop');
      var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
      var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
      var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
      var replenishPanel = document.getElementById('replenish-submenu');
      var protoPanel = document.getElementById('proto-submenu');
      var systemPanel = document.getElementById('system-submenu');
      if (!appLayout || !backdrop) return;

      function restorePrimaryCurrent() {
        document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
          el.classList.add('active');
        });
      }

      function closeAllSubmenus() {
        appLayout.classList.remove('submenu-open');
        if (replenishPanel) replenishPanel.classList.remove('open');
        if (protoPanel) protoPanel.classList.remove('open');
        if (systemPanel) systemPanel.classList.remove('open');
        if (replenishTrigger) replenishTrigger.classList.remove('active');
        if (protoTrigger) protoTrigger.classList.remove('active');
        if (systemTrigger) systemTrigger.classList.remove('active');
        restorePrimaryCurrent();
      }

      function bindToggle(trigger, panel) {
        if (!trigger || !panel) return;
        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          if (panel.classList.contains('open')) {
            closeAllSubmenus();
            return;
          }
          appLayout.classList.remove('submenu-open');
          if (replenishPanel) replenishPanel.classList.remove('open');
          if (protoPanel) protoPanel.classList.remove('open');
          if (systemPanel) systemPanel.classList.remove('open');
          if (replenishTrigger) replenishTrigger.classList.remove('active');
          if (protoTrigger) protoTrigger.classList.remove('active');
          if (systemTrigger) systemTrigger.classList.remove('active');
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.remove('active');
          });
          appLayout.classList.add('submenu-open');
          panel.classList.add('open');
          trigger.classList.add('active');
        });
      }

      bindToggle(replenishTrigger, replenishPanel);
      bindToggle(protoTrigger, protoPanel);
      bindToggle(systemTrigger, systemPanel);
      backdrop.addEventListener('click', closeAllSubmenus);
      document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
        a.addEventListener('click', closeAllSubmenus);
      });
      document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
        item.addEventListener('click', function(e) { e.preventDefault(); });
      });
    }

    initSidebarMenu();
  </script>
