<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>备货规则（新）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; }
    body { background-color: #f5f7fa; color: #303133; }
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #fff; border-right: 1px solid #e4e7ed; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04); }
    .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid #ebeef5; }
    .sidebar-brand h2 { font-size: 17px; font-weight: 600; color: #303133; display: flex; align-items: center; gap: 8px; }
    .brand-icon { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%); border-radius: 8px; font-size: 16px; flex-shrink: 0; }
    .sidebar-nav { padding: 8px 0; flex: 1; }
    .sidebar-section-title { padding: 16px 20px 8px; font-size: 12px; color: #909399; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .sidebar-item { display: flex; align-items: center; padding: 12px 20px; margin: 2px 8px; border-radius: 6px; color: #606266; text-decoration: none; font-size: 14px; transition: all 0.2s ease; cursor: pointer; gap: 10px; position: relative; }
    .sidebar-item:hover { background: #f0f7ff; color: #409eff; }
    .sidebar-item.active { background: #ecf5ff; color: #409eff; font-weight: 500; }
    .sidebar-item.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 24px; background: #409eff; border-radius: 0 3px 3px 0; }
    .item-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

    .main-content { flex: 1; margin-left: 220px; min-height: 100vh; }
    .page-tabs { display: flex; align-items: center; background: #fff; padding: 0 24px; border-bottom: 1px solid #ebeef5; }
    .page-tab { padding: 14px 20px; font-size: 15px; color: #409eff; font-weight: 500; border-bottom: 2px solid #409eff; }

    .panel { margin: 16px 20px; background: #fff; border-radius: 4px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); }
    .panel-body { padding: 20px; }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
    .filter-control { height: 32px; border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 10px; font-size: 13px; color: #606266; background: #fff; outline: none; }
    .filter-control:focus { border-color: #409eff; }
    .w-140 { width: 140px; }
    .w-220 { width: 220px; }
    .btn { height: 32px; border-radius: 4px; border: 1px solid #dcdfe6; padding: 0 14px; font-size: 13px; cursor: pointer; background: #fff; color: #606266; }
    .btn-primary { background: #409eff; color: #fff; border-color: #409eff; }
    .btn-primary:hover { background: #66b1ff; border-color: #66b1ff; }
    .btn + .btn { margin-left: 8px; }

    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .table-wrap { border: 1px solid #ebeef5; border-radius: 4px; overflow: hidden; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { border-bottom: 1px solid #ebeef5; padding: 10px 8px; text-align: center; font-size: 13px; color: #606266; }
    .data-table th { background: #f5f7fa; color: #303133; font-weight: 500; }
    .table-empty { text-align: center; padding: 56px 0; color: #c0c4cc; font-size: 13px; }

    /* ===== 弹窗 ===== */
    .modal-mask { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 1200; justify-content: center; align-items: flex-start; padding-top: 60px; }
    .modal-mask.show { display: flex; }
    .modal { width: 860px; max-width: 92vw; height: 66vh; background: #fff; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,.18); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #ebeef5; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 18px; font-weight: 600; color: #303133; }
    .modal-close { border: none; background: none; font-size: 22px; color: #909399; cursor: pointer; }
    .modal-body { flex: 1; overflow-y: auto; }
    .modal-table { width: 100%; border-collapse: collapse; }
    .modal-table th, .modal-table td { border-bottom: 1px solid #ebeef5; padding: 14px 20px; font-size: 14px; color: #606266; text-align: left; vertical-align: top; line-height: 1.6; }
    .modal-table th { background: #fafafa; color: #606266; font-weight: 500; position: sticky; top: 0; z-index: 1; }
    .modal-table td:first-child { font-weight: 500; color: #303133; white-space: nowrap; }
    .modal-table tbody tr { transition: background 0.15s; }
    .modal-table tbody tr:hover { background: #f5f7fa; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid #ebeef5; display: flex; justify-content: flex-end; }
    .link-add { color: #409eff; background: none; border: none; cursor: pointer; font-size: 13px; }

    /* ===== 右侧抽屉 ===== */
    .drawer-mask { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.35); z-index: 1100; }
    .drawer-mask.show { display: block; }
    .drawer { position: fixed; top: 0; right: -780px; width: 780px; max-width: 92vw; height: 100vh; background: #fff; z-index: 1200; display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0, 0, 0, 0.12); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid #ebeef5; flex-shrink: 0; }
    .drawer-header h3 { font-size: 17px; font-weight: 600; color: #303133; }
    .drawer-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #909399; cursor: pointer; border-radius: 4px; border: none; background: none; transition: all 0.2s; }
    .drawer-close:hover { color: #303133; background: #f5f7fa; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .drawer-footer { padding: 14px 28px; border-top: 1px solid #ebeef5; display: flex; justify-content: center; gap: 12px; flex-shrink: 0; }

    /* 抽屉表单 */
    .form-section { margin-bottom: 24px; }
    .form-section-header { display: flex; align-items: center; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #ebeef5; }
    .form-section-title { font-size: 15px; font-weight: 600; color: #303133; padding-left: 10px; border-left: 3px solid #409eff; }
    .cfg-row { display: flex; align-items: flex-start; margin-bottom: 16px; }
    .cfg-label { width: 110px; font-size: 14px; color: #606266; line-height: 32px; flex-shrink: 0; text-align: right; padding-right: 14px; }
    .cfg-label.required::before { content: "*"; color: #f56c6c; margin-right: 4px; }
    .cfg-field { flex: 1; }
    .cfg-input { width: 100%; height: 32px; border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 10px; font-size: 14px; color: #606266; outline: none; }
    .cfg-input:focus { border-color: #409eff; }
    .cfg-select { height: 32px; border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 10px; font-size: 14px; color: #606266; outline: none; background: #fff; }
    .cfg-select:focus { border-color: #409eff; }
    .cfg-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .cfg-switch input { opacity: 0; width: 0; height: 0; }
    .cfg-switch-slider { position: absolute; cursor: pointer; inset: 0; background: #dcdfe6; border-radius: 20px; transition: 0.3s; }
    .cfg-switch-slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .cfg-switch input:checked + .cfg-switch-slider { background: #409eff; }
    .cfg-switch input:checked + .cfg-switch-slider::before { transform: translateX(20px); }
    .cfg-switch-text { margin-left: 8px; font-size: 13px; color: #606266; }

    /* 抽屉内表格 */
    .cfg-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cfg-table th, .cfg-table td { border: 1px solid #ebeef5; padding: 8px 6px; text-align: center; color: #606266; }
    .cfg-table th { background: #f5f7fa; font-weight: 500; color: #303133; font-size: 12px; }
    .cfg-table input[type="number"], .cfg-table select { height: 28px; border: 1px solid #dcdfe6; border-radius: 3px; padding: 0 6px; font-size: 13px; color: #606266; text-align: center; outline: none; }
    .cfg-table input[type="number"]:focus, .cfg-table select:focus { border-color: #409eff; }

    /* 抽屉内子标题 */
    .sub-title { font-size: 13px; font-weight: 600; color: #409eff; margin: 16px 0 10px; padding-left: 8px; border-left: 2px solid #409eff; }
    .sub-title--orange { color: #e6a23c; border-left-color: #e6a23c; }
    .sub-title--green { color: #67c23a; border-left-color: #67c23a; }
    .sub-title--red { color: #f56c6c; border-left-color: #f56c6c; }
    .sub-title--gray { color: #909399; border-left-color: #909399; }

    .hint-text { font-size: 12px; color: #909399; margin-top: 6px; line-height: 1.6; }
    .formula-box { padding: 12px 16px; background: #ecf5ff; border-radius: 4px; border-left: 3px solid #409eff; margin: 12px 0; font-size: 12px; color: #606266; line-height: 1.8; }
    .formula-box strong { color: #409eff; }
    .formula-box .title { font-size: 13px; color: #409eff; font-weight: 600; margin-bottom: 6px; }
    .warn-box { padding: 12px 16px; background: #fdf6ec; border-radius: 4px; border-left: 3px solid #e6a23c; margin: 12px 0; font-size: 12px; color: #606266; line-height: 1.8; }
    .warn-box .title { font-size: 13px; color: #e6a23c; font-weight: 600; margin-bottom: 6px; }

    .btn-cancel { padding: 8px 20px; border: 1px solid #dcdfe6; border-radius: 4px; background: #fff; color: #606266; font-size: 14px; cursor: pointer; }
    .btn-cancel:hover { border-color: #409eff; color: #409eff; }
    .btn-save { padding: 8px 20px; border: none; border-radius: 4px; background: #409eff; color: #fff; font-size: 14px; cursor: pointer; }
    .btn-save:hover { background: #66b1ff; }
    .btn-small { height: 26px; padding: 0 10px; font-size: 12px; border-radius: 3px; border: 1px solid #dcdfe6; background: #fff; color: #606266; cursor: pointer; }
    .btn-small:hover { border-color: #409eff; color: #409eff; }
    .btn-small-primary { background: #409eff; color: #fff; border-color: #409eff; }
    .btn-small-primary:hover { background: #66b1ff; }
    .btn-del { border: none; background: none; color: #f56c6c; cursor: pointer; font-size: 14px; }
    .btn-del:hover { color: #f78989; }

    /* pill switch */
    .pill-toggle { position: relative; display: inline-flex; align-items: center; width: 60px; height: 24px; border-radius: 12px; cursor: pointer; user-select: none; transition: background 0.25s; }
    .pill-toggle.on { background: #409eff; }
    .pill-toggle.off { background: #dcdfe6; }
    .pill-toggle .pill-knob { position: absolute; top: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: left 0.25s; }
    .pill-toggle.on .pill-knob { left: 38px; }
    .pill-toggle.off .pill-knob { left: 2px; }
    .pill-toggle .pill-text { position: absolute; font-size: 11px; font-weight: 500; color: #fff; }
    .pill-toggle.on .pill-text { left: 8px; }
    .pill-toggle.off .pill-text { right: 6px; color: #909399; }

    /* settings block */
    .setting-block { background: #f5f7fa; border-radius: 4px; padding: 12px 16px; margin-bottom: 10px; }
    .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; color: #606266; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-row label { display: flex; align-items: center; cursor: pointer; gap: 6px; }
    .setting-row input[type="checkbox"] { accent-color: #409eff; width: 15px; height: 15px; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2><span class="brand-icon">📦</span><span>OMS</span></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-title">功能模块</div>
        <a class="sidebar-item" href="预测规则配置页面_v1.html"><span class="item-icon">📊</span><span>备货规则（旧）</span></a>
        <a class="sidebar-item active" href="备货规则新_v1.html"><span class="item-icon">🆕</span><span>备货规则（新）</span></a>
        <a class="sidebar-item" href="预警页面_v1.html"><span class="item-icon">⚠️</span><span>预警模型</span></a>
        <a class="sidebar-item" href="预警消息页面_v1.html"><span class="item-icon">📩</span><span>预警消息</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-tabs">
        <div class="page-tab">规则管理</div>
      </div>

      <div class="panel">
        <div class="panel-body">
          <div class="filter-bar">
            <select class="filter-control w-140"><option>备货模型</option><option>基础预测</option><option>备货规则</option><option>日销量规则</option><option>影响系数</option><option>销量修正/去噪</option></select>
            <select class="filter-control w-140"><option>状态</option><option>启用</option><option>停用</option></select>
            <input class="filter-control w-220" type="text" placeholder="规则名称关键词" />
            <button class="btn btn-primary">搜索</button>
            <button class="btn">重置</button>
          </div>

          <div class="action-bar">
            <button class="btn btn-primary" onclick="openCreateModal()">+ 新建规则</button>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:40px;"><input type="checkbox" onclick="toggleSelectAll(this)" /></th>
                  <th>规则名称</th>
                  <th>备货模型</th>
                  <th>规则说明</th>
                  <th>状态</th>
                  <th>创建时间</th>
                  <th>创建人</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rule-tbody"></tbody>
            </table>
            <div class="table-empty" id="table-empty">暂无规则数据，点击「新建规则」添加</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 选择模型弹窗 -->
  <div class="modal-mask" id="create-modal" onclick="onModalMaskClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新建备货规则</div>
        <button class="modal-close" onclick="closeCreateModal()">×</button>
      </div>
      <div class="modal-body">
        <table class="modal-table">
          <thead>
            <tr>
              <th style="width:160px;">备货模型</th>
              <th>模型说明</th>
              <th style="width:72px; text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="modal-tbody"></tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeCreateModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 抽屉遮罩 -->
  <div class="drawer-mask" id="drawer-mask" onclick="closeDrawer()"></div>

  <!-- 右侧抽屉（规则配置） -->
  <div class="drawer" id="drawer-config">
    <div class="drawer-header">
      <h3 id="drawer-title">规则配置</h3>
      <button class="drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body">
      <!-- 基本信息 -->
      <div class="form-section">
        <div class="form-section-header">
          <div class="form-section-title">基本信息</div>
        </div>
        <div class="cfg-row">
          <label class="cfg-label required">规则名称</label>
          <div class="cfg-field">
            <input type="text" class="cfg-input" id="cfg-rule-name" placeholder="请输入规则名称" />
          </div>
        </div>
        <div class="cfg-row">
          <label class="cfg-label">规则状态</label>
          <div class="cfg-field" style="display:flex;align-items:center;">
            <label class="cfg-switch">
              <input type="checkbox" id="cfg-rule-status" checked />
              <span class="cfg-switch-slider"></span>
            </label>
            <span class="cfg-switch-text" id="cfg-status-text">启用</span>
          </div>
        </div>
      </div>

      <!-- 动态规则配置区域 -->
      <div class="form-section" id="cfg-dynamic-area">
        <div class="form-section-header">
          <div class="form-section-title" id="cfg-section-title">规则配置</div>
        </div>
        <div id="cfg-form-content"></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn-cancel" onclick="closeDrawer()">取消</button>
      <button class="btn-save" onclick="saveRule()">保存</button>
    </div>
  </div>

  <script>
    /* ===== 模型数据 ===== */
    var STOCK_MODELS = [
      { name: "基础预测", desc: "按历史销量与预测算法生成基础销量预测，作为备货计算的核心输入。" },
      { name: "备货规则", desc: "综合采购时效、头程物流、安全库存等参数，计算最终建议补货量。" },
      { name: "日销量规则", desc: "配置不同周期的销量权重，生成加权日均销量用于备货预测。" },
      { name: "影响系数", desc: "引入季节、生命周期、促销等系数对预测销量进行动态调节。" },
      { name: "销量修正/去噪", desc: "对异常大单、缺货期销量等进行识别与修正，提升预测准确性。" }
    ];

    var savedRules = JSON.parse(localStorage.getItem('stock_rules_new') || '[]');
    var ruleIdCounter = parseInt(localStorage.getItem('stock_rule_id_counter') || '0');
    var currentEditId = null;
    var currentModelName = '';

    function persistRules() {
      localStorage.setItem('stock_rules_new', JSON.stringify(savedRules));
      localStorage.setItem('stock_rule_id_counter', String(ruleIdCounter));
    }

    function nowStr() {
      var d = new Date(), p = function(n) { return n < 10 ? '0' + n : '' + n; };
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    }

    /* ===== 弹窗 ===== */
    function openCreateModal() {
      document.getElementById('create-modal').classList.add('show');
      renderModalRows();
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('show');
    }
    function onModalMaskClick(e) {
      if (e.target === e.currentTarget) closeCreateModal();
    }

    function renderModalRows() {
      var tbody = document.getElementById('modal-tbody');
      tbody.innerHTML = '';
      STOCK_MODELS.forEach(function(m) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + m.name + '</td>' +
          '<td>' + m.desc + '</td>' +
          '<td style="text-align:center;"><button class="link-add" onclick="addRule(\'' + m.name + '\')">添加</button></td>';
        tbody.appendChild(tr);
      });
    }

    /* ===== 添加规则 → 打开抽屉 ===== */
    function addRule(modelName) {
      closeCreateModal();
      currentEditId = null;
      currentModelName = modelName;
      document.getElementById('drawer-title').textContent = modelName + ' - 新建规则';
      document.getElementById('cfg-rule-name').value = '';
      document.getElementById('cfg-rule-status').checked = true;
      document.getElementById('cfg-status-text').textContent = '启用';
      document.getElementById('cfg-section-title').textContent = modelName + ' 配置';
      renderModelForm(modelName, null);
      openDrawer();
    }

    function editRule(id) {
      var rule = savedRules.find(function(r) { return r.id === id; });
      if (!rule) return;
      currentEditId = id;
      currentModelName = rule.model;
      document.getElementById('drawer-title').textContent = rule.model + ' - 编辑规则';
      document.getElementById('cfg-rule-name').value = rule.name;
      document.getElementById('cfg-rule-status').checked = rule.status === '启用';
      document.getElementById('cfg-status-text').textContent = rule.status;
      document.getElementById('cfg-section-title').textContent = rule.model + ' 配置';
      renderModelForm(rule.model, rule.config);
      openDrawer();
    }

    /* ===== 抽屉开关 ===== */
    function openDrawer() {
      document.getElementById('drawer-mask').classList.add('show');
      document.getElementById('drawer-config').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawer-mask').classList.remove('show');
      document.getElementById('drawer-config').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ===== 状态开关联动 ===== */
    document.getElementById('cfg-rule-status').addEventListener('change', function() {
      document.getElementById('cfg-status-text').textContent = this.checked ? '启用' : '停用';
    });

    /* ===== 根据模型渲染不同的表单 ===== */
    function renderModelForm(modelName, config) {
      var container = document.getElementById('cfg-form-content');
      switch (modelName) {
        case '基础预测': container.innerHTML = renderBasicPredictionForm(config); break;
        case '备货规则': container.innerHTML = renderStockRuleForm(config); break;
        case '日销量规则': container.innerHTML = renderDailySalesForm(config); break;
        case '影响系数': container.innerHTML = renderCoefficientForm(config); break;
        case '销量修正/去噪': container.innerHTML = renderDenoiseForm(config); break;

      html += '<div class="sub-title sub-title--orange">③ 日销量断货去噪</div>';
      html += '<div class="setting-block">';
      html += '<div class="setting-row"><label><input type="checkbox" id="cfg-stockout-denoise"' + (c.stockoutEnabled?' checked':'') + '/> 启用断货去噪</label></div>';
      html += '<div class="hint-text" style="margin-top:4px;">修正后日销量 = 原日销量 × （预计销售天数 / （预计销售天数 - 断货天数））</div>';
      html += '</div>';

      html += '<div class="sub-title sub-title--red">④ 退货量去噪</div>';
      html += '<table class="cfg-table" id="cfg-return-table"><thead><tr><th style="width:40px;">序号</th><th>开始</th><th>结束</th><th>扣减比例(%)</th><th>说明</th><th style="width:50px;">操作</th></tr></thead><tbody>';
      if (c.returnRows && c.returnRows.length > 0) {
        c.returnRows.forEach(function(r, i) {
          html += renderReturnRow(i+1, r);
        });
      }
      html += '</tbody></table>';
      html += '<button class="btn-small btn-small-primary" style="margin-top:6px;" onclick="addReturnRowDrawer()">+ 添加</button>';
      return html;
    }

    function renderDateDenoiseRow(idx, r) {
      r = r || {type:'固定值去噪',start:'',end:'',val:''};
      return '<tr><td>' + idx + '</td>' +
        '<td><select style="height:26px;border:1px solid #dcdfe6;border-radius:3px;font-size:12px;padding:0 4px;">' +
        '<option' + (r.type==='固定值去噪'?' selected':'') + '>固定值去噪</option><option' + (r.type==='百分比去噪'?' selected':'') + '>百分比去噪</option></select></td>' +
        '<td><input type="date" value="' + r.start + '" style="width:110px;height:26px;border:1px solid #dcdfe6;border-radius:3px;padding:0 4px;font-size:12px;"/></td>' +
        '<td><input type="date" value="' + r.end + '" style="width:110px;height:26px;border:1px solid #dcdfe6;border-radius:3px;padding:0 4px;font-size:12px;"/></td>' +
        '<td><input type="number" value="' + r.val + '" style="width:65px;"/></td>' +
        '<td><button class="btn-del" onclick="this.closest(\'tr\').remove()">🗑️</button></td></tr>';
    }

    function renderReturnRow(idx, r) {
      r = r || {start:'',end:'',pct:'',note:''};
      return '<tr><td>' + idx + '</td>' +
        '<td><input type="date" value="' + r.start + '" style="width:110px;height:26px;border:1px solid #dcdfe6;border-radius:3px;padding:0 4px;font-size:12px;"/></td>' +
        '<td><input type="date" value="' + r.end + '" style="width:110px;height:26px;border:1px solid #dcdfe6;border-radius:3px;padding:0 4px;font-size:12px;"/></td>' +
        '<td><input type="number" value="' + r.pct + '" style="width:60px;"/> %</td>' +
        '<td><input type="text" value="' + (r.note||'') + '" placeholder="说明" style="width:100%;height:26px;border:1px solid #dcdfe6;border-radius:3px;padding:0 6px;font-size:12px;"/></td>' +
        '<td><button class="btn-del" onclick="this.closest(\'tr\').remove()">🗑️</button></td></tr>';
    }

    function addDateDenoiseRowDrawer() {
      var tbody = document.querySelector('#cfg-date-denoise-table tbody');
      var idx = tbody.rows.length + 1;
      var tr = document.createElement('tr');
      tr.innerHTML = renderDateDenoiseRow(idx, null).replace(/^<tr>|<\/tr>$/g, '');
      tbody.appendChild(tr);
    }

    function addReturnRowDrawer() {
      var tbody = document.querySelector('#cfg-return-table tbody');
      var idx = tbody.rows.length + 1;
      var tr = document.createElement('tr');
      tr.innerHTML = renderReturnRow(idx, null).replace(/^<tr>|<\/tr>$/g, '');
      tbody.appendChild(tr);
    }

    /* ===== 收集表单数据 ===== */
    function collectConfig() {
      switch (currentModelName) {
        case '基础预测': return collectBasicConfig();
        case '备货规则': return collectStockConfig();
        case '日销量规则': return collectDailySalesConfig();
        case '影响系数': return collectCoefficientConfig();
        case '销量修正/去噪': return collectDenoiseConfig();
        default: return {};
      }
    }

    function collectBasicConfig() {
      var weights = [];
      var rows = document.querySelectorAll('#cfg-weight-table tbody tr');
      rows.forEach(function(tr) {
        var sel = tr.querySelector('select');
        var inp = tr.querySelector('input[type="number"]');
        if (sel && inp) weights.push({ period: sel.value, weight: inp.value });
      });
      return {
        predType: document.getElementById('cfg-pred-type') ? document.getElementById('cfg-pred-type').value : 'weighted',
        weights: weights
      };
    }

    function collectStockConfig() {
      return {
        procFreq: val('cfg-proc-freq'), procLead: val('cfg-proc-lead'), procQc: val('cfg-proc-qc'), procPickup: val('cfg-proc-pickup'),
        fbaSafety: val('cfg-fba-safety'),
        naFreq: val('cfg-na-freq'), naFast: val('cfg-na-fast'), naSlow: val('cfg-na-slow'),
        euFreq: val('cfg-eu-freq'), euFast: val('cfg-eu-fast'), euSlow: val('cfg-eu-slow'),
        deductStock: chk('cfg-deduct-stock'), excludeOutage: chk('cfg-exclude-outage')
      };
    }

    function collectDailySalesConfig() {
      var keys = ['d3','d7','d14','d30','d60','d90'];
      var weights = {}, avgs = {};
      keys.forEach(function(k) {
        weights[k] = numVal('cfg-wt-' + k);
        avgs[k] = numVal('cfg-avg-' + k);
      });
      var promos = [];
      var rows = document.querySelectorAll('#cfg-promo-table tbody tr');
      rows.forEach(function(tr) {
        var inputs = tr.querySelectorAll('input');
        if (inputs.length >= 4) promos.push({ name: inputs[0].value, start: inputs[1].value, end: inputs[2].value, daily: inputs[3].value });
      });
      return { weights: weights, avgs: avgs, promos: promos };
    }

    function collectCoefficientConfig() {
      var season = [];
      for (var i = 0; i < 12; i++) season.push(numVal('cfg-season-' + i));
      return {
        season: season, seasonEnabled: true,
        yoyEnabled: true, yoyRows: collectTableRows('cfg-yoy-table', 'coeff'),
        lifecycleEnabled: true, lifecycleRows: collectTableRows('cfg-life-table', 'lifecycle'),
        competitorEnabled: true, competitorRows: collectTableRows('cfg-comp-table', 'coeff')
      };
    }

    function collectDenoiseConfig() {
      return {
        autoEnabled: chk('cfg-auto-denoise'), autoX: numVal('cfg-auto-x'), autoY: numVal('cfg-auto-y'),
        dateEnabled: true, dateRows: collectTableRows('cfg-date-denoise-table', 'dateDenoise'),
        stockoutEnabled: chk('cfg-stockout-denoise'),
        returnEnabled: true, returnRows: collectTableRows('cfg-return-table', 'return')
      };
    }

    function collectTableRows(tableId, type) {
      var rows = [];
      var trs = document.querySelectorAll('#' + tableId + ' tbody tr');
      trs.forEach(function(tr) {
        var inputs = tr.querySelectorAll('input');
        var selects = tr.querySelectorAll('select');
        if (type === 'coeff') {
          rows.push({ start: inputs[0]?inputs[0].value:'', end: inputs[1]?inputs[1].value:'', dir: selects[0]?selects[0].value:'up', val: inputs[2]?inputs[2].value:'1.0' });
        } else if (type === 'lifecycle') {
          rows.push({ type: selects[0]?selects[0].value:'次新品', start: inputs[0]?inputs[0].value:'', end: inputs[1]?inputs[1].value:'', val: inputs[2]?inputs[2].value:'1.0' });
        } else if (type === 'dateDenoise') {
          rows.push({ type: selects[0]?selects[0].value:'固定值去噪', start: inputs[0]?inputs[0].value:'', end: inputs[1]?inputs[1].value:'', val: inputs[2]?inputs[2].value:'' });
        } else if (type === 'return') {
          rows.push({ start: inputs[0]?inputs[0].value:'', end: inputs[1]?inputs[1].value:'', pct: inputs[2]?inputs[2].value:'', note: inputs[3]?inputs[3].value:'' });
        }
      });
      return rows;
    }

    function val(id) { var el = document.getElementById(id); return el ? el.value : ''; }
    function numVal(id) { var el = document.getElementById(id); return el ? parseFloat(el.value) || 0 : 0; }
    function chk(id) { var el = document.getElementById(id); return el ? el.checked : false; }

    /* ===== 保存规则 ===== */
    function saveRule() {
      var name = document.getElementById('cfg-rule-name').value.trim();
      if (!name) { alert('请输入规则名称'); return; }
      var status = document.getElementById('cfg-rule-status').checked ? '启用' : '停用';
      var config = collectConfig();
      var modelObj = STOCK_MODELS.find(function(m) { return m.name === currentModelName; });

      if (currentEditId !== null) {
        var rule = savedRules.find(function(r) { return r.id === currentEditId; });
        if (rule) {
          rule.name = name;
          rule.status = status;
          rule.config = config;
        }
      } else {
        ruleIdCounter++;
        savedRules.unshift({
          id: ruleIdCounter,
          name: name,
          model: currentModelName,
          desc: modelObj ? modelObj.desc : '',
          status: status,
          time: nowStr(),
          owner: '当前用户',
          config: config
        });
      }
      persistRules();
      renderRuleTable();
      closeDrawer();
    }

    /* ===== 数据表格 ===== */
    function renderRuleTable() {
      var tbody = document.getElementById('rule-tbody');
      var empty = document.getElementById('table-empty');
      tbody.innerHTML = '';
      if (savedRules.length === 0) { empty.style.display = ''; return; }
      empty.style.display = 'none';
      savedRules.forEach(function(r) {
        var tr = document.createElement('tr');
        var statusCls = r.status === '启用' ? 'on' : 'off';
        var statusText = r.status === '启用' ? '启用' : '停用';
        tr.innerHTML =
          '<td><input type="checkbox" /></td>' +
          '<td style="color:#409eff;cursor:pointer;" onclick="editRule(' + r.id + ')">' + r.name + '</td>' +
          '<td>' + r.model + '</td>' +
          '<td title="' + r.desc + '" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + r.desc + '</td>' +
          '<td><div class="pill-toggle ' + statusCls + '" onclick="onTableStatusToggle(' + r.id + ', this)"><span class="pill-text">' + statusText + '</span><span class="pill-knob"></span></div></td>' +
          '<td>' + r.time + '</td>' +
          '<td>' + r.owner + '</td>' +
          '<td><a href="#" style="color:#409eff;text-decoration:none;margin-right:10px;" onclick="editRule(' + r.id + ');return false;">编辑</a>' +
          '<a href="#" style="color:#f56c6c;text-decoration:none;" onclick="deleteRule(' + r.id + ');return false;">删除</a></td>';
        tbody.appendChild(tr);
      });
    }

    function onTableStatusToggle(id, el) {
      var rule = savedRules.find(function(r) { return r.id === id; });
      if (!rule) return;
      rule.status = rule.status === '启用' ? '停用' : '启用';
      persistRules();
      renderRuleTable();
    }

    function deleteRule(id) {
      if (!confirm('确定要删除此规则吗？')) return;
      savedRules = savedRules.filter(function(r) { return r.id !== id; });
      persistRules();
      renderRuleTable();
    }

    function toggleSelectAll(master) {
      document.querySelectorAll('#rule-tbody input[type="checkbox"]').forEach(function(cb) { cb.checked = master.checked; });
    }

    /* ===== ESC 关闭 ===== */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('drawer-config').classList.contains('open')) { closeDrawer(); return; }
        if (document.getElementById('create-modal').classList.contains('show')) { closeCreateModal(); return; }
      }
    });

    /* ===== 初始化 ===== */
    renderRuleTable();
  </script>
</body>
</html>
