    .sidebar-submenu-panel.open { transform: translateX(0); opacity: 1; pointer-events: auto; }
    .submenu-title { font-size: 24px; color: #111827; margin-bottom: 14px; }

    .page-wrap { padding: 16px 20px 24px; width: 100%; max-width: none; box-sizing: border-box; }
    #rd-root { width: 100%; min-width: 0; }
    .page-top-card { background: #fff; border-radius: 4px; border: 1px solid #ebeef5; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); margin-bottom: 12px; }
    .page-top-card-head { padding: 12px 20px 0; border-bottom: 1px solid #ebeef5; }
    .page-section-label { font-size: 14px; font-weight: 600; color: #303133; padding-bottom: 10px; }
    .tabs-strip { display: flex; align-items: flex-end; gap: 8px; padding-bottom: 0; }
    .tab-chip { display: inline-flex; align-items: center; padding: 8px 16px; font-size: 13px; color: #606266; border-radius: 4px 4px 0 0; border: 1px solid transparent; border-bottom: none; margin-bottom: -1px; background: transparent; cursor: default; }
    .tab-chip.active { color: #409eff; font-weight: 600; background: #fff; border-color: #ebeef5; border-bottom-color: #fff; }
    .tab-chip .tab-x, .tab-chip .tab-add { margin-left: 6px; font-size: 14px; color: #909399; }
    .tab-chip .tab-add { margin-left: 10px; font-weight: 600; }

    .rd-summary { background: #fff; border: 1px solid #ebeef5; border-radius: 4px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); padding: 20px 24px; margin-bottom: 12px; display: flex; gap: 24px; align-items: flex-start; }
    .rd-thumb { width: 96px; height: 96px; flex-shrink: 0; border-radius: 8px; background: #f0f2f5; border: 1px solid #ebeef5; display: flex; align-items: center; justify-content: center; color: #909399; font-size: 12px; text-align: center; line-height: 1.4; padding: 8px; }
    .rd-summary-main { flex: 1; min-width: 0; }

    .rd-title-row .rd-asin { font-weight: 500; color: #606266; margin-left: 10px; font-size: 16px; }
    .rd-title-row .rd-asin.muted { color: #c0c4cc; }
    .rd-meta-rows { display: flex; flex-direction: column; gap: 10px; }
    .rd-meta-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 28px; font-size: 13px; line-height: 1.6; }
    .rd-kv { display: inline-flex; align-items: baseline; gap: 6px; }
    .rd-kv .k { color: #909399; white-space: nowrap; }
    .rd-kv .v { color: #303133; }
    .rd-kv .v.muted { color: #c0c4cc; }

    .rd-nav-tabs { background: #fff; border: 1px solid #ebeef5; border-radius: 4px 4px 0 0; border-bottom: none; padding: 0 16px; display: flex; gap: 4px; margin-bottom: 0; }
    .rd-nav-tabs button { padding: 12px 20px; font-size: 14px; border: none; background: transparent; color: #606266; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .rd-nav-tabs button.active { color: #409eff; font-weight: 600; border-bottom-color: #409eff; }
    .rd-nav-tabs button:disabled { cursor: not-allowed; opacity: 0.55; color: #909399; }

    .rd-body-panel { background: #fff; border: 1px solid #ebeef5; border-radius: 0 0 4px 4px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); padding: 0; overflow: hidden; }

    .rd-placeholder-wrap { padding: 16px 20px 24px; border: 2px dashed #dcdfe6; border-radius: 4px; margin: 16px 20px 20px; background: #fafbfc; }
    .rd-placeholder-label { font-size: 12px; color: #909399; margin-bottom: 14px; }
    .rd-module { background: #fff; border: 1px solid #ebeef5; border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
    .rd-module:last-child { margin-bottom: 0; }
    .rd-module-hd { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #303133; border-bottom: 1px solid #ebeef5; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

    .rd-inline-filters .filter-label { font-size: 13px; color: #606266; }
    .rd-inline-filters input, .rd-inline-filters button { height: 32px; border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 10px; font-size: 13px; background: #f5f7fa; color: #a8abb2; cursor: not-allowed; }
    .rd-inline-filters .btn-search { background: #a0cfff; border-color: #a0cfff; color: #fff; }
    .rd-granularity { display: flex; gap: 0; margin-left: auto; }
    .rd-granularity span { padding: 6px 14px; font-size: 13px; border: 1px solid #dcdfe6; background: #fff; color: #909399; cursor: default; }
    .rd-granularity span:first-child { border-radius: 4px 0 0 4px; }
    .rd-granularity span:last-child { border-radius: 0 4px 4px 0; border-left: none; }
    .rd-granularity span.active { background: #ecf5ff; border-color: #b3d8ff; color: #409eff; font-weight: 500; }
    .rd-chart-slot { min-height: 280px; border: 1px dashed #dcdfe6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #909399; font-size: 13px; background: #fafafa; }
    .rd-chart-legend { display: flex; flex-wrap: wrap; gap: 12px 20px; margin-top: 12px; font-size: 12px; color: #606266; }
    .rd-chart-legend i { display: inline-block; width: 10px; height: 3px; border-radius: 1px; margin-right: 6px; vertical-align: middle; }
    .rd-table-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .rd-switch { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: #606266; }
    .rd-switch .sw { width: 36px; height: 20px; border-radius: 10px; background: #dcdfe6; position: relative; flex-shrink: 0; opacity: 0.6; }
    .rd-table-slot { min-height: 160px; border: 1px dashed #dcdfe6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #909399; font-size: 13px; background: #fafafa; }

    #rd-panel-forecast { display: none; }

    #rd-panel-detail.rd-panel--hidden { display: none; }
    .rd-fc-inner { padding: 16px 20px 24px; }
    #rd-panel-forecast .rd-module { margin-bottom: 16px; }
    #rd-panel-forecast .rd-module:last-child { margin-bottom: 0; }

    .rd-fc-hint strong { font-weight: 600; color: #606266; }
    .rd-fc-chart-host {
      width: 100%;
      max-width: none;
      min-height: 300px;
      height: 320px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .rd-fc-chart-host svg { shape-rendering: geometricPrecision; }
    .rd-fc-chart-fallback { min-height: 120px; display: flex; align-items: center; justify-content: center; color: #909399; font-size: 13px; border: 1px dashed #dcdfe6; border-radius: 4px; background: #fafafa; }
    .rd-rule-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rd-rule-table th, .rd-rule-table td { border: 1px solid #ebeef5; padding: 10px 12px; text-align: left; }
    .rd-rule-table th { background: #f5f7fa; color: #303133; font-weight: 500; }
    .rd-rule-empty { color: #909399; font-size: 13px; padding: 8px 0; }
    .rd-fc-rule-fields { display: flex; flex-wrap: wrap; align-items: center; gap: 20px 28px; margin-bottom: 4px; }
    .rd-fc-rule-fields label { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: #606266; }
    .rd-fc-rule-fields select.filter-control { min-width: 200px; cursor: pointer; background: #fff; color: #303133; }
    .rd-fc-rule-fields input[readonly].filter-control { min-width: 240px; background: #f5f7fa; color: #303133; cursor: default; }
    .rd-parse-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 13px; color: #606266; margin-bottom: 16px; }
    .rd-parse-flow .step { background: #f4f4f5; padding: 6px 12px; border-radius: 4px; border: 1px solid #e4e7ed; }
    .rd-parse-flow .arrow { color: #c0c4cc; }
    .rd-parse-placeholder { min-height: 120px; border: 1px dashed #dcdfe6; border-radius: 4px; background: #fafafa; display: flex; align-items: center; justify-content: center; color: #909399; font-size: 13px; text-align: center; padding: 16px; line-height: 1.6; }

    /* 计算过程：横向地铁 + Tab 切换 */
    .rd-calc-process { max-width: 100%; }
    .rd-calc-metro-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0;
      margin-bottom: 16px;
      padding: 14px 10px 18px;
      background: linear-gradient(180deg, #f9fafb 0%, #f0f2f5 100%);
      border-radius: 10px;
      border: 1px solid #e4e7ed;
    }
    .rd-calc-metro-connector {
      flex: 1 1 32px;
      min-width: 20px;
      max-width: 100%;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #409eff 0%, #67c23a 50%, #e6a23c 100%);
      opacity: 0.65;
    }
    .rd-calc-metro-tile {
      flex: 0 1 33%;
      min-width: 0;
      max-width: 200px;
      border: 1px solid #ebeef5;
      background: #fff;
      border-radius: 8px;
      padding: 8px 8px 10px;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      color: #606266;
      transition: box-shadow 0.2s, border-color 0.2s, color 0.2s;
    }
    .rd-calc-metro-tile:hover { border-color: #c6e2ff; color: #409eff; }
    .rd-calc-metro-tile.is-active {
      color: #303133;
      font-weight: 600;
      border-color: #b3d8ff;
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.2);
    }
    .rd-calc-metro-tile::before {
      content: '';
      display: block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin: 0 auto 6px;
      background: #dcdfe6;
      box-shadow: 0 0 0 2px #fff;
    }
    .rd-calc-metro-tile[data-rd-calc-tab='0']::before { background: #a0cfff; }
    .rd-calc-metro-tile[data-rd-calc-tab='1']::before { background: #b3e19d; }
    .rd-calc-metro-tile[data-rd-calc-tab='2']::before { background: #f3d19e; }
    .rd-calc-metro-tile.is-active[data-rd-calc-tab='0']::before { background: #409eff; }
    .rd-calc-metro-tile.is-active[data-rd-calc-tab='1']::before { background: #67c23a; }
    .rd-calc-metro-tile.is-active[data-rd-calc-tab='2']::before { background: #e6a23c; }
    .rd-calc-metro-panels { min-height: 0; }
    .rd-calc-metro-panel { animation: rdCalcFadeIn 0.2s ease; }
    .rd-calc-metro-panel[hidden] { display: none !important; }
    @keyframes rdCalcFadeIn { from { opacity: 0.6; } to { opacity: 1; } }

    @media (max-width: 700px) {
      .rd-calc-metro-bar { flex-wrap: wrap; row-gap: 10px; justify-content: center; }
      .rd-calc-metro-connector { flex: 0 0 32px; max-width: 50px; }
    }

    .rd-metro { max-width: 100%; }

    .rd-metro-h { font-size: 15px; font-weight: 600; color: #303133; margin-bottom: 10px; }
    .rd-metro-formula { font-size: 12px; color: #606266; line-height: 1.65; margin-bottom: 10px; padding: 10px 12px; background: #f9fafb; border-radius: 6px; border: 1px solid #ebeef5; }
    .rd-metro-formula code { font-family: ui-monospace, Consolas, monospace; font-size: 11px; color: #303133; background: #f0f2f5; padding: 1px 4px; border-radius: 3px; }
    .rd-mini-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
    .rd-mini-table th, .rd-mini-table td { border: 1px solid #ebeef5; padding: 8px 10px; text-align: left; vertical-align: top; }
    .rd-mini-table th { background: #f5f7fa; color: #606266; font-weight: 500; }
    .rd-metro-result { margin-top: 10px; padding: 10px 12px; background: #ecf5ff; border-radius: 6px; font-size: 13px; color: #409eff; font-weight: 600; }
    .rd-metro-sub { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #dcdfe6; }
    .rd-metro-sub h4 { font-size: 13px; color: #606266; margin-bottom: 8px; font-weight: 600; }

    .rd-metro-split { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    .rd-metro-split__main { flex: 1; min-width: 280px; }
    .rd-metro-split__side {
      flex: 0 0 42%;
      min-width: 300px;
      max-width: 560px;
      border: 1px solid #ebeef5;
      border-radius: 8px;
      padding: 12px;
      background: #fafbfc;
      position: sticky;
      top: 12px;
    }
    .rd-parse-chart-title { font-size: 13px; font-weight: 600; color: #303133; margin-bottom: 8px; }
    .rd-parse-chart-note { font-size: 11px; color: #909399; margin-top: 8px; line-height: 1.5; }
    .rd-parse-echart-host { width: 100%; height: 260px; }
    .rd-parse-echart-host--tall { height: 300px; }
    .rd-coeff-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 18px;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #f5f7fa;
      border-radius: 6px;
      border: 1px solid #ebeef5;
    }
    .rd-coeff-toolbar-h { font-size: 13px; font-weight: 600; color: #606266; margin-right: 4px; }
    .rd-coeff-toolbar label {
      font-size: 13px;
      color: #606266;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .rd-coeff-toolbar input { width: 16px; height: 16px; accent-color: #409eff; cursor: pointer; }

    .rd-empty { padding: 48px 24px; text-align: center; color: #909399; font-size: 14px; }
    .rd-empty a { color: #409eff; text-decoration: none; }
    .rd-empty a:hover { text-decoration: underline; }

    .filter-control { height: 32px; border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 10px; font-size: 13px; }

    @media (max-width: 768px) {
      .sidebar-submenu-panel, .sidebar-backdrop { display: none; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script>
    var SF_REPLENISH_PARENT_LIST_KEY = 'sf_replenish_parent_list_v1';
    var SF_SALES_FORECAST_RULES_KEY = 'sf_sales_forecast_rules_v1';

    function rdEsc(s) {
      if (s == null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function rdEscAttr(s) {
      if (s == null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function rdGetQueryCode() {
      var q = window.location.search || '';
      var m = q.match(/[?&]code=([^&]*)/);
      if (!m) return '';
      try {
        return decodeURIComponent(m[1].replace(/\+/g, ' ')).trim();
      } catch (e) {
        return '';
      }
    }

    function rdLoadParentByCode(code) {
      if (!code) return null;
      try {
        var raw = localStorage.getItem(SF_REPLENISH_PARENT_LIST_KEY);
        if (raw) {
          var list = JSON.parse(raw);
          if (Array.isArray(list)) {
            var found = list.filter(function(p) { return p && p.code === code; })[0];
            if (found) return found;
          }
        }
      } catch (e) {}
      return { code: code, asin: '', album: '无', platform: '', site: '', store: '', spu: '', owner: '', days: '' };
    }

    function rdLoadSalesForecastRules() {
      try {
        var raw = localStorage.getItem(SF_SALES_FORECAST_RULES_KEY);
        if (!raw) return [];
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    /**
     * 已启用且**显式**包含本父体编号的规则。不再支持「全量父体」占位（空 parentCodes 不匹配任何父体）。
     * 正常数据下每个父体只应对应 0 或 1 条；若出现多条，详情页会提示并取首条展示。
     */
    function rdFindApplicableForecastRules(parentCode) {
      if (!parentCode) return [];
      var all = rdLoadSalesForecastRules();
      var out = [];
      all.forEach(function(r) {
        if (!r || r.enabled === false) return;
        var codes = (r.form && r.form.parentCodes) ? r.form.parentCodes : [];
        if (codes.length === 0) return;
        if (codes.indexOf(parentCode) !== -1) {
          out.push(r);
        }
      });
      return out;
    }

    function rdHashStr(s) {
      var h = 0;
      s = String(s || '');
      for (var i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i) | 0;
      }
      return Math.abs(h) + 1;
    }

    /** 与种子规则 SF20260410001 一致；管线默认表单（localStorage 无数据或字段缺失时补齐） */
    var RD_FALLBACK_FORM_SF20260410001 = {
      dailyWeights: { '3': 10, '7': 35, '14': 25, '30': 20, '60': 10, '90': 0 },
      autoDenoise: { x: '4', y: '2', largeEnabled: true },
      dateDenoise: [
        { type: '固定值去噪', d0: '2026-01-15', d1: '2026-01-20', value: '45', note: '仓库盘点停发' },
        { type: '百分比去噪', d0: '2026-03-01', d1: '2026-03-03', value: '60', note: '抓数异常按 60% 缩放' }
      ],
      returnDenoise: [{ d0: '2025-11-01', d1: '2026-01-31', pct: '8', note: '旺季退货率偏高' }],
      season: ['0.92', '0.95', '1', '1.02', '1.05', '1.08', '1.1', '1.12', '1.05', '1', '0.98', '1.15'],
      yoy: [
        { d0: '2025-01-01', d1: '2025-06-30', growth: 'up', coeff: '1.08', note: '去年同期活动基数偏低' },
        { d0: '2025-07-01', d1: '2025-12-31', growth: 'up', coeff: '1.12', note: '促销季同比抬升' }
      ],
      lifecycle: [
        { lifeType: '次新品', d0: '2025-09-01', d1: '2026-03-31', growth: 'up', coeff: '1.15' },
        { lifeType: '老品', d0: '2026-04-01', d1: '', growth: 'down', coeff: '0.95' }
      ],
      competitor: [{ d0: '2026-02-01', d1: '2026-04-30', growth: 'down', coeff: '0.92', note: '竞对降价约 8%' }],
      target: [{ d0: '2026-01-01', d1: '2026-06-30', growth: 'up', coeff: '1.05', note: '渠道目标上调 5%' }]
    };

    function rdZ2(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function rdParseYMD(s) {
      if (!s || !String(s).trim()) return null;
      var p = String(s).trim().split('-');
      if (p.length < 3) return null;
      var y = parseInt(p[0], 10);
      var m = parseInt(p[1], 10);
      var d = parseInt(p[2], 10);
      if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
      return new Date(y, m - 1, d);
    }

    function rdStartOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function rdFormatYMD(d) {
      return d.getFullYear() + '-' + rdZ2(d.getMonth() + 1) + '-' + rdZ2(d.getDate());
    }

    function rdAddDays(d, n) {
      var x = new Date(d.getTime());
      x.setDate(x.getDate() + n);
      return x;
    }

    function rdDateInRange(dateStr, d0s, d1s) {
      var t = rdParseYMD(dateStr);
      if (!t) return false;
      var d0 = rdParseYMD(d0s);
      if (!d0) return false;
      var t0 = rdStartOfDay(t).getTime();
      var a0 = rdStartOfDay(d0).getTime();
      if (t0 < a0) return false;
      if (!d1s || !String(d1s).trim()) return true;
      var d1 = rdParseYMD(d1s);
      if (!d1) return true;
      return t0 <= rdStartOfDay(d1).getTime();
    }

    function rdOverlapDayCount(winStart, winEnd, d0s, d1s) {
      var d0 = rdParseYMD(d0s);
      if (!d0) return 0;
      var d1 = d1s && String(d1s).trim() ? rdParseYMD(d1s) : d0;
      if (!d1) d1 = d0;
      var s = Math.max(rdStartOfDay(winStart).getTime(), rdStartOfDay(d0).getTime());
      var e = Math.min(rdStartOfDay(winEnd).getTime(), rdStartOfDay(d1).getTime());
      if (s > e) return 0;
      return Math.round((e - s) / 86400000) + 1;
    }

    function rdMulberry32(seed) {
      var a = seed >>> 0;
      return function() {
        a |= 0;
        a = (a + 0x6d2b79f5) | 0;
        var t = Math.imul(a ^ (a >>> 15), a | 1);
        t = (t + Math.imul(t ^ (t >>> 7), t | 61)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function rdDefaultDenoiseBlockEnabled() {
      return { date: true, stockout: true, return: true };
    }

    function rdMergeForecastForm(f) {
      var b = RD_FALLBACK_FORM_SF20260410001;
      var dbe = rdDefaultDenoiseBlockEnabled();
      if (f && f.denoiseBlockEnabled) {
        if (f.denoiseBlockEnabled.date === false) dbe.date = false;
        if (f.denoiseBlockEnabled.stockout === false) dbe.stockout = false;
        if (f.denoiseBlockEnabled.return === false) dbe.return = false;
      }
      var o = {
        dailyWeights: (f && f.dailyWeights) ? f.dailyWeights : b.dailyWeights,
        autoDenoise: (f && f.autoDenoise) ? f.autoDenoise : b.autoDenoise,
        denoiseBlockEnabled: dbe,
        dateDenoise:
          f && f.dateDenoise && f.dateDenoise.length >= 2
            ? f.dateDenoise
            : b.dateDenoise.slice(),
        returnDenoise:
          f && f.returnDenoise && f.returnDenoise.length
            ? f.returnDenoise
            : b.returnDenoise.slice(),
        season: (f && f.season && f.season.length === 12) ? f.season : b.season.slice(),
        yoy: (f && f.yoy && f.yoy.length) ? f.yoy : b.yoy.slice(),
        lifecycle: (f && f.lifecycle && f.lifecycle.length) ? f.lifecycle : b.lifecycle.slice(),
        competitor: (f && f.competitor && f.competitor.length) ? f.competitor : b.competitor.slice(),
        target: (f && f.target && f.target.length) ? f.target : b.target.slice(),
        /* 促销销量：暂时不从规则带入预测，始终空数组。 */
        promos: []
      };
      return o;
    }

    function rdApplyLargeOrder(orders, ad) {
      if (!ad || ad.largeEnabled === false) return orders.slice();
      var x = parseFloat(ad.x);
      var y = parseFloat(ad.y);
      if (isNaN(x)) x = 999999;
      if (isNaN(y)) y = 0;
      return orders.map(function(o) {
        return o >= x ? y : o;
      });
    }

    function rdSimulateDayOrders(rng, baseLevel, dayIndex) {
      var n = 3 + Math.floor(rng() * 10);
      var orders = [];
      var bl = Math.max(20, baseLevel);
      for (var i = 0; i < n; i++) {
        var v = -Math.log(rng() + 1e-12) * (bl / 6);
        v = Math.min(220, Math.max(0.5, v));
        orders.push(v);
      }
      return orders;
    }

    function rdApplyDateDenoiseRows(daily, dateStr, rows) {
      var v = daily;
      if (!rows || !rows.length) return v;
      for (var r = 0; r < rows.length; r++) {
        var row = rows[r];
        if (!row || !rdDateInRange(dateStr, row.d0, row.d1)) continue;
        var typ = row.type || '';
        if (typ.indexOf('百分比') >= 0) {
          var p = parseFloat(row.value);
          if (!isNaN(p)) v = v * (p / 100);
        } else {
          var fv = parseFloat(row.value);
          if (!isNaN(fv)) v = fv;
        }
      }
      return v;
    }

    function rdApplyReturnRows(daily, dateStr, rows) {
      var v = daily;
      if (!rows || !rows.length) return v;
      for (var r = 0; r < rows.length; r++) {
        var row = rows[r];
        if (!row || !rdDateInRange(dateStr, row.d0, row.d1)) continue;
        var pct = parseFloat(row.pct);
        if (!isNaN(pct) && pct > 0) v = v * (1 - pct / 100);
      }
      return v;
    }

    function rdPickCoeff(rows, dateStr) {
      if (!rows || !rows.length) return 1;
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        if (!row) continue;
        if (rdDateInRange(dateStr, row.d0, row.d1)) {
          var c = parseFloat(row.coeff);
          return isNaN(c) ? 1 : c;
        }
      }
      return 1;
    }

    function rdKBreakdown(form, dateStr) {
      var dt = rdParseYMD(dateStr);
      var m = dt ? dt.getMonth() + 1 : 1;
      var ksRaw = form.season && form.season[m - 1] != null ? form.season[m - 1] : '1';
      var ks = parseFloat(ksRaw);
      if (isNaN(ks)) ks = 1;
      var ky = rdPickCoeff(form.yoy, dateStr);
      var kl = rdPickCoeff(form.lifecycle, dateStr);
      var kc = rdPickCoeff(form.competitor, dateStr);
      var kt = rdPickCoeff(form.target, dateStr);
      var prod = ks * ky * kl * kc * kt;
      return { ks: ks, ky: ky, kl: kl, kc: kc, kt: kt, prod: prod };
    }

    /**
     * 单日：模拟订单 → 大订单去噪 → 日期/退货去噪；输出各阶段数值供曲线展示。
     */
    function rdSimulateOneDaySalesDetailed(form, seed, dayDate) {
      form = form || RD_FALLBACK_FORM_SF20260410001;
      var d = rdStartOfDay(dayDate);
      var ds = rdFormatYMD(d);
      var ord = Math.floor(d.getTime() / 86400000);
      var rng = rdMulberry32(seed + ord * 9973 + d.getDate() * 31);
      var dow = d.getDay();
      var seasonal =
        1 +
        0.12 * Math.sin(((ord + (seed % 40)) / 365) * Math.PI * 2) +
        (dow === 0 || dow === 6 ? -0.06 : 0);
      var baseLevel = (75 + (seed % 55)) * seasonal;

      var orders = rdSimulateDayOrders(rng, baseLevel, 0);
      var rawSum = 0;
      for (var oo = 0; oo < orders.length; oo++) rawSum += orders[oo];
      orders = rdApplyLargeOrder(orders, form.autoDenoise || {});
      var afterLarge = 0;
      for (var o = 0; o < orders.length; o++) afterLarge += orders[o];

      var dbeD = (form.denoiseBlockEnabled || rdDefaultDenoiseBlockEnabled());
      var datePass = dbeD.date === false ? [] : (form.dateDenoise || []);
      var afterDate = rdApplyDateDenoiseRows(afterLarge, ds, datePass);
      var returnPass = dbeD.return === false ? [] : (form.returnDenoise || []);
      var afterReturn = rdApplyReturnRows(afterDate, ds, returnPass);

      return {
        raw: Math.round(rawSum * 100) / 100,
        afterLarge: Math.round(afterLarge * 100) / 100,
        afterDate: Math.round(afterDate * 100) / 100,
        denoised: Math.round(afterReturn * 100) / 100
      };
    }

    function rdSimulateOneDaySales(form, seed, dayDate) {
      var x = rdSimulateOneDaySalesDetailed(form, seed, dayDate);
      return { raw: x.raw, denoised: x.denoised };
    }

    /**
     * 模拟近 90 天原始日销（订单汇总）→ 去噪得 A → 加权得 X → 未来 90 日逐日预测。
     * form 须已合并默认值（rdMergeForecastForm）。
     */
    function rdPipelineForecast(form, seed) {
      form = form || RD_FALLBACK_FORM_SF20260410001;
      var WINDOW = 90;
      var FC_DAYS = 90;
      var today = rdStartOfDay(new Date());
      var winStart = rdAddDays(today, -(WINDOW - 1));
      var winEnd = today;

      var chartDates = [];
      var rawDaily = [];
      var afterLargeDaily = [];
      var afterDateDaily = [];
      var A = [];

      for (var i = 0; i < WINDOW; i++) {
        var dayDate = rdAddDays(winStart, i);
        chartDates.push(rdFormatYMD(dayDate));
        var one = rdSimulateOneDaySalesDetailed(form, seed, dayDate);
        rawDaily.push(one.raw);
        afterLargeDaily.push(one.afterLarge);
        afterDateDaily.push(one.afterDate);
        A.push(one.denoised);
      }

      var n = A.length;
      var mu = {};
      [3, 7, 14, 30, 60, 90].forEach(function(k) {
        if (n >= k) {
          var s = 0;
          for (var j = n - k; j < n; j++) s += A[j];
          mu[k] = Math.round((s / k) * 1000) / 1000;
        }
      });

      var wMap = form.dailyWeights || {};
      var sumW = 0;
      var acc = 0;
      [3, 7, 14, 30, 60, 90].forEach(function(k) {
        if (mu[k] == null) return;
        var wt = parseFloat(wMap[String(k)]);
        if (isNaN(wt) || wt <= 0) return;
        sumW += wt;
        acc += wt * mu[k];
      });
      var X = 0;
      if (sumW > 0) X = acc / sumW;
      else X = mu[30] != null ? mu[30] : mu[7] != null ? mu[7] : A[n - 1];
      X = Math.round(X * 100) / 100;

      var tomorrow = rdAddDays(today, 1);
      var forecastDates = [];
      var forecastPred = [];
      var forecastYoyActual = [];
      var forecastKSeason = [];
      var forecastKYoy = [];
      var forecastKLife = [];
      var forecastKComp = [];
      var forecastKTarget = [];
      var forecastKProd = [];

      for (var fi = 0; fi < FC_DAYS; fi++) {
        var fd = rdAddDays(tomorrow, fi);
        var fds = rdFormatYMD(fd);
        forecastDates.push(fds);
        var kb = rdKBreakdown(form, fds);
        var pred = Math.round(X * kb.prod * 100) / 100;
        forecastPred.push(pred);
        var yoyDay = rdAddDays(fd, -364);
        var yoySales = rdSimulateOneDaySales(form, seed, yoyDay).denoised;
        forecastYoyActual.push(yoySales);
        forecastKSeason.push(kb.ks);
        forecastKYoy.push(kb.ky);
        forecastKLife.push(kb.kl);
        forecastKComp.push(kb.kc);
        forecastKTarget.push(kb.kt);
        forecastKProd.push(kb.prod);
      }

      var rep = rdKBreakdown(form, forecastDates[0]);

      return {
        winStartStr: rdFormatYMD(winStart),
        winEndStr: rdFormatYMD(winEnd),
        chartDates: chartDates,
        rawDaily: rawDaily,
        afterLargeDaily: afterLargeDaily,
        afterDateDaily: afterDateDaily,
        A: A,
        mu: mu,
        X: X,
        forecastDates: forecastDates,
        forecastPred: forecastPred,
        forecastYoyActual: forecastYoyActual,
        forecastKSeason: forecastKSeason,
        forecastKYoy: forecastKYoy,
        forecastKLife: forecastKLife,
        forecastKComp: forecastKComp,
        forecastKTarget: forecastKTarget,
        forecastKProd: forecastKProd,
        repK: rep,
        meanA: Math.round((A.reduce(function(s, x) { return s + x; }, 0) / Math.max(A.length, 1)) * 100) / 100
      };
    }

    /** 根据当前选中的规则展示计算过程；与管线 rdPipelineForecast 使用同一套模拟与公式 */
    function rdBuildCalcProcessHtml(parentCode, ruleId) {
      var rule = ruleId ? rdGetSalesRuleById(ruleId) : null;
      if (ruleId && (!rule || !rule.form)) {
        return '<div class="rd-parse-placeholder">未选择规则，或所选规则无完整配置。请确认本父体在「销量预测规则」的适用父体中仅绑定一条已启用规则。</div>';
      }

      var seed = rdHashStr(String(parentCode) + '|' + String(ruleId));
      var pipe = rdPipelineForecast(form, seed);

      var w = form.dailyWeights || {};
      var ad = form.autoDenoise || { x: '4', y: '2', largeEnabled: true };
      var dd =
        form.dateDenoise && form.dateDenoise.length >= 2
          ? form.dateDenoise

      var rd =
        form.returnDenoise && form.returnDenoise.length
          ? form.returnDenoise
          : RD_FALLBACK_FORM_SF20260410001.returnDenoise.slice();
      if (!dd[0]) dd[0] = RD_FALLBACK_FORM_SF20260410001.dateDenoise[0];
      if (!dd[1]) dd[1] = RD_FALLBACK_FORM_SF20260410001.dateDenoise[1];
      if (!rd[0]) rd[0] = RD_FALLBACK_FORM_SF20260410001.returnDenoise[0];

      var winStart = pipe.winStartStr;
      var winEnd = pipe.winEndStr;
      var ws = rdParseYMD(winStart);
      var we = rdParseYMD(winEnd);
      var ov1 = ws && we ? rdOverlapDayCount(ws, we, dd[0].d0, dd[0].d1) : 0;
      var ov2 = ws && we ? rdOverlapDayCount(ws, we, dd[1].d0, dd[1].d1) : 0;
      var retOv = ws && we ? rdOverlapDayCount(ws, we, rd[0].d0, rd[0].d1) : 0;

      var mu = pipe.mu;
      var mu3 = mu[3] != null ? mu[3] : '—';
      var mu7 = mu[7] != null ? mu[7] : '—';
      var mu14 = mu[14] != null ? mu[14] : '—';
      var mu30 = mu[30] != null ? mu[30] : '—';
      var mu60 = mu[60] != null ? mu[60] : '—';

      var sumW = 0;
      [3, 7, 14, 30, 60, 90].forEach(function(k) {
        var wt = parseFloat(w[String(k)]);
        if (!isNaN(wt) && wt > 0 && mu[k] != null) sumW += wt;
      });
      function rdContrib(kk) {
        var wt = parseFloat(w[String(kk)]) || 0;
        if (mu[kk] == null || sumW <= 0) return 0;
        return Math.round((wt * mu[kk]) / sumW * 100) / 100;
      }

      var X = pipe.X;
      var rep = pipe.repK;
      var kSeason = Math.round(rep.ks * 1000) / 1000;
      var kYoy = Math.round(rep.ky * 1000) / 1000;

      var kComp = Math.round(rep.kc * 1000) / 1000;

      var fd0 = pipe.forecastDates && pipe.forecastDates[0] ? pipe.forecastDates[0] : '';

      h += '</div>';
      h += '<div class="rd-calc-metro-panels">';

      /* ---- 面板 0：销量去噪 ---- */
      h += '<div class="rd-calc-metro-panel is-active" data-rd-calc-panel="0" role="tabpanel" id="rd-calc-panel-0" aria-labelledby="rd-calc-tab-0">';
      h += '<div class="rd-metro-card">';
      h += '<div class="rd-metro-h">第①步：清洗历史销量，去掉异常数据</div>';

      h += '<div class="rd-metro-formula">系统取最近 90 天（<code>' + rdEsc(winStart) + ' ~ ' + rdEsc(winEnd) + '</code>）的实际日销量，按以下四条规则逐日清洗，得到一组干净的日销量数据：</div>';

      h += '<ol style="margin:0 0 14px 18px;font-size:13px;color:#606266;line-height:2;">';
      h += '<li><strong>大订单去噪</strong>' + (ad.largeEnabled !== false ? '' : '（当前关闭）') + '：单笔订单销量 ≥ ' + rdEsc(ad.x) + ' 的，统一按 ' + rdEsc(ad.y) + ' 计入当天，避免个别大订单拉高整体水平。</li>';
      h += '<li><strong>日期固定值去噪</strong>：' + rdEsc(dd[0].d0) + ' ~ ' + rdEsc(dd[0].d1) + ' 期间（' + rdEsc(dd[0].note || '特殊日期') + '），共影响 ' + ov1 + ' 天，每日销量直接按固定值 ' + rdEsc(dd[0].value) + ' 处理。</li>';
      h += '<li><strong>日期百分比去噪</strong>：' + rdEsc(dd[1].d0) + ' ~ ' + rdEsc(dd[1].d1) + ' 期间（' + rdEsc(dd[1].note || '数据修正') + '），共影响 ' + ov2 + ' 天，每日销量按 ' + rdEsc(dd[1].value) + '% 缩放还原。</li>';
      h += '<li><strong>退货去噪</strong>：' + rdEsc(rd[0].d0) + ' ~ ' + rdEsc(rd[0].d1) + ' 期间，扣除约 ' + rdEsc(rd[0].pct) + '% 的退货量' + (rd[0].note ? '（' + rdEsc(rd[0].note) + '）' : '') + '，共影响 ' + retOv + ' 天。</li>';

      h += '<div class="rd-metro-h">第②步：多时间窗口加权，得出基础日销量</div>';
      h += '<div class="rd-metro-formula">在清洗后的 90 天数据上，先剔除断货期间的数据（库存为 0 的天数不参与统计），再分别统计近 3 天、7 天、14 天、30 天、60 天的日均销量，按规则中配置的权重进行加权平均。权重越大的窗口，对最终结果的影响越大。这样综合了短期波动和长期趋势，得到一个能代表当前销售水平的基础日销量。</div>';

      h += '<table class="rd-mini-table"><thead><tr><th>统计窗口</th><th>权重</th><th>日均销量</th><th>加权贡献</th></tr></thead><tbody>';
      h += '<tr><td>近 3 天</td><td>' + rdEsc(String(w['3'] != null ? w['3'] : 0)) + '%</td><td>' + mu3 + '</td><td>' + rdContrib(3) + '</td></tr>';
      h += '<tr><td>近 7 天</td><td>' + rdEsc(String(w['7'] != null ? w['7'] : 0)) + '%</td><td>' + mu7 + '</td><td>' + rdContrib(7) + '</td></tr>';
      h += '<tr><td>近 14 天</td><td>' + rdEsc(String(w['14'] != null ? w['14'] : 0)) + '%</td><td>' + mu14 + '</td><td>' + rdContrib(14) + '</td></tr>';

      h += '<tr><td>目标</td><td>' + kTarget + '</td><td>业务目标调整</td></tr>';

      h += '<div class="rd-metro-result">以预测首日（' + rdEsc(fd0) + '）为例：基础日销量 ' + X + ' × 综合系数 ' + K + ' = 预测日销量约 <strong>' + dailyFinal + '</strong>（后续每天系数可能不同，完整走势见上方预测曲线和下方系数曲线）</div>';

        '</div></div>' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd"><span>明细数据</span>' +
        '<div class="rd-switch"><span>网络合并</span><span class="sw"></span></div></div>' +
        '<div class="rd-module-bd">' +
        '<div class="rd-table-toolbar">' +
        '<div class="rd-inline-filters" style="margin-bottom:0;">' +
        '<span class="filter-label">日期</span>' +
        '<input type="text" disabled placeholder="YYYY-MM-DD" value="" style="width:120px;" />' +
        '<span style="color:#909399;font-size:13px;">~</span>' +
        '<input type="text" disabled placeholder="YYYY-MM-DD" value="" style="width:120px;" />' +
        '<input type="text" disabled placeholder="搜索" style="width:160px;" />' +
        '<button type="button" class="btn-search" disabled>搜索</button>' +
        '</div></div>' +
        '<div class="rd-table-slot">SKU 明细表格占位（多列销量、库存等可在此挂载）</div>' +
        '</div></div>' +

        '</div>' +
        '</div>' +
        '<div id="rd-panel-forecast" data-parent-code="' +
        rdEscAttr(code) +
        '">' +
        '<div class="rd-fc-inner">' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">预测规则</div>' +
        '<div class="rd-module-bd">' +
        rdBuildForecastRuleFieldsHtml(applicableForecast) +
        '</div></div>' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">销量预测结果</div>' +
        '<div class="rd-module-bd">' +
        '<p class="rd-fc-hint">' + chartHint + '</p>' +
        '<div class="rd-fc-chart-host" id="rd-fc-chart-host"></div>' +
        '</div></div>' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">计算过程解析</div>' +
        '<div class="rd-module-bd">' +
        '<div id="rd-fc-calc-process">' +
        rdBuildCalcProcessHtml(code, defaultRuleId) +
        '</div></div></div>' +

        '</div>' +
        '</div>' +
        '</div>';
      rdInitForecastRuleSelector(code, applicableForecast);
    }

    function rdSetTab(name) {
      var panelD = document.getElementById('rd-panel-detail');
      var panelF = document.getElementById('rd-panel-forecast');
      if (!panelD || !panelF) return;
      document.querySelectorAll('#rd-nav-tabs [data-rd-tab]').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-rd-tab') === name);
      });
      if (name === 'detail') {
        panelD.classList.remove('rd-panel--hidden');
        panelF.classList.remove('rd-panel--visible');
      } else if (name === 'forecast') {
        panelD.classList.add('rd-panel--hidden');
        panelF.classList.add('rd-panel--visible');
        requestAnimationFrame(function() {
          setTimeout(function() {
            rdResizeForecastChart();
            rdResizeCalcCharts();
          }, 0);
        });
      }
    }

    function rdBindDetailTabs() {
      document.querySelectorAll('#rd-nav-tabs [data-rd-tab]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var t = btn.getAttribute('data-rd-tab');
          if (t === 'detail' || t === 'forecast') rdSetTab(t);
        });
      });
    }

    rdRender();
    rdBindDetailTabs();

    function initSidebarMenu() {
      var appLayout = document.querySelector('.app-layout');
      var backdrop = document.getElementById('sidebar-backdrop');
      var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
      var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
      var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
      var replenishPanel = document.getElementById('replenish-submenu');
      var protoPanel = document.getElementById('proto-submenu');
      var systemPanel = document.getElementById('system-submenu');
      if (!appLayout || !backdrop) return;

      function restorePrimaryCurrent() {
        document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
          el.classList.add('active');
        });
      }

      function closeAllSubmenus() {
        appLayout.classList.remove('submenu-open');
        if (replenishPanel) replenishPanel.classList.remove('open');
        if (protoPanel) protoPanel.classList.remove('open');
        if (systemPanel) systemPanel.classList.remove('open');
        if (replenishTrigger) replenishTrigger.classList.remove('active');
        if (protoTrigger) protoTrigger.classList.remove('active');
        if (systemTrigger) systemTrigger.classList.remove('active');
        restorePrimaryCurrent();
      }

      function bindToggle(trigger, panel) {
        if (!trigger || !panel) return;
        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          if (panel.classList.contains('open')) {
            closeAllSubmenus();
            return;
          }
          appLayout.classList.remove('submenu-open');
          if (replenishPanel) replenishPanel.classList.remove('open');
          if (protoPanel) protoPanel.classList.remove('open');
          if (systemPanel) systemPanel.classList.remove('open');
          if (replenishTrigger) replenishTrigger.classList.remove('active');
          if (protoTrigger) protoTrigger.classList.remove('active');
          if (systemTrigger) systemTrigger.classList.remove('active');
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.remove('active');
          });
          appLayout.classList.add('submenu-open');
          panel.classList.add('open');
          trigger.classList.add('active');
        });
      }

      bindToggle(replenishTrigger, replenishPanel);
      bindToggle(protoTrigger, protoPanel);
      bindToggle(systemTrigger, systemPanel);
      backdrop.addEventListener('click', closeAllSubmenus);
      document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
        a.addEventListener('click', closeAllSubmenus);
      });
      document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
        item.addEventListener('click', function(e) { e.preventDefault(); });
      });
    }

    initSidebarMenu();
  </script>
</body>
