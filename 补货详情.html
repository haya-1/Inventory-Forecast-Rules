    .rd-metro-stop:nth-child(2) .rd-metro-node { background: #67c23a; box-shadow: 0 0 0 2px rgba(103, 194, 58, 0.45); }
    .rd-metro-stop:nth-child(3) .rd-metro-node { background: #e6a23c; box-shadow: 0 0 0 2px rgba(230, 162, 60, 0.45); }

    .rd-mini-table th { background: #f5f7fa; color: #606266; font-weight: 500; }
    .rd-metro-result { margin-top: 10px; padding: 10px 12px; background: #ecf5ff; border-radius: 6px; font-size: 13px; color: #409eff; font-weight: 600; }

      .sidebar-submenu-panel, .sidebar-backdrop { display: none; }

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script>
    var SF_REPLENISH_PARENT_LIST_KEY = 'sf_replenish_parent_list_v1';
    var SF_SALES_FORECAST_RULES_KEY = 'sf_sales_forecast_rules_v1';

    function rdEsc(s) {
      if (s == null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function rdEscAttr(s) {
      if (s == null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function rdGetQueryCode() {
      var q = window.location.search || '';
      var m = q.match(/[?&]code=([^&]*)/);
      if (!m) return '';
      try {
        return decodeURIComponent(m[1].replace(/\+/g, ' ')).trim();
      } catch (e) {
        return '';
      }
    }

    function rdLoadParentByCode(code) {
      if (!code) return null;
      try {
        var raw = localStorage.getItem(SF_REPLENISH_PARENT_LIST_KEY);
        if (raw) {
          var list = JSON.parse(raw);
          if (Array.isArray(list)) {
            var found = list.filter(function(p) { return p && p.code === code; })[0];
            if (found) return found;
          }
        }
      } catch (e) {}
      return { code: code, asin: '', album: '无', platform: '', site: '', store: '', spu: '', owner: '', days: '' };
    }

    function rdLoadSalesForecastRules() {
      try {
        var raw = localStorage.getItem(SF_SALES_FORECAST_RULES_KEY);
        if (!raw) return [];
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    /** 启用且适用当前父体的规则：parentCodes 为空表示全部父体，否则需包含当前编号 */
    function rdFindApplicableForecastRules(parentCode) {
      var all = rdLoadSalesForecastRules();
      var out = [];
      all.forEach(function(r) {
        if (!r || r.enabled === false) return;
        var codes = (r.form && r.form.parentCodes) ? r.form.parentCodes : [];
        if (codes.length === 0 || codes.indexOf(parentCode) !== -1) {
          out.push(r);
        }
      });
      return out;
    }

    function rdHashStr(s) {
      var h = 0;
      s = String(s || '');
      for (var i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i) | 0;
      }
      return Math.abs(h) + 1;
    }

    var rdForecastChartInstance = null;

    function rdResizeForecastChart() {
      if (typeof echarts === 'undefined') return;
      var host = document.getElementById('rd-fc-chart-host');
      if (!host) return;
      var c = echarts.getInstanceByDom(host);
      if (c) c.resize();
    }

    function rdPaintForecastChart(parentCode, selectedRule) {
      var host = document.getElementById('rd-fc-chart-host');
      if (!host) return;
      if (rdForecastChartInstance) {
        rdForecastChartInstance.dispose();
        rdForecastChartInstance = null;
      }
      host.innerHTML = '';

      var rid = selectedRule && selectedRule.id ? selectedRule.id : '';
      var seed = rdHashStr(parentCode + '|' + rid);
      var n = 30;
      var pred = [];
      var yoy = [];
      var categories = [];
      for (var i = 0; i < n; i++) {
        var t = (i / n) * Math.PI * 2;
        var base = 60 + (seed % 50) + Math.sin(t + seed * 0.01) * 28 + i * 1.15;
        pred.push(Math.round(base * 10) / 10);
        yoy.push(Math.round((base * 0.9 + Math.cos(t * 1.2 + 0.5) * 22) * 10) / 10);
        categories.push(String(i + 1));
      }

      if (typeof echarts === 'undefined') {
        host.innerHTML = '<div class="rd-fc-chart-fallback">ECharts 未加载，请检查网络后刷新页面</div>';
        return;
      }

      rdForecastChartInstance = echarts.init(host);
      rdForecastChartInstance.setOption({
        color: ['#409eff', '#67c23a'],
        textStyle: { fontFamily: 'inherit', fontSize: 11 },
        grid: { left: 44, right: 20, top: 36, bottom: 24, containLabel: false },
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        legend: {
          data: ['预测销量', '同比实际销量'],
          top: 4,
          left: 'center',
          itemWidth: 22,
          itemHeight: 8,
          textStyle: { fontSize: 12, color: '#606266' }
        },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: categories,
          axisLine: { lineStyle: { color: '#dcdfe6' } },
          axisLabel: { color: '#909399', fontSize: 10 }
        },
        yAxis: {
          type: 'value',
          splitLine: { lineStyle: { color: '#ebeef5', type: 'dashed' } },
          axisLabel: { color: '#909399', fontSize: 10 }
        },
        series: [
          {
            name: '预测销量',
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 5,
            data: pred,
            lineStyle: { width: 2 }
          },
          {
            name: '同比实际销量',
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 4,
            data: yoy,
            lineStyle: { width: 2, type: 'dashed' },
            emphasis: { focus: 'series' }
          }
        ]
      });

      if (!window._rdChartResizeBound) {
        window._rdChartResizeBound = true;
        window.addEventListener('resize', function() {
          rdResizeForecastChart();
        });
      }
    }

    function rdGetSalesRuleById(ruleId) {
      if (!ruleId) return null;
      var all = rdLoadSalesForecastRules();
      return all.filter(function(r) {
        return r && r.id === ruleId;
      })[0] || null;
    }

    /** 销量预测 Tab 顶部：规则编号下拉 + 只读规则名称 */
    function rdBuildForecastRuleFieldsHtml(applicable) {
      if (!applicable || !applicable.length) {
        return (

    /** 根据当前选中的规则展示计算过程；元数据来自规则表单，示意数字随父体+规则略变以示区分 */
    function rdBuildCalcProcessHtml(parentCode, ruleId) {
      var rule = rdGetSalesRuleById(ruleId);
      var f = rule && rule.form ? rule.form : null;
      if (!f) {
        return '<div class="rd-parse-placeholder">未选择规则，或所选规则无完整配置。请在上方选择一条适用于本父体的销量预测规则。</div>';

        f.dateDenoise && f.dateDenoise.length >= 2
          ? f.dateDenoise

      var rd =
        f.returnDenoise && f.returnDenoise.length
          ? f.returnDenoise

      if (!dd[0]) dd[0] = RD_FALLBACK_FORM_SF20260410001.dateDenoise[0];
      if (!dd[1]) dd[1] = RD_FALLBACK_FORM_SF20260410001.dateDenoise[1];
      if (!rd[0]) rd[0] = RD_FALLBACK_FORM_SF20260410001.returnDenoise[0];

      var winStart = '2026-01-18';
      var winEnd = '2026-04-16';

      var jitter = (rdHashStr(String(parentCode) + '|' + String(ruleId)) % 17) * 0.35;
      var mu3 = Math.round((122.4 + jitter) * 10) / 10;
      var mu7 = Math.round((119.8 + jitter * 0.9) * 10) / 10;
      var mu14 = Math.round((116.2 + jitter * 0.8) * 10) / 10;
      var mu30 = Math.round((114.0 + jitter * 0.7) * 10) / 10;
      var mu60 = Math.round((110.5 + jitter * 0.6) * 10) / 10;
      var w3 = (parseFloat(w['3']) || 0) / 100;
      var w7 = (parseFloat(w['7']) || 0) / 100;
      var w14 = (parseFloat(w['14']) || 0) / 100;
      var w30 = (parseFloat(w['30']) || 0) / 100;
      var w60 = (parseFloat(w['60']) || 0) / 100;
      var X = w3 * mu3 + w7 * mu7 + w14 * mu14 + w30 * mu30 + w60 * mu60;
      X = Math.round(X * 100) / 100;

      var kSeason = 0.995;
      var kYoy = 1.096;
      var kLife = 1.118;
      var kCompRaw =
        f.competitor && f.competitor[0] && f.competitor[0].coeff != null && f.competitor[0].coeff !== ''
          ? parseFloat(f.competitor[0].coeff)
          : NaN;
      var kComp = !isNaN(kCompRaw) ? kCompRaw : 0.936;
      kComp = Math.round(kComp * 1000) / 1000;
      var kTargetRaw =
        f.target && f.target[0] && f.target[0].coeff != null && f.target[0].coeff !== ''
          ? parseFloat(f.target[0].coeff)
          : NaN;
      var kTarget = !isNaN(kTargetRaw) ? kTargetRaw : 1.05;
      kTarget = Math.round(kTarget * 1000) / 1000;
      var K = kSeason * kYoy * kLife * kComp * kTarget;
      K = Math.round(K * 10000) / 10000;
      var dailyFinal = Math.round(X * K * 100) / 100;

      var h = '';

      h += '<div class="rd-metro">';
      h += '<div class="rd-metro-stop"><span class="rd-metro-node" aria-hidden="true"></span><div class="rd-metro-card">';

      h += '<div class="rd-metro-sub"><h4>规则1 · 大订单去噪</h4>';
      h += '<div class="rd-metro-formula">在<strong>订单粒度</strong>判断：若某笔订单某产品销量 <code>≥ ' + rdEsc(ad.x) + '</code>（阈值），则该笔该产品在计入日销量时改为 <code>' + rdEsc(ad.y) + '</code>（固定值）；逐笔处理后再汇总到自然日。元数据：大订单去噪 ' + (ad.largeEnabled !== false ? '开启' : '关闭') + '。</div>';

      h += '<tr><td>阈值 <code>' + rdEsc(ad.x) + '</code>，固定替换 <code>' + rdEsc(ad.y) + '</code></td><td>窗口内若干笔 ≥ 阈值的订单先按固定值再汇总至日销，削峰。</td></tr></tbody></table></div>';

      h += '<div class="rd-metro-sub"><h4>规则2 · 日期固定值去噪</h4>';
      h += '<div class="rd-metro-formula">区间 <code>[' + rdEsc(dd[0].d0) + ' ~ ' + rdEsc(dd[0].d1) + ']</code> 内日销量替换为 <code>' + rdEsc(dd[0].value) + '</code>（与近 90 天交集共 6 天）。</div>';
      h += '<table class="rd-mini-table"><thead><tr><th>元数据</th><th>计算结果</th></tr></thead><tbody>';
      h += '<tr><td>原因：' + rdEsc(dd[0].note || '') + '</td><td>交集 6 天均置为 ' + rdEsc(dd[0].value) + '</td></tr></tbody></table></div>';

      h += '<div class="rd-metro-sub"><h4>规则3 · 日期百分比去噪</h4>';
      h += '<div class="rd-metro-formula">区间 <code>[' + rdEsc(dd[1].d0) + ' ~ ' + rdEsc(dd[1].d1) + ']</code> 内日销量 × <code>' + rdEsc(dd[1].value) + '%</code>。</div>';
      h += '<table class="rd-mini-table"><thead><tr><th>元数据</th><th>计算结果</th></tr></thead><tbody>';
      h += '<tr><td>' + rdEsc(dd[1].note || '') + '</td><td>交集 3 天按 ' + rdEsc(dd[1].value) + '% 缩放</td></tr></tbody></table></div>';

      h += '<div class="rd-metro-sub"><h4>规则4 · 退货量去噪</h4>';
      h += '<div class="rd-metro-formula">在 <code>[' + rdEsc(rd[0].d0) + ' ~ ' + rdEsc(rd[0].d1) + ']</code> 内，按退货率 <code>' + rdEsc(rd[0].pct) + '%</code> 对日销做平滑（示例：有效影响近 90 天中 73 天）。</div>';
      h += '<table class="rd-mini-table"><thead><tr><th>元数据</th><th>计算结果</th></tr></thead><tbody>';
      h += '<tr><td>' + rdEsc(rd[0].note || '') + '</td><td>受影响天次均额外折扣系数约 0.992</td></tr></tbody></table></div>';

      h += '<div class="rd-metro-result">集合 A：共 90 个日销量；去噪后窗口日均 <strong>115.8</strong>（示例汇总，用于下一步窗口统计）</div>';
      h += '</div></div>';

      h += '<div class="rd-metro-stop"><span class="rd-metro-node" aria-hidden="true"></span><div class="rd-metro-card">';

      h += '<div class="rd-metro-formula">在集合 A 上分别统计近 3/7/14/30/60 日日均 <code>μ<sub>3</sub>…μ<sub>60</sub></code>，再按权重加权：<code>X = Σ<sub>k∈{3,7,14,30,60}</sub> w<sub>k</sub>·μ<sub>k</sub></code>，其中 <code>Σw<sub>k</sub>=100%</code>（-promo）。</div>';
      h += '<table class="rd-mini-table"><thead><tr><th>窗口</th><th>权重 w（元数据）</th><th>μ（基于 A 的示意值）</th><th>贡献 w·μ</th></tr></thead><tbody>';
      h += '<tr><td>近3日</td><td>' + rdEsc(String(w['3'] != null ? w['3'] : 0)) + '%</td><td>' + mu3 + '</td><td>' + (Math.round(w3 * mu3 * 100) / 100) + '</td></tr>';
      h += '<tr><td>近7日</td><td>' + rdEsc(String(w['7'] != null ? w['7'] : 0)) + '%</td><td>' + mu7 + '</td><td>' + (Math.round(w7 * mu7 * 100) / 100) + '</td></tr>';
      h += '<tr><td>近14日</td><td>' + rdEsc(String(w['14'] != null ? w['14'] : 0)) + '%</td><td>' + mu14 + '</td><td>' + (Math.round(w14 * mu14 * 100) / 100) + '</td></tr>';
      h += '<tr><td>近30日</td><td>' + rdEsc(String(w['30'] != null ? w['30'] : 0)) + '%</td><td>' + mu30 + '</td><td>' + (Math.round(w30 * mu30 * 100) / 100) + '</td></tr>';
      h += '<tr><td>近60日</td><td>' + rdEsc(String(w['60'] != null ? w['60'] : 0)) + '%</td><td>' + mu60 + '</td><td>' + (Math.round(w60 * mu60 * 100) / 100) + '</td></tr>';
      h += '</tbody></table>';
      h += '<div class="rd-metro-result">基础日均 X = <strong>' + X + '</strong></div>';

        '<button type="button" class="btn-search" disabled>搜索</button>' +
        '</div></div>' +
        '<div class="rd-table-slot">SKU 明细表格占位（多列销量、库存等可在此挂载）</div>' +
        '</div></div>' +

        '</div>' +
        '</div>' +
        '<div id="rd-panel-forecast">' +
        '<div class="rd-fc-inner">' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">预测规则</div>' +
        '<div class="rd-module-bd">' +
        rdBuildForecastRuleFieldsHtml(applicableForecast) +
        '</div></div>' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">销量预测结果</div>' +
        '<div class="rd-module-bd">' +
        '<p class="rd-fc-hint">' + rdEsc(chartHint) + '</p>' +
        '<div class="rd-fc-chart-host" id="rd-fc-chart-host"></div>' +
        '</div></div>' +

        '<div class="rd-module">' +
        '<div class="rd-module-hd">计算过程解析</div>' +
        '<div class="rd-module-bd">' +
        '<div id="rd-fc-calc-process">' +
        rdBuildCalcProcessHtml(code, defaultRuleId) +
        '</div></div></div>' +

        '</div>' +
        '</div>' +
        '</div>';
      rdInitForecastRuleSelector(code, applicableForecast);
    }

    function rdSetTab(name) {
      var panelD = document.getElementById('rd-panel-detail');
      var panelF = document.getElementById('rd-panel-forecast');
      if (!panelD || !panelF) return;
      document.querySelectorAll('#rd-nav-tabs [data-rd-tab]').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-rd-tab') === name);
      });
      if (name === 'detail') {
        panelD.classList.remove('rd-panel--hidden');
        panelF.classList.remove('rd-panel--visible');
      } else if (name === 'forecast') {
        panelD.classList.add('rd-panel--hidden');
        panelF.classList.add('rd-panel--visible');
        requestAnimationFrame(function() {
          setTimeout(rdResizeForecastChart, 0);
        });
      }
    }

    function rdBindDetailTabs() {
      document.querySelectorAll('#rd-nav-tabs [data-rd-tab]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var t = btn.getAttribute('data-rd-tab');
          if (t === 'detail' || t === 'forecast') rdSetTab(t);
        });
      });
    }

    rdRender();
    rdBindDetailTabs();

    function initSidebarMenu() {
      var appLayout = document.querySelector('.app-layout');
      var backdrop = document.getElementById('sidebar-backdrop');
      var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
      var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
      var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
      var replenishPanel = document.getElementById('replenish-submenu');
      var protoPanel = document.getElementById('proto-submenu');
      var systemPanel = document.getElementById('system-submenu');
      if (!appLayout || !backdrop) return;

      function restorePrimaryCurrent() {
        document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
          el.classList.add('active');
        });
      }

      function closeAllSubmenus() {
        appLayout.classList.remove('submenu-open');
        if (replenishPanel) replenishPanel.classList.remove('open');
        if (protoPanel) protoPanel.classList.remove('open');
        if (systemPanel) systemPanel.classList.remove('open');
        if (replenishTrigger) replenishTrigger.classList.remove('active');
        if (protoTrigger) protoTrigger.classList.remove('active');
        if (systemTrigger) systemTrigger.classList.remove('active');
        restorePrimaryCurrent();
      }

      function bindToggle(trigger, panel) {
        if (!trigger || !panel) return;
        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          if (panel.classList.contains('open')) {
            closeAllSubmenus();
            return;
          }
          appLayout.classList.remove('submenu-open');
          if (replenishPanel) replenishPanel.classList.remove('open');
          if (protoPanel) protoPanel.classList.remove('open');
          if (systemPanel) systemPanel.classList.remove('open');
          if (replenishTrigger) replenishTrigger.classList.remove('active');
          if (protoTrigger) protoTrigger.classList.remove('active');
          if (systemTrigger) systemTrigger.classList.remove('active');
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.remove('active');
          });
          appLayout.classList.add('submenu-open');
          panel.classList.add('open');
          trigger.classList.add('active');
        });
      }

      bindToggle(replenishTrigger, replenishPanel);
      bindToggle(protoTrigger, protoPanel);
      bindToggle(systemTrigger, systemPanel);
      backdrop.addEventListener('click', closeAllSubmenus);
      document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
        a.addEventListener('click', closeAllSubmenus);
      });
      document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
        item.addEventListener('click', function(e) { e.preventDefault(); });
      });
    }

    initSidebarMenu();
  </script>
</body>
</html>
