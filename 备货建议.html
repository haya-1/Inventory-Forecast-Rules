<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>备货建议</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f7fa;
      color: #303133;
      font-size: 14px;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 88px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: row;
      overflow: visible;
      background: transparent;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.08);
      z-index: 1200;
    }

    .sidebar-primary {
      width: 88px;
      background: linear-gradient(180deg, #2f47a6 0%, #1f2a78 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    .sidebar-brand {
      width: 100%;
      padding: 6px 0 14px;
      text-align: center;
    }

    .sidebar-brand h2 {
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .sidebar-nav {
      width: 100%;
      padding: 4px 0;
    }

    .primary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 58px;
      margin: 6px 10px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 12px;
    }

    .primary-item:hover,
    .primary-item.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .item-icon {
      font-size: 16px;
    }

    .sidebar-submenu-panel {
      position: fixed;
      left: 88px;
      top: 0;
      bottom: 0;
      width: 184px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 18px 14px;
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.24s ease, opacity 0.2s ease;
      z-index: 1202;
      box-shadow: 4px 0 18px rgba(0, 0, 0, 0.07);
    }

    .sidebar-submenu-panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .submenu-title {
      font-size: 24px;
      color: #111827;
      margin-bottom: 14px;
    }

    .submenu-item {
      display: block;
      color: #374151;
      text-decoration: none;
      padding: 10px 10px;
      margin-bottom: 6px;
      border-radius: 8px;
      font-size: 14px;
    }

    .submenu-item:hover {
      background: #f3f4f6;
    }

    .submenu-item.active {
      background: #eef2ff;
      color: #2563eb;
      font-weight: 600;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1190;
    }

    .app-layout.submenu-open .sidebar-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .main-content {
      flex: 1;
      min-height: 100vh;
      margin-left: 88px;
      background: #f5f7fa;
      max-width: calc(100vw - 88px);
      overflow-x: hidden;
    }

    .page-wrap {
      padding: 16px 20px 24px;
    }

    .panel {
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ebeef5;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .panel + .panel {
      margin-top: 12px;
    }

    .panel-body {
      padding: 16px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #303133;
      line-height: 1.4;
    }

    .page-subtitle {
      margin-top: 4px;
      color: #909399;
      font-size: 12px;
      line-height: 1.5;
    }

    .head-actions,
    .filter-actions,
    .table-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 18px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      color: #606266;
      white-space: nowrap;
      font-size: 13px;
    }

    .filter-control {
      height: 32px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      padding: 0 10px;
      color: #606266;
      outline: none;
      background: #fff;
      font-size: 13px;
    }

    .filter-control:focus {
      border-color: #409eff;
    }

    .w-120 { width: 120px; }
    .w-140 { width: 140px; }
    .w-160 { width: 160px; }
    .w-200 { width: 200px; }

    .btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      background: #fff;
      color: #606266;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      font-size: 13px;
    }

    .btn:hover {
      color: #409eff;
      border-color: #c6e2ff;
      background: #ecf5ff;
    }

    .btn-primary {
      color: #fff;
      background: #409eff;
      border-color: #409eff;
    }

    .btn-primary:hover {
      color: #fff;
      background: #66b1ff;
      border-color: #66b1ff;
    }

    .btn-text {
      border: none;
      background: transparent;
      color: #409eff;
      height: 24px;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-text:hover {
      color: #66b1ff;
      background: transparent;
    }

    .checkbox-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #606266;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .checkbox-line input {
      width: 15px;
      height: 15px;
      accent-color: #409eff;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .metric-card {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fff;
      padding: 14px 16px;
      min-height: 82px;
      cursor: pointer;
      text-align: left;
    }

    .metric-card:hover,
    .metric-card.active {
      border-color: #b3d8ff;
      background: #f5faff;
    }

    .metric-label {
      font-size: 12px;
      color: #909399;
      line-height: 1.4;
    }

    .metric-value {
      display: block;
      margin-top: 8px;
      color: #303133;
      font-size: 24px;
      font-weight: 600;
      line-height: 1.1;
    }

    .metric-hint {
      display: block;
      margin-top: 6px;
      color: #909399;
      font-size: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #303133;
    }

    .section-note {
      color: #909399;
      font-size: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #ebeef5;
      border-radius: 4px;
    }

    .data-table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      table-layout: fixed;
      color: #606266;
    }

    .data-table th,
    .data-table td,
    .detail-table th,
    .detail-table td {
      border-bottom: 1px solid #ebeef5;
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.45;
      font-size: 13px;
    }

    .data-table th,
    .detail-table th {
      background: #f5f7fa;
      color: #606266;
      font-weight: 600;
    }

    .data-table tbody tr {
      cursor: pointer;
    }

    .data-table tbody tr:hover td,
    .data-table tbody tr.active td {
      background: #fafcff;
    }

    .num {
      text-align: right !important;
      font-variant-numeric: tabular-nums;
    }

    .strong-num {
      color: #303133;
      font-weight: 600;
    }

    .sku-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .sku-code {
      color: #303133;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sku-sub {
      color: #909399;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .tag-danger {
      color: #f56c6c;
      background: #fef0f0;
      border-color: #fde2e2;
    }

    .tag-warning {
      color: #e6a23c;
      background: #fdf6ec;
      border-color: #faecd8;
    }

    .tag-success {
      color: #67c23a;
      background: #f0f9eb;
      border-color: #e1f3d8;
    }

    .tag-info {
      color: #409eff;
      background: #ecf5ff;
      border-color: #d9ecff;
    }

    .tag-neutral {
      color: #606266;
      background: #f4f4f5;
      border-color: #e9e9eb;
    }

    .drawer-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1250;
    }

    .drawer-mask.show {
      display: block;
    }

    .detail-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 760px;
      max-width: 96vw;
      height: 100vh;
      background: #fff;
      z-index: 1260;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.12);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .detail-drawer.open {
      transform: translateX(0);
    }

    .drawer-fixed {
      flex-shrink: 0;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #ebeef5;
      background: #fff;
    }

    .drawer-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .drawer-title {
      font-size: 17px;
      font-weight: 600;
      color: #303133;
      line-height: 1.35;
    }

    .drawer-subtitle {
      margin-top: 4px;
      color: #909399;
      font-size: 12px;
      line-height: 1.5;
    }

    .drawer-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #909399;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .decision-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .decision-item {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fafafa;
      padding: 10px 12px;
      min-height: 62px;
    }

    .decision-item span {
      display: block;
      color: #909399;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .decision-item strong {
      display: block;
      color: #303133;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-anchor-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .drawer-anchors {
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid transparent;
    }

    .drawer-anchor {
      border: none;
      background: transparent;
      color: #606266;
      height: 30px;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .drawer-anchor:hover,
    .drawer-anchor.active {
      color: #409eff;
      font-weight: 600;
    }

    .drawer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .drawer-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px 24px;
    }

    .drawer-section {
      margin-bottom: 16px;
    }

    .drawer-section:last-child {
      margin-bottom: 0;
    }

    .drawer-subhead {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .drawer-subhead-bar {
      width: 3px;
      height: 13px;
      border-radius: 2px;
      background: #a0cfff;
      flex-shrink: 0;
    }

    .drawer-subhead-text {
      font-size: 13px;
      font-weight: 500;
      color: #606266;
      letter-spacing: 0.02em;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .info-box {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      padding: 12px 14px;
      background: #fff;
      min-height: 78px;
    }

    .info-box.warn {
      background: #fffaf0;
      border-color: #faecd8;
    }

    .info-box.danger {
      background: #fff7f7;
      border-color: #fde2e2;
    }

    .info-box-title {
      color: #303133;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .info-box-text {
      color: #606266;
      font-size: 13px;
      line-height: 1.6;
    }

    .projection-wrap {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fff;
      padding: 12px;
    }

    .projection-chart {
      width: 100%;
      height: 220px;
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fafafa;
      overflow: hidden;
    }

    .projection-chart svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chart-legend {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-top: 10px;
      color: #606266;
      font-size: 12px;
    }

    .legend-line,
    .legend-block {
      display: inline-block;
      width: 18px;
      height: 3px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .legend-line.blue { background: #409eff; }
    .legend-line.orange { background: #e6a23c; }
    .legend-block.red { background: rgba(245, 108, 108, 0.18); height: 10px; }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid #ebeef5;
      margin-top: 12px;
    }

    .formula-block {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fafafa;
      padding: 12px 14px;
      color: #606266;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .formula-block strong {
      color: #303133;
    }

    .empty-row {
      text-align: center !important;
      color: #909399;
      padding: 28px !important;
    }

    .primary-item[data-submenu="proto"],
    #proto-submenu {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .decision-summary,
      .info-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 768px) {
      .sidebar-submenu-panel,
      .sidebar-backdrop {
        display: none;
      }

      .main-content {
        margin-left: 88px;
      }

      .page-head,
      .section-head {
        display: block;
      }

      .head-actions,
      .table-actions {
        margin-top: 10px;
      }

      .metric-grid,
      .decision-summary,
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-primary">
        <div class="sidebar-brand">
          <h2><span class="brand-icon">📦</span><span>OMS</span></h2>
        </div>
        <nav class="sidebar-nav">
          <a class="primary-item" href="./index.html"><span class="item-icon">🏠</span><span class="item-label">首页</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">数据决策</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">运营工具</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">目标</span></a>
          <a class="primary-item active" href="#" data-submenu="replenish" data-primary-current="true"><span class="item-icon">⚙️</span><span class="item-label">补货</span></a>
          <a class="primary-item" href="#" data-submenu="system"><span class="item-icon">⚙️</span><span class="item-label">系统配置</span></a>
          <a class="primary-item" href="#" data-submenu="proto"><span class="item-icon">⚙️</span><span class="item-label">初始原型</span></a>
        </nav>
      </div>
      <div class="sidebar-submenu-panel" id="replenish-submenu">
        <a class="submenu-item" href="./补货列表.html">补货列表</a>
        <a class="submenu-item active" href="./备货建议.html">备货建议</a>
      </div>
      <div class="sidebar-submenu-panel" id="system-submenu">
        <div class="submenu-title">系统配置</div>
        <a class="submenu-item" href="./销量预测规则.html">销量预测规则</a>
        <a class="submenu-item" href="./备货规则配置.html">备货规则</a>
      </div>
      <div class="sidebar-submenu-panel" id="proto-submenu">
        <div class="submenu-title">初始原型</div>
        <a class="submenu-item" href="./预测规则配置页面_v1.html">备货规则</a>
        <a class="submenu-item" href="./预警页面_v1.html">预警模型</a>
        <a class="submenu-item" href="./预警消息页面_v1.html">预警消息</a>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <main class="main-content">
      <div class="page-wrap">
        <div class="page-head", style="display: none;">
          <div >
            <div class="page-title">备货建议</div>
            <div class="page-subtitle">基于预测销量、库存、采购与物流时效生成父体维度备货建议。</div>
          </div>
          <div class="head-actions">
            <button type="button" class="btn" id="btn-export-top">导出</button>
            <button type="button" class="btn btn-primary" id="btn-plan-top">生成计划</button>
          </div>
        </div>

        <section class="panel">
          <div class="panel-body">
            <div class="filter-bar">
              <div class="filter-item">
                <span class="filter-label">决策日期 D</span>
                <input class="filter-control w-140" id="filter-date" type="date" />
              </div>
              <div class="filter-item">
                <span class="filter-label">父体 / 子体</span>
                <input class="filter-control w-200" id="filter-keyword" type="text" placeholder="请输入父体或 SKU" />
              </div>
              <div class="filter-item">
                <span class="filter-label">运输方式</span>
                <select class="filter-control w-120" id="filter-method">
                  <option value="">全部</option>
                  <option value="快船">快船</option>
                  <option value="慢船">慢船</option>
                  <option value="空派">空派</option>
                </select>
              </div>
              <div class="filter-item">
                <span class="filter-label">适用规则</span>
                <select class="filter-control w-200" id="filter-rule">
                  <option value="">全部规则</option>
                </select>
              </div>
              <label class="checkbox-line">
                <input type="checkbox" id="filter-positive" />
                只看有建议量
              </label>
              <div class="filter-actions">
                <button type="button" class="btn btn-primary" id="btn-search">查询</button>
                <button type="button" class="btn" id="btn-reset">重置</button>
              </div>
            </div>

            <div class="metric-grid" id="metric-grid">
              <button type="button" class="metric-card" data-metric="all">

  <script>
    (function initParentLevelStockingSuggestionPage() {
      var PARENT_STORAGE_KEY = 'sf_replenish_parent_list_v1';
      var RULE_STORAGE_KEY = 'stocking_rule_config_rules_v2';
      var childSuggestions = [];
      var parentSuggestions = [];
      var currentSuggestion = null;

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function toInt(value, fallback) {
        var n = parseInt(value, 10);
        if (Number.isNaN(n)) return fallback || 0;
        return n;
      }

      function formatNum(value) {
        return Number(value || 0).toLocaleString('zh-CN');
      }

      function todayString() {
        var d = new Date();
        var pad = function(n) { return n < 10 ? '0' + n : String(n); };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
      }

      function defaultParentList() {
        return [
          { code: 'LFT00002261', asin: 'B083J69DSQ', platform: 'Amazon', site: '美国', store: 'noorkie Inc-US', spu: 'ST18106', owner: '陈柏宏', days: '0/0' },
          { code: 'LFT00002260', asin: 'B09K799DH7', platform: 'Amazon', site: '美国', store: 'STQWALKING_sandbox-US', spu: 'ST210808', owner: '黄国阳', days: '0/0' },
          { code: 'LFT00000784', asin: 'B07NV7QK7H', platform: 'Amazon', site: '英国', store: 'STEP QUEEN INC-UK', spu: 'HK1839', owner: '黄利萍', days: '0/0' },
          { code: 'LFT00000783', asin: 'B0F8GGJ7LK', platform: 'Amazon', site: '英国', store: 'STEP QUEEN INC-UK', spu: 'STK2527157', owner: '余滢', days: '0/0' },
          { code: 'LFT00000778', asin: 'B0F8GTKXQK', platform: 'Amazon', site: '德国', store: 'STEP QUEEN INC-DE', spu: 'STK2527157', owner: '余滢', days: '0/0' },
          { code: 'LFT00000755', asin: 'B0GLNK47Y9', platform: 'Amazon', site: '美国', store: 'STQ Inc-US', spu: 'WT82527258', owner: '黄利萍', days: '0/5' }
        ];
      }

      function loadParents() {
        try {
          var raw = localStorage.getItem(PARENT_STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : null;
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (err) {}
        var list = defaultParentList();
        try {
          localStorage.setItem(PARENT_STORAGE_KEY, JSON.stringify(list));
        } catch (err2) {}
        return list;
      }

      function defaultRules() {
        return [
          {
            id: 'BR20260521001',
            name: '北美站标准备货规则',
            enabled: true,
            form: {
              parentCodes: ['LFT00002261', 'LFT00002260', 'LFT00000755'],
              procurement: { purchaseLead: 30, purchaseFrequency: 15, pickupPrep: 7, qualityInspection: 2 },
              fbaSafetyDays: 28,
              logisticsSites: [
                { key: 'northAmerica', name: '北美站', enabled: true, shipFrequencyDays: 7, methods: [{ key: 'fastShip', name: '快船', leadTimeDays: 35 }, { key: 'slowShip', name: '普船', leadTimeDays: 55 }] },
                { key: 'europe', name: '欧洲站', enabled: true, shipFrequencyDays: 7, methods: [{ key: 'fastShip', name: '快船', leadTimeDays: 40 }, { key: 'slowShip', name: '普船', leadTimeDays: 60 }] }
              ],
              calculation: { deductStockoutSales: true }
            }
          },
          {
            id: 'BR20260521002',
            name: '欧洲站稳态备货规则',
            enabled: true,
            form: {
              parentCodes: ['LFT00000784', 'LFT00000783', 'LFT00000778'],
              procurement: { purchaseLead: 32, purchaseFrequency: 16, pickupPrep: 7, qualityInspection: 3 },
              fbaSafetyDays: 30,
              logisticsSites: [
                { key: 'northAmerica', name: '北美站', enabled: true, shipFrequencyDays: 7, methods: [{ key: 'fastShip', name: '快船', leadTimeDays: 35 }, { key: 'slowShip', name: '普船', leadTimeDays: 55 }] },
                { key: 'europe', name: '欧洲站', enabled: true, shipFrequencyDays: 7, methods: [{ key: 'fastShip', name: '快船', leadTimeDays: 40 }, { key: 'slowShip', name: '普船', leadTimeDays: 60 }] }
              ],
              calculation: { deductStockoutSales: true }
            }
          }
        ];
      }

      function loadRules() {
        try {
          var raw = localStorage.getItem(RULE_STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : null;
          if (Array.isArray(parsed) && parsed.length) return parsed.filter(function(rule) { return rule.enabled !== false; });
        } catch (err) {}
        return defaultRules();
      }

      function normalizeRule(rule) {
        var form = rule && rule.form ? rule.form : {};
        var procurement = form.procurement || {};
        var logisticsSites = Array.isArray(form.logisticsSites) ? form.logisticsSites : [];
        return {
          id: rule.id || '',
          name: rule.name || '默认备货规则',
          parentCodes: Array.isArray(form.parentCodes) ? form.parentCodes : [],
          procurement: {
            purchaseLead: toInt(procurement.purchaseLead, 30),
            purchaseFrequency: toInt(procurement.purchaseFrequency, 15),
            pickupPrep: toInt(procurement.pickupPrep, 7),
            qualityInspection: toInt(procurement.qualityInspection, 2)
          },
          fbaSafetyDays: toInt(form.fbaSafetyDays, 28),
          logisticsSites: logisticsSites.length ? logisticsSites : defaultRules()[0].form.logisticsSites,
          calculation: form.calculation || { deductStockoutSales: true }
        };
      }

      function siteGroup(site) {
        if (/美|US|美国|加拿大|墨西哥/.test(site || '')) return '北美站';
        return '欧洲站';
      }

      function logisticsKey(siteName) {
        return siteName === '北美站' ? 'northAmerica' : 'europe';
      }

      function findRuleForParent(parent, rules) {
        var normalized = rules.map(normalizeRule);
        var matched = normalized.filter(function(rule) {
          return rule.parentCodes.indexOf(parent.code) !== -1;
        })[0];
        var unbound = normalized.filter(function(rule) {
          return !rule.parentCodes.length;
        })[0];
        return matched || unbound || normalized[0] || normalizeRule(defaultRules()[0]);
      }

      function availableMethods(rule, siteName) {
        var site = (rule.logisticsSites || []).filter(function(item) {
          return item.key === logisticsKey(siteName) || item.name === siteName;
        })[0] || {};
        return (Array.isArray(site.methods) ? site.methods : []).filter(function(method) {
          return method && method.name && method.leadTimeDays != null;
        }).map(function(method) {
          return {
            siteName: site.name || siteName,
            methodName: method.name,
            leadTimeDays: toInt(method.leadTimeDays, siteName === '北美站' ? 35 : 40),
            shipFrequencyDays: toInt(site.shipFrequencyDays, 7)
          };
        });
      }

      function findLogistics(rule, siteName, index) {
        var methods = availableMethods(rule, siteName);
        if (!methods.length) return null;
        return methods[index % methods.length];
      }

      function childCountForParent(index) {
        return [4, 3, 5, 2, 4, 3][index % 6];
      }

      function pad2(value) {
        return value < 10 ? '0' + value : String(value);
      }

      function childAsin(parent, childIndex) {
        var base = (parent.asin || 'ASIN000000').replace(/[^A-Z0-9]/gi, '').toUpperCase();
        return base.slice(0, 8) + pad2(childIndex + 1);
      }

      function getTagMeta(index) {
        var sales = ['A - 爆款', 'B - 旺款', 'C - 利润款'][index % 3];
        var lifecycle = ['新品（0-3月）', '新品（3-9月）', '老品（9个月以上）'][index % 3];
        var color = ['主色', '次色', '边缘色'][index % 3];
        var traffic = index % 2 === 0 ? 'OR 自然流量 ASIN' : 'AD 广告流量 ASIN';
        var safety = sales.indexOf('A') === 0 || lifecycle.indexOf('新品（0-3月）') === 0 || color === '主色' || traffic.indexOf('OR') === 0 ? 45 : (sales.indexOf('B') === 0 ? 28 : 20);
        return { sales: sales, lifecycle: lifecycle, color: color, traffic: traffic, safety: safety };
      }

      function forecastAt(base, day) {
        var weekly = [1.05, 1.0, 0.94, 1.02, 1.08, 1.18, 1.12][day % 7];
        var trend = 1 + Math.min(day, 120) * 0.0015;
        return Math.max(1, Math.round(base * weekly * trend));
      }

      function forecastSum(base, days) {
        var sum = 0;
        for (var i = 0; i < days; i += 1) sum += forecastAt(base, i);
        return sum;
      }

      function makeProjection(base, fbaInventory, inboundDay, inboundQty, horizon) {
        var rows = [];
        var stock = fbaInventory;
        for (var day = 0; day < horizon; day += 1) {
          var inbound = day === inboundDay ? inboundQty : 0;
          var start = Math.max(0, stock) + inbound;
          var forecast = forecastAt(base, day);
          var loss = forecast - Math.min(start, forecast);
          var end = Math.max(0, start - forecast);
          rows.push({ day: day, forecastSales: forecast, stockoutLoss: Math.round(loss) });
          stock = end;
        }
        return rows;
      }

      function stockoutDeduction(projection, earliestAvailableDays) {
        return projection.filter(function(row) {
          return row.day < earliestAvailableDays;
        }).reduce(function(sum, row) {
          return sum + row.stockoutLoss;
        }, 0);
      }

      function makeChildSuggestion(parent, parentIndex, childIndex, rules) {
        var rule = findRuleForParent(parent, rules);
        var siteName = siteGroup(parent.site);
        var logistics = findLogistics(rule, siteName, parentIndex + childIndex);
        if (!rule || !logistics) return null;
        var sequence = parentIndex * 5 + childIndex;
        var tags = getTagMeta(sequence);
        var safetyDays = Math.max(rule.fbaSafetyDays, tags.safety);
        var procurement = rule.procurement;
        var procurementDelivery = procurement.purchaseLead + procurement.pickupPrep + procurement.qualityInspection;
        var procurementCycle = procurementDelivery + procurement.purchaseFrequency;
        var shipCoverageDays = logistics.leadTimeDays + safetyDays + logistics.shipFrequencyDays;
        var orderCoverageDays = procurementCycle + logistics.leadTimeDays + safetyDays + logistics.shipFrequencyDays;
        var orderEarliestAvailableDays = procurementDelivery + logistics.leadTimeDays;
        var baseSales = [78, 52, 36, 64, 42, 28, 58, 46][sequence % 8];
        var fbaInventory = [50, 650, 90, 120, 820, 20, 340, 180][sequence % 8];
        var fbaInbound = [110, 520, 30, 260, 700, 0, 220, 90][sequence % 8];
        var cnAvailable = [260, 180, 120, 300, 80, 40, 160, 210][sequence % 8];
        var purchaseInbound = [170, 120, 60, 280, 540, 30, 110, 190][sequence % 8];
        var inboundDay = [36, 68, 12, 45, 88, 30, 52, 24][sequence % 8];
        if (sequence % 8 === 4) {
          fbaInventory = forecastSum(baseSales, orderCoverageDays) + 500;
          fbaInbound = 0;
          cnAvailable = 600;
          purchaseInbound = 800;
          inboundDay = 0;
        }
        var projection = makeProjection(baseSales, fbaInventory, inboundDay, fbaInbound, Math.min(orderCoverageDays, 150));
        var shipForecastSum = forecastSum(baseSales, shipCoverageDays);
        var orderForecastSum = forecastSum(baseSales, orderCoverageDays);
        var deductEnabled = rule.calculation.deductStockoutSales !== false;
        var shipDeduction = deductEnabled ? stockoutDeduction(projection, logistics.leadTimeDays) : 0;
        var orderDeduction = deductEnabled ? stockoutDeduction(projection, orderEarliestAvailableDays) : 0;
        var shipInventoryDeduction = fbaInventory + fbaInbound;
        var orderInventoryDeduction = fbaInventory + fbaInbound + cnAvailable + purchaseInbound;
        var shipSuggested = Math.max(0, Math.ceil(shipForecastSum - shipInventoryDeduction - shipDeduction));
        var orderSuggested = Math.max(0, Math.ceil(orderForecastSum - orderInventoryDeduction - orderDeduction));
        return {
          id: parent.code + '-SKU' + pad2(childIndex + 1) + '-' + logistics.methodName,
          childSku: parent.code + '-SKU' + pad2(childIndex + 1),
          asin: childAsin(parent, childIndex),
          parentCode: parent.code,
          parentName: parent.spu || parent.code,
          store: parent.store || '-',
          site: siteName,
          method: logistics.methodName,
          ruleId: rule.id,
          ruleName: rule.name,
          tags: tags,
          tagText: tags.sales + ' / ' + tags.lifecycle.replace('新品（', '新').replace('）', '') + ' / ' + tags.color,
          safetyDays: safetyDays,
          shipSuggestedQty: shipSuggested,
          orderSuggestedQty: orderSuggested,
          logisticsLeadDays: logistics.leadTimeDays,
          shipFrequencyDays: logistics.shipFrequencyDays,
          procurementCycleDays: procurementCycle,
          shipCoverageDays: shipCoverageDays,
          orderCoverageDays: orderCoverageDays,
          shipForecastSum: shipForecastSum,
          orderForecastSum: orderForecastSum,
          shipInventoryDeduction: shipInventoryDeduction,
          orderInventoryDeduction: orderInventoryDeduction,
          shipDeduction: shipDeduction,
          orderDeduction: orderDeduction
        };
      }

      function buildSuggestions() {
        var parents = loadParents();
        var rules = loadRules();
        childSuggestions = [];
        parents.forEach(function(parent, parentIndex) {
          for (var i = 0; i < childCountForParent(parentIndex); i += 1) {
            var item = makeChildSuggestion(parent, parentIndex, i, rules);
            if (item) childSuggestions.push(item);
          }
        });
      }

      function uniqueList(list) {
        var seen = {};
        return list.filter(function(item) {
          if (!item || seen[item]) return false;
          seen[item] = true;
          return true;
        }).sort(function(a, b) {
          return String(a).localeCompare(String(b), 'zh-CN');
        });
      }

      function methodText(methods) {
        if (!methods.length) return '-';
        return methods.slice(0, 3).join(' / ') + (methods.length > 3 ? ' +' + (methods.length - 3) : '');
      }

      function coverageText(start, end) {
        return 'D+' + start + ' ~ D+' + end;
      }

      function populateRuleFilter() {
        var select = document.getElementById('filter-rule');
        var rules = loadRules();
        var seen = {};
        rules.forEach(function(rule) {
          if (seen[rule.id]) return;
          seen[rule.id] = true;
          var option = document.createElement('option');
          option.value = rule.id;
          option.textContent = rule.name || rule.id;
          select.appendChild(option);
        });
      }

      function currentFilters() {
        return {
          keyword: (document.getElementById('filter-keyword').value || '').trim().toLowerCase(),
          method: document.getElementById('filter-method').value,
          ruleId: document.getElementById('filter-rule').value,
          positiveOnly: document.getElementById('filter-positive').checked
        };
      }

      function filterChildren() {
        var f = currentFilters();
        return childSuggestions.filter(function(item) {
          if (f.method && item.method !== f.method) return false;
          if (f.ruleId && item.ruleId !== f.ruleId) return false;
          if (f.keyword) {
            var hay = [item.childSku, item.parentCode, item.asin, item.parentName].join(' ').toLowerCase();
            if (hay.indexOf(f.keyword) === -1) return false;
          }
          return true;
        });
      }

      function aggregateParentSuggestions(children) {
        var map = {};
        children.forEach(function(child) {
          if (!map[child.parentCode]) {
            map[child.parentCode] = {
              id: child.parentCode,
              parentCode: child.parentCode,
              parentName: child.parentName,
              ruleNames: [],
              methods: [],
              childItems: [],
              shipSuggestedQty: 0,
              orderSuggestedQty: 0
            };
          }
          var parent = map[child.parentCode];
          parent.childItems.push(child);
          parent.shipSuggestedQty += child.shipSuggestedQty;
          parent.orderSuggestedQty += child.orderSuggestedQty;
          parent.ruleNames.push(child.ruleName);
          parent.methods.push(child.method);
        });
        return Object.keys(map).map(function(key) {
          var parent = map[key];
          parent.ruleNames = uniqueList(parent.ruleNames);
          parent.methods = uniqueList(parent.methods);
          parent.childCount = parent.childItems.length;
          parent.methodText = methodText(parent.methods);
          parent.ruleText = parent.ruleNames.join(' / ');
          return parent;
        }).filter(function(parent) {
          var f = currentFilters();
          return !f.positiveOnly || parent.shipSuggestedQty > 0 || parent.orderSuggestedQty > 0;
        }).sort(function(a, b) {
          return (b.shipSuggestedQty + b.orderSuggestedQty) - (a.shipSuggestedQty + a.orderSuggestedQty) ||
            a.parentCode.localeCompare(b.parentCode);
        });
      }

      function currentParentList() {
        parentSuggestions = aggregateParentSuggestions(filterChildren());
        return parentSuggestions;
      }

      function renderMetrics(list) {
        document.getElementById('metric-ship').textContent = formatNum(list.reduce(function(sum, item) { return sum + item.shipSuggestedQty; }, 0));
        document.getElementById('metric-order').textContent = formatNum(list.reduce(function(sum, item) { return sum + item.orderSuggestedQty; }, 0));
        document.getElementById('metric-parent-count').textContent = formatNum(list.length);
        document.getElementById('metric-child-count').textContent = formatNum(list.reduce(function(sum, item) { return sum + item.childCount; }, 0));
      }

      function renderTable() {
        var list = currentParentList();
        renderMetrics(list);
        var tbody = document.getElementById('suggestion-tbody');
        tbody.innerHTML = '';
        if (!list.length) {
          tbody.innerHTML = '<tr><td class="empty-row" colspan="6">暂无备货建议</td></tr>';
        } else {
          list.forEach(function(item) {
            var tr = document.createElement('tr');
            tr.setAttribute('data-id', item.id);
            tr.innerHTML =
              '<td><div class="sku-cell"><span class="sku-code">' + escapeHtml(item.parentCode) + '</span><span class="sku-sub">' + escapeHtml(item.ruleText || '-') + '</span></div></td>' +
              '<td class="num">' + formatNum(item.childCount) + '</td>' +
              '<td>' + escapeHtml(item.methodText) + '</td>' +
              '<td class="num strong-num">' + formatNum(item.shipSuggestedQty) + '</td>' +
              '<td class="num strong-num">' + formatNum(item.orderSuggestedQty) + '</td>' +
              '<td><button type="button" class="btn-text" data-action="detail" data-id="' + escapeHtml(item.id) + '">查看详情</button></td>';
            tbody.appendChild(tr);
          });
        }
        document.getElementById('result-count').textContent = '共 ' + list.length + ' 条';
      }

      function renderSummaryDetail(item) {
        document.getElementById('summary-detail').innerHTML =
          '<div class="formula-block"><strong>父体编号</strong><br>' + escapeHtml(item.parentCode) + '</div>' +
          '<div class="formula-block"><strong>适用规则</strong><br>' + escapeHtml(item.ruleText || '-') + '</div>' +
          '<div class="formula-block"><strong>父体建议量口径</strong><br>' +
          '父体发货建议总量 = Σ 子体发货最终建议量 = ' + formatNum(item.shipSuggestedQty) + '<br>' +
          '父体下单建议总量 = Σ 子体下单最终建议量 = ' + formatNum(item.orderSuggestedQty) + '</div>';
      }

      function renderChildDetail(item) {
        var rows = item.childItems.map(function(child) {
          return '<tr>' +
            '<td><div class="sku-cell"><span class="sku-code">' + escapeHtml(child.childSku) + '</span><span class="sku-sub">' + escapeHtml(child.tagText) + '</span></div></td>' +
            '<td>' + escapeHtml(child.asin) + '</td>' +
            '<td>' + escapeHtml(child.method) + '</td>' +
            '<td class="num">' + formatNum(child.safetyDays) + '</td>' +
            '<td class="num strong-num">' + formatNum(child.shipSuggestedQty) + '</td>' +
            '<td class="num strong-num">' + formatNum(child.orderSuggestedQty) + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('child-detail').innerHTML =
          '<table class="detail-table"><thead><tr>' +
          '<th>子体 / SKU</th><th>ASIN</th><th>运输方式</th><th class="num">安全天数</th><th class="num">发货建议</th><th class="num">下单建议</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
      }

      function renderMethodDetail(item) {
        var map = {};
        item.childItems.forEach(function(child) {
          if (!map[child.method]) {
            map[child.method] = {
              method: child.method,
              childCount: 0,
              shipSuggestedQty: 0,
              orderSuggestedQty: 0,
              start: child.logisticsLeadDays,
              end: child.shipCoverageDays - 1
            };
          }
          var row = map[child.method];
          row.childCount += 1;
          row.shipSuggestedQty += child.shipSuggestedQty;
          row.orderSuggestedQty += child.orderSuggestedQty;
          row.start = Math.min(row.start, child.logisticsLeadDays);
          row.end = Math.max(row.end, child.shipCoverageDays - 1);
        });
        var rows = Object.keys(map).sort().map(function(key) {
          var row = map[key];
          return '<tr>' +
            '<td>' + escapeHtml(row.method) + '</td>' +
            '<td>' + coverageText(row.start, row.end) + '</td>' +
            '<td class="num">' + formatNum(row.childCount) + '</td>' +
            '<td class="num strong-num">' + formatNum(row.shipSuggestedQty) + '</td>' +
            '<td class="num strong-num">' + formatNum(row.orderSuggestedQty) + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('method-detail').innerHTML =
          '<table class="detail-table"><thead><tr>' +
          '<th>运输方式</th><th>覆盖区间</th><th class="num">子体数</th><th class="num">发货建议</th><th class="num">下单建议</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
      }

      function renderCalcDetail(item) {
        var rows = item.childItems.map(function(child) {
          return '<tr>' +
            '<td>' + escapeHtml(child.childSku) + '</td>' +
            '<td class="num">' + formatNum(child.shipForecastSum) + ' / ' + formatNum(child.orderForecastSum) + '</td>' +
            '<td class="num">' + formatNum(child.shipInventoryDeduction) + ' / ' + formatNum(child.orderInventoryDeduction) + '</td>' +
            '<td class="num">' + formatNum(child.shipDeduction) + ' / ' + formatNum(child.orderDeduction) + '</td>' +
            '<td class="num strong-num">' + formatNum(child.shipSuggestedQty) + ' / ' + formatNum(child.orderSuggestedQty) + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('calc-detail').innerHTML =
          '<div class="formula-block"><strong>父体聚合口径</strong><br>' +
          '父体发货建议总量 = Σ 子体发货最终建议量 = ' + formatNum(item.shipSuggestedQty) + '<br>' +
          '父体下单建议总量 = Σ 子体下单最终建议量 = ' + formatNum(item.orderSuggestedQty) + '<br>' +
          '子体建议量仍按预测销量、库存、采购时效、物流时效计算；多运输方式按到货时间分段，库存扣减项不重复扣减。</div>' +
          '<table class="detail-table"><thead><tr>' +
          '<th>子体 / SKU</th><th class="num">预测销量<br>发货/下单</th><th class="num">库存扣减<br>发货/下单</th><th class="num">扣减项<br>发货/下单</th><th class="num">最终建议<br>发货/下单</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
      }

      function openDrawer(item) {
        currentSuggestion = item;
        document.querySelectorAll('#suggestion-tbody tr').forEach(function(row) {
          row.classList.toggle('active', row.getAttribute('data-id') === item.id);
        });
        document.getElementById('drawer-title').textContent = '父体 ' + item.parentCode + ' 备货详情';
        document.getElementById('drawer-subtitle').textContent = (item.ruleText || '-') + ' / 决策日 ' + document.getElementById('filter-date').value;
        document.getElementById('drawer-ship-qty').textContent = formatNum(item.shipSuggestedQty);
        document.getElementById('drawer-order-qty').textContent = formatNum(item.orderSuggestedQty);
        document.getElementById('drawer-child-count').textContent = formatNum(item.childCount);
        document.getElementById('drawer-methods').textContent = item.methodText;
        renderSummaryDetail(item);
        renderChildDetail(item);
        renderMethodDetail(item);
        renderCalcDetail(item);
        document.getElementById('drawer-mask').classList.add('show');
        document.getElementById('detail-drawer').classList.add('open');
        document.getElementById('detail-drawer').setAttribute('aria-hidden', 'false');
        document.getElementById('drawer-body').scrollTop = 0;
      }

      function closeDrawer() {
        document.getElementById('drawer-mask').classList.remove('show');
        document.getElementById('detail-drawer').classList.remove('open');
        document.getElementById('detail-drawer').setAttribute('aria-hidden', 'true');
      }

      function findSuggestion(id) {
        return parentSuggestions.filter(function(item) { return item.id === id; })[0];
      }

      function render() {
        renderTable();
      }

      function resetFilters() {
        document.getElementById('filter-date').value = todayString();
        document.getElementById('filter-keyword').value = '';
        document.getElementById('filter-method').value = '';
        document.getElementById('filter-rule').value = '';
        document.getElementById('filter-positive').checked = false;
        render();
      }

      function showAction(message) {
        alert(message);
      }

      function initSidebarMenu() {
        var appLayout = document.querySelector('.app-layout');
        var backdrop = document.getElementById('sidebar-backdrop');
        var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
        var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
        var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
        var replenishPanel = document.getElementById('replenish-submenu');
        var protoPanel = document.getElementById('proto-submenu');
        var systemPanel = document.getElementById('system-submenu');
        if (!appLayout || !backdrop) return;

        function restorePrimaryCurrent() {
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.add('active');
          });
        }

        function closeAllSubmenus() {
          appLayout.classList.remove('submenu-open');
          [replenishPanel, protoPanel, systemPanel].forEach(function(panel) {
            if (panel) panel.classList.remove('open');
          });
          [replenishTrigger, protoTrigger, systemTrigger].forEach(function(trigger) {
            if (trigger) trigger.classList.remove('active');
          });
          restorePrimaryCurrent();
        }

        function bindToggle(trigger, panel) {
          if (!trigger || !panel) return;
          trigger.addEventListener('click', function(e) {
            e.preventDefault();
            var willOpen = !panel.classList.contains('open');
            closeAllSubmenus();
            if (willOpen) {
              appLayout.classList.add('submenu-open');
              panel.classList.add('open');
              trigger.classList.add('active');
            }
          });
        }

        bindToggle(replenishTrigger, replenishPanel);
        bindToggle(protoTrigger, protoPanel);
        bindToggle(systemTrigger, systemPanel);
        backdrop.addEventListener('click', closeAllSubmenus);
        document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
          a.addEventListener('click', closeAllSubmenus);
        });
        document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
          item.addEventListener('click', function(e) { e.preventDefault(); });
        });
      }

      document.getElementById('filter-date').value = todayString();
      populateRuleFilter();
      buildSuggestions();
      render();
      initSidebarMenu();

      document.getElementById('btn-search').addEventListener('click', render);
      document.getElementById('btn-reset').addEventListener('click', resetFilters);
      document.getElementById('suggestion-tbody').addEventListener('click', function(e) {
        var row = e.target.closest('tr[data-id]');
        if (!row) return;
        var item = findSuggestion(row.getAttribute('data-id'));
        if (item) openDrawer(item);
      });
      document.getElementById('drawer-mask').addEventListener('click', closeDrawer);
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.querySelectorAll('.drawer-anchor').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var body = document.getElementById('drawer-body');
          var target = document.getElementById(btn.getAttribute('data-anchor'));
          if (!target) return;
          body.scrollTop = target.offsetTop - body.offsetTop - 4;
          document.querySelectorAll('.drawer-anchor').forEach(function(item) {
            item.classList.toggle('active', item === btn);
          });
        });
      });
      document.getElementById('drawer-create-ship').addEventListener('click', function() {
        showAction('生成发货计划入口：' + (currentSuggestion ? currentSuggestion.parentCode : ''));
      });
      document.getElementById('drawer-create-order').addEventListener('click', function() {
        showAction('生成采购计划入口：' + (currentSuggestion ? currentSuggestion.parentCode : ''));
      });
      document.getElementById('drawer-export').addEventListener('click', function() {
        showAction('导出计算明细入口：' + (currentSuggestion ? currentSuggestion.parentCode : ''));
      });
      ['btn-export-top', 'btn-export-table'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function() {
          showAction('导出备货建议入口');
        });
      });
      ['btn-plan-top', 'btn-plan-table'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function() {
          showAction('生成计划入口');
        });
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDrawer();
      });
    })();
  </script>
</body>
</html>
