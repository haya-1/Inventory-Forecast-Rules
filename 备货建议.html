<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>备货建议</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f7fa;
      color: #303133;
      font-size: 14px;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 88px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: row;
      overflow: visible;
      background: transparent;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.08);
      z-index: 1200;
    }

    .sidebar-primary {
      width: 88px;
      background: linear-gradient(180deg, #2f47a6 0%, #1f2a78 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    .sidebar-brand {
      width: 100%;
      padding: 6px 0 14px;
      text-align: center;
    }

    .sidebar-brand h2 {
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .sidebar-nav {
      width: 100%;
      padding: 4px 0;
    }

    .primary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 58px;
      margin: 6px 10px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 12px;
    }

    .primary-item:hover,
    .primary-item.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .item-icon {
      font-size: 16px;
    }

    .sidebar-submenu-panel {
      position: fixed;
      left: 88px;
      top: 0;
      bottom: 0;
      width: 184px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 18px 14px;
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.24s ease, opacity 0.2s ease;
      z-index: 1202;
      box-shadow: 4px 0 18px rgba(0, 0, 0, 0.07);
    }

    .sidebar-submenu-panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .submenu-title {
      font-size: 24px;
      color: #111827;
      margin-bottom: 14px;
    }

    .submenu-item {
      display: block;
      color: #374151;
      text-decoration: none;
      padding: 10px 10px;
      margin-bottom: 6px;
      border-radius: 8px;
      font-size: 14px;
    }

    .submenu-item:hover {
      background: #f3f4f6;
    }

    .submenu-item.active {
      background: #eef2ff;
      color: #2563eb;
      font-weight: 600;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1190;
    }

    .app-layout.submenu-open .sidebar-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .main-content {
      flex: 1;
      min-height: 100vh;
      margin-left: 88px;
      background: #f5f7fa;
      max-width: calc(100vw - 88px);
      overflow-x: hidden;
    }

    .page-wrap {
      padding: 16px 20px 24px;
    }

    .panel {
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ebeef5;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .panel + .panel {
      margin-top: 12px;
    }

    .panel-body {
      padding: 16px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #303133;
      line-height: 1.4;
    }

    .page-subtitle {
      margin-top: 4px;
      color: #909399;
      font-size: 12px;
      line-height: 1.5;
    }

    .head-actions,
    .filter-actions,
    .table-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 18px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      color: #606266;
      white-space: nowrap;
      font-size: 13px;
    }

    .filter-control {
      height: 32px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      padding: 0 10px;
      color: #606266;
      outline: none;
      background: #fff;
      font-size: 13px;
    }

    .filter-control:focus {
      border-color: #409eff;
    }

    .w-120 { width: 120px; }
    .w-140 { width: 140px; }
    .w-160 { width: 160px; }
    .w-180 { width: 180px; }
    .w-200 { width: 200px; }

    .btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      background: #fff;
      color: #606266;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
      font-size: 13px;
    }

    .btn:hover {
      color: #409eff;
      border-color: #c6e2ff;
      background: #ecf5ff;
    }

    .btn-primary {
      color: #fff;
      background: #409eff;
      border-color: #409eff;
    }

    .btn-primary:hover {
      color: #fff;
      background: #66b1ff;
      border-color: #66b1ff;
    }

    .btn:disabled,
    .btn:disabled:hover {
      color: #c0c4cc;
      border-color: #e4e7ed;
      background: #f5f7fa;
      cursor: not-allowed;
    }

    .btn-text {
      border: none;
      background: transparent;
      color: #409eff;
      height: 24px;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-text:hover {
      color: #66b1ff;
      background: transparent;
    }

    .checkbox-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #606266;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .checkbox-line input {
      width: 15px;
      height: 15px;
      accent-color: #409eff;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .metric-grid.split {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metric-note {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 4px;
      background: #fdf6ec;
      border: 1px solid #faecd8;
      color: #b88230;
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-card {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fff;
      padding: 14px 16px;
      min-height: 82px;
      cursor: pointer;
      text-align: left;
    }

    .metric-card:hover,
    .metric-card.active {
      border-color: #b3d8ff;
      background: #f5faff;
    }

    .metric-label {
      font-size: 12px;
      color: #909399;
      line-height: 1.4;
    }

    .metric-value {
      display: block;
      margin-top: 8px;
      color: #303133;
      font-size: 24px;
      font-weight: 600;
      line-height: 1.1;
    }

    .metric-hint {
      display: block;
      margin-top: 6px;
      color: #909399;
      font-size: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #303133;
    }

    .section-note {
      color: #909399;
      font-size: 12px;
    }

    .page-top-tabs {
      display: flex;
      align-items: flex-end;
      gap: 28px;
      padding: 0 20px;
      margin: 0 0 12px;
      border-bottom: 1px solid #e4e7ed;
      background: #fff;
    }

    .page-top-tab {
      position: relative;
      margin: 0;
      padding: 14px 0 12px;
      border: none;
      background: transparent;
      color: #303133;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      line-height: 1.4;
    }

    .page-top-tab:hover {
      color: #409eff;
    }

    .page-top-tab.active {
      color: #409eff;
      font-weight: 600;
    }

    .page-top-tab.active::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: #409eff;
      border-radius: 2px 2px 0 0;
    }

    .suggestion-tabs {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      margin-top: 8px;
      padding: 2px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      background: #f5f7fa;
    }

    .suggestion-tab {
      height: 28px;
      min-width: 86px;
      padding: 0 12px;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: #606266;
      cursor: pointer;
      font-size: 13px;
    }

    .suggestion-tab:hover {
      color: #409eff;
    }

    .suggestion-tab.active {
      background: #409eff;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(64, 158, 255, .18);
    }


    .table-wrap {
      overflow-x: auto;
      border: 1px solid #ebeef5;
      border-radius: 4px;
    }

    .data-table {
      width: 100%;
      min-width: 1620px;
      border-collapse: collapse;
      table-layout: fixed;
      color: #606266;
    }

    .data-table--list tbody tr,
    .list-row-clickable {
      cursor: pointer;
    }

    .parent-code-link {
      border: none;
      padding: 0;
      background: transparent;
      color: #1f6feb;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .parent-code-link:hover {
      color: #409eff;
      text-decoration: underline;
    }

    .doc-gen-count {
      color: #303133;
      font-variant-numeric: tabular-nums;
    }

    .data-table th,
    .data-table td,
    .detail-table th,
    .detail-table td {
      border-bottom: 1px solid #ebeef5;
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.45;
      font-size: 13px;
    }

    .data-table th,
    .detail-table th {
      background: #f5f7fa;
      color: #606266;
      font-weight: 600;
    }

    .th-note {
      display: block;
      margin-top: 2px;
      color: #909399;
      font-size: 12px;
      font-weight: 400;
    }

    .data-table tbody tr {
      cursor: pointer;
    }

    .data-table tbody tr:hover td,
    .data-table tbody tr.active td {
      background: #fafcff;
    }

    .table-action-group {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .select-cell {
      text-align: center !important;
    }

    .select-cell input {
      width: 15px;
      height: 15px;
      accent-color: #409eff;
      cursor: pointer;
    }

    .num {
      text-align: middle !important;
      font-variant-numeric: tabular-nums;
    }

    .strong-num {
      color: #303133;
      font-weight: 600;
    }

    .qty-num {
      font-size: 16px;
      font-weight: 700;
      color: #1f6feb;
      font-variant-numeric: tabular-nums;
    }

    .qty-num.qty-zero {
      color: #909399;
      font-size: 14px;
      font-weight: 600;
      cursor: help;
    }

    .qty-zero-mark {
      font-size: 11px;
      color: #c0c4cc;
    }

    .child-merged-table .child-main td {
      vertical-align: middle;
    }

    .child-expand-cell {
      text-align: right;
      white-space: nowrap;
    }

    .child-expand {
      border: 1px solid #dcdfe6;
      background: #fff;
      color: #409eff;
      font-size: 12px;
      line-height: 1.4;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .child-expand:hover {
      border-color: #409eff;
      background: #f5faff;
    }

    .child-merged-table .child-calc-row > td {
      background: #fafbfc;
      padding: 0;
    }

    .child-calc-panel {
      padding: 10px 14px;
      border-top: 1px dashed #e4e7ed;
    }

    .child-calc-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #303133;
    }

    .calc-term {
      background: #fff;
      border: 1px solid #ebeef5;
      border-radius: 4px;
      padding: 2px 8px;
      font-variant-numeric: tabular-nums;
    }

    .calc-op {
      color: #909399;
      font-weight: 600;
    }

    .calc-result {
      border-color: #b3d8ff;
      background: #f0f7ff;
      color: #1f6feb;
      font-weight: 700;
    }

    .child-calc-note {
      margin-top: 6px;
      font-size: 12px;
      color: #909399;
    }

    .sku-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .sku-code {
      color: #303133;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sku-sub {
      color: #909399;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rule-cell {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
      color: #606266;
      font-size: 12px;
      line-height: 1.5;
    }

    .rule-text {
      flex: 1;
      min-width: 0;
      max-height: 18px;
      overflow: hidden;
      word-break: break-all;
    }

    .rule-cell.expanded .rule-text {
      max-height: none;
    }

    .rule-toggle {
      flex-shrink: 0;
      border: none;
      background: transparent;
      color: #409eff;
      font-size: 12px;
      line-height: 18px;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    .cycle-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .cycle-main {
      color: #303133;
      font-weight: 600;
      white-space: nowrap;
    }

    .cycle-sub {
      color: #909399;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .tag-danger {
      color: #f56c6c;
      background: #fef0f0;
      border-color: #fde2e2;
    }

    .tag-warning {
      color: #e6a23c;
      background: #fdf6ec;
      border-color: #faecd8;
    }

    .tag-success {
      color: #67c23a;
      background: #f0f9eb;
      border-color: #e1f3d8;
    }

    .tag-info {
      color: #409eff;
      background: #ecf5ff;
      border-color: #d9ecff;
    }

    .tag-neutral {
      color: #606266;
      background: #f4f4f5;
      border-color: #e9e9eb;
    }

    .risk-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .risk-critical {
      color: #f56c6c;
      background: #fef0f0;
      border-color: #fde2e2;
    }

    .risk-high {
      color: #e6a23c;
      background: #fdf6ec;
      border-color: #faecd8;
    }

    .risk-medium {
      color: #409eff;
      background: #ecf5ff;
      border-color: #d9ecff;
    }

    .risk-low {
      color: #67c23a;
      background: #f0f9eb;
      border-color: #e1f3d8;
    }

    .drawer-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1250;
    }

    .drawer-mask.show {
      display: block;
    }

    .detail-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 960px;
      max-width: 96vw;
      height: 100vh;
      background: #fff;
      z-index: 1260;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.12);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .detail-drawer.open {
      transform: translateX(0);
    }

    .drawer-fixed {
      flex-shrink: 0;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #ebeef5;
      background: #fff;
    }

    .drawer-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .drawer-title {
      font-size: 17px;
      font-weight: 600;
      color: #303133;
      line-height: 1.35;
    }

    .drawer-subtitle {
      margin-top: 4px;
      color: #909399;
      font-size: 12px;
      line-height: 1.5;
    }

    .drawer-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #909399;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .drawer-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 12px;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fafafa;
    }

    .drawer-meta-item {
      min-width: 0;
      color: #606266;
      font-size: 12px;
      line-height: 1.5;
    }

    .drawer-meta-item strong {
      display: block;
      margin-bottom: 2px;
      color: #909399;
      font-weight: 400;
    }

    .drawer-meta-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .decision-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .decision-summary.single-type {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .decision-item {
      border: 1px solid #ebeef5;
      border-radius: 4px;
      background: #fafafa;
      padding: 10px 12px;
      min-height: 62px;
    }

    .decision-item span {
      display: block;
      color: #909399;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .decision-item strong {
      display: block;
      color: #303133;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== 方向A：叙事式抽屉 ===== */
    .drawer-title-mute {
      color: #909399;
      font-weight: 400;
      font-size: 13px;
    }

    .drawer-hero {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .hero-card {
      border: 1px solid #ebeef5;
      border-radius: 8px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #fafcff, #fff);
    }

    .hero-card.active {
      border-color: #b3d8ff;
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .12);
    }

    .hero-label { font-size: 12px; color: #909399; }

    .hero-value {
      font-size: 28px;
      font-weight: 800;
      color: #1f6feb;
      line-height: 1.2;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .hero-card.order .hero-value { color: #e6820f; }
    .hero-unit { font-size: 13px; font-weight: 600; color: #909399; margin-left: 4px; }
    .hero-sub { margin-top: 6px; font-size: 12px; color: #909399; }

    .drawer-subhead-hint {
      margin-left: 8px;
      font-size: 12px;
      font-weight: 400;
      color: #909399;
    }

    .contrib { display: flex; flex-direction: column; gap: 9px; }
    .contrib-row {
      display: grid;

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function toInt(value, fallback) {
        var n = parseInt(value, 10);
        if (Number.isNaN(n)) return fallback || 0;
        return n;
      }

      function formatNum(value) {
        return Number(value || 0).toLocaleString('zh-CN');
      }

      function todayDate() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate());
      }

      function addDays(date, days) {
        var result = new Date(date.getTime());
        result.setDate(result.getDate() + days);
        return result;
      }

      function padDatePart(value) {
        return value < 10 ? '0' + value : String(value);
      }

      function formatDate(date) {
        return date.getFullYear() + '-' + padDatePart(date.getMonth() + 1) + '-' + padDatePart(date.getDate());
      }

      function arrivalDateText(days) {
        if (days == null || Number.isNaN(Number(days))) return '-';
        return formatDate(addDays(todayDate(), Math.max(0, toInt(days, 0))));
      }

      function cycleDateRangeText(coverageDays) {
        var startDate = todayDate();
        var endDate = addDays(startDate, Math.max(coverageDays - 1, 0));
        return formatDate(startDate) + ' ~ ' + formatDate(endDate);
      }

      function hasSuggestedQty(item) {
        return activeSuggestionQty(item) > 0;
      }

      function activeSuggestionQty(item) {
        return activeSuggestionType === 'order' ? item.orderSuggestedQty : item.shipSuggestedQty;

        return activeSuggestionType === 'order' ? item.orderCycleText : item.shipCycleText;

      function activeCycleHtml(item) {
        var coverageDays = activeCoverageDays(item);
        if (!coverageDays) return '-';
        return '<div class="cycle-cell">' +
          '<span class="cycle-main">' + formatNum(coverageDays) + ' 天</span>' +
          '<span class="cycle-sub">' + cycleDateRangeText(coverageDays) + '</span>' +

      function listCycleText(item) {

        return activeSuggestionType === 'order' ? '采购建议量' : '发货建议量';
      }

      function activeTypeLabel() {
        return activeSuggestionType === 'order' ? '采购' : '发货';
      }

      function activeChildSuggestedQty(child) {
        return activeSuggestionType === 'order' ? child.orderSuggestedQty : child.shipSuggestedQty;
      }

      function activeChildForecastSum(child) {
        return activeSuggestionType === 'order' ? child.orderForecastSum : child.shipForecastSum;
      }

      function activeChildInventoryDeduction(child) {
        return activeSuggestionType === 'order' ? child.orderInventoryDeduction : child.shipInventoryDeduction;
      }

      function activeChildDeduction(child) {
        return activeSuggestionType === 'order' ? child.orderDeduction : child.shipDeduction;

      function inventoryDeductionChips(child) {
        var parts = [
          { label: 'FBA库存', value: child.fbaInventory },
          { label: 'FBA在途', value: child.fbaInbound }
        ];
        if (activeSuggestionType === 'order') {
          parts.push({ label: 'CN仓可用', value: child.cnAvailable });
          parts.push({ label: '已下单未入库', value: child.purchaseInbound });
        }
        return parts.map(function(part) {
          return '<span class="ded-chip">' + part.label + ' ' + formatNum(part.value || 0) + '</span>';
        }).join('');
      }

      function activeChildMethodSplits(child) {
        var splits = child.methodSplits || {};
        var list = activeSuggestionType === 'order' ? splits.order : splits.ship;
        return Array.isArray(list) ? list : [];
      }

      function methodNamesForChild(child) {
        var splits = activeChildMethodSplits(child);
        if (splits.length) {
          return splits.map(function(split) {
            return split.methodName;
          }).filter(Boolean);
        }
        return child.method ? [child.method] : [];
      }

      function activeArrivalDaysForLead(child, leadTimeDays) {
        var lead = toInt(leadTimeDays, 0);
        if (activeSuggestionType === 'order') {
          return toInt(child.procurementDeliveryDays, 0) + lead;
        }
        return lead;
      }

      function activeMethodRowFromSplit(child, split, qty, isSplit) {
        var arrivalDays = split.arrivalDays;
        if (arrivalDays == null && split.leadTimeDays != null) {
          arrivalDays = activeArrivalDaysForLead(child, split.leadTimeDays);
        }
        return {
          methodName: split.methodName || child.method || '-',
          qty: qty,
          split: isSplit,
          arrivalDays: arrivalDays,
          arrivalDate: arrivalDateText(arrivalDays)
        };
      }

      function activeChildMethodRows(child) {
        var splits = activeChildMethodSplits(child);
        var totalQty = activeChildSuggestedQty(child);
        if (!splits.length) {
          var fallbackLead = child.methodLeadDays != null ? child.methodLeadDays : child.logisticsLeadDays;
          var fallbackArrivalDays = activeArrivalDaysForLead(child, fallbackLead);
          return [{
            methodName: child.method || '-',
            qty: totalQty,
            split: false,
            arrivalDays: fallbackArrivalDays,
            arrivalDate: arrivalDateText(fallbackArrivalDays)
          }];
        }
        if (splits.length === 1) {
          return [activeMethodRowFromSplit(child, splits[0], totalQty, false)];
        }
        var allocated = 0;
        return splits.map(function(split, index) {
          var isLast = index === splits.length - 1;
          var qty = isLast ? Math.max(0, totalQty - allocated) : Math.max(0, Math.round(totalQty * (split.ratio || 0)));
          allocated += qty;
          return activeMethodRowFromSplit(child, split, qty, true);
        });
      }

        var rows = activeChildMethodRows(child);

        var riskBand = parentIndex % 4;

        } else if (riskBand === 2) {

          shipSuggestedQty: shipSuggested,
          orderSuggestedQty: orderSuggested,
          shipForecastSum: shipForecastSum,
          orderForecastSum: orderForecastSum,
          shipInventoryDeduction: shipInventoryDeduction,
          orderInventoryDeduction: orderInventoryDeduction,
          shipDeduction: shipDeduction,
          orderDeduction: orderDeduction
        };
        var annualFactor = [0.92, 1.06, 0.95, 1.1, 0.9, 1.04, 0.98, 1.08][sequence % 8];
        var annualResult = makeSourceResult(
          shipForecastSum,
          orderForecastSum,
          shipInventoryDeduction,
          orderInventoryDeduction,
          shipDeduction,
          orderDeduction,
          annualFactor
        );
        return {
          id: parent.code + '-' + childSku + '-' + logistics.methodName,
          childSku: childSku,
          sellerSku: childSku,
          barcode: childBarcode(parentIndex, childIndex),
          size: pos.size,
          color: pos.color,
          asin: childAsin(parent, childIndex),
          parentAsin: parent.asin || '-',
          parentCode: parent.code,
          parentName: parent.spu || parent.code,
          spu: parent.spu || '-',
          platform: parent.platform || 'Amazon',
          groupName: parent.group || ['UA组', 'UB组', 'UC组', ''][parentIndex % 4],
          owner: parent.owner || '-',
          store: parent.store || '-',
          site: displaySite,
          siteGroupName: siteName,
          method: logistics.methodName,
          methodSplits: methodSplits,
          ruleId: rule.id,
          ruleName: rule.name,
          tags: tags,
          tagText: tags.sales + ' / ' + tags.lifecycle.replace('新品（', '新').replace('）', '') + ' / ' + tags.color,
          baseSales: baseSales,
          safetyDays: safetyDays,
          shipSuggestedQty: annualResult.shipSuggestedQty,
          orderSuggestedQty: annualResult.orderSuggestedQty,
          methodLeadDays: logistics.leadTimeDays,
          logisticsLeadDays: shortestLeadTimeDays,
          shipFrequencyDays: shipFrequencyDays,
          procurementDeliveryDays: procurementDelivery,
          procurementCycleDays: procurementCycle,
          purchaseLead: procurement.purchaseLead,
          qualityInspection: procurement.qualityInspection,
          pickupPrep: procurement.pickupPrep,
          purchaseFrequency: procurement.purchaseFrequency,
          shipCoverageDays: shipCoverageDays,
          orderCoverageDays: orderCoverageDays,
          shipForecastSum: annualResult.shipForecastSum,
          orderForecastSum: annualResult.orderForecastSum,
          shipInventoryDeduction: annualResult.shipInventoryDeduction,
          orderInventoryDeduction: annualResult.orderInventoryDeduction,
          shipDeduction: annualResult.shipDeduction,
          orderDeduction: annualResult.orderDeduction,
          fbaInventory: fbaInventory,
          fbaInbound: fbaInbound,
          cnAvailable: cnAvailable,
          purchaseInbound: purchaseInbound,
          sourceResults: {
            annual: annualResult,
            forecast: forecastResult
          }
        };
      }

      function buildSuggestions() {
        var parents = loadParents();
        var rules = loadRules();
        childSuggestions = [];
        parents.forEach(function(parent, parentIndex) {
          for (var i = 0; i < childCountForParent(parentIndex); i += 1) {
            var item = makeChildSuggestion(parent, parentIndex, i, rules);
            if (item) childSuggestions.push(item);
          }
        });
      }

      function uniqueList(list) {
        var seen = {};
        return list.filter(function(item) {
          if (!item || seen[item]) return false;
          seen[item] = true;
          return true;
        }).sort(function(a, b) {
          return String(a).localeCompare(String(b), 'zh-CN');
        });
      }

      function uniqueOrderedList(list) {
        var seen = {};
        return list.filter(function(item) {
          if (!item || seen[item]) return false;
          seen[item] = true;
          return true;
        });
      }

      function methodText(methods) {
        if (!methods.length) return '-';
        return methods.slice(0, 3).join(' / ') + (methods.length > 3 ? ' +' + (methods.length - 3) : '');
      }

      function coverageCycleText(coverageDays, safetyDays) {
        if (!coverageDays || !safetyDays) return '-';
        return '覆盖 ' + coverageDays + ' 天（' + cycleDateRangeText(coverageDays) + '）';
      }

      function fillSelectOptions(selectId, values, keepFirst) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var first = keepFirst && select.options.length ? select.options[0].outerHTML : '';
        select.innerHTML = first;
        values.forEach(function(value) {
          var option = document.createElement('option');
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });
      }

      function populateListFilters() {
        var parents = loadParents();
        fillSelectOptions('filter-platform', uniqueList(parents.map(function(parent) { return parent.platform || 'Amazon'; })), true);
        fillSelectOptions('filter-store', uniqueList(parents.map(function(parent) { return parent.store; })), true);
        fillSelectOptions('filter-site', uniqueList(childSuggestions.map(function(child) { return child.site; })), true);
        fillSelectOptions('filter-owner', uniqueList(childSuggestions.map(function(child) { return child.owner; }).filter(function(owner) {
          return owner && owner !== '-';
        })), true);
      }

      function currentFilters() {
        return {
          genDate: (document.getElementById('filter-gen-date') || {}).value || '',
          keyword: (document.getElementById('filter-keyword').value || '').trim().toLowerCase(),
          platform: (document.getElementById('filter-platform') || {}).value || '',
          store: (document.getElementById('filter-store') || {}).value || '',
          parentAsin: (document.getElementById('filter-parent-asin').value || '').trim().toLowerCase(),
          group: (document.getElementById('filter-group') || {}).value || '',
          site: (document.getElementById('filter-site') || {}).value || '',
          owner: (document.getElementById('filter-owner') || {}).value || ''
        };
      }

      function matchGroupFilter(groupName, filterGroup) {
        if (!filterGroup) return true;
        if (filterGroup === '__EMPTY__') return !groupName;
        return groupName === filterGroup;
      }

      function filterChildren() {
        var f = currentFilters();
        return childSuggestions.filter(function(item) {
          if (f.owner && item.owner !== f.owner) return false;
          if (f.platform && item.platform !== f.platform) return false;
          if (f.store && item.store !== f.store) return false;
          if (!matchGroupFilter(item.groupName, f.group)) return false;
          if (f.site && item.site !== f.site) return false;
          if (f.parentAsin && (item.parentAsin || '').toLowerCase().indexOf(f.parentAsin) === -1) return false;
          if (f.keyword) {
            var hay = [item.childSku, item.parentCode, item.parentAsin, item.spu, item.parentName].join(' ').toLowerCase();
            if (hay.indexOf(f.keyword) === -1) return false;
          }
          return true;
        });
      }

      function filterParentRows(list) {
        var f = currentFilters();
        return list.filter(function(item) {
          if (f.genDate && item.generateDate !== f.genDate) return false;
          if (f.platform && item.platformText.indexOf(f.platform) === -1) return false;
          if (f.store && item.storeText.indexOf(f.store) === -1) return false;
          if (f.group === '__EMPTY__') {
            if ((item.groups || []).some(function(group) { return !!group; })) return false;
          } else if (f.group && item.groupText.indexOf(f.group) === -1) {
            return false;
          }
          if (f.site && item.siteText.indexOf(f.site) === -1) return false;
          if (f.owner && item.ownerText.indexOf(f.owner) === -1) return false;
          if (f.parentAsin && item.parentAsinText.toLowerCase().indexOf(f.parentAsin) === -1) return false;
          if (f.keyword) {
            var hay = [item.parentCode, item.spuText, item.parentAsinText].join(' ').toLowerCase();
            if (hay.indexOf(f.keyword) === -1) return false;
          }
          return true;
        });
      }

      function aggregateParentSuggestions(children) {
        var map = {};
        children.forEach(function(baseChild) {
          sourceKeys().forEach(function(sourceKey) {
            var child = childWithSource(baseChild, sourceKey);
            var rowKey = child.parentCode + '::' + sourceKey;
            if (!map[rowKey]) {
              map[rowKey] = {
                id: rowKey,
                parentCode: child.parentCode,
                parentName: child.parentName,
                sourceKey: sourceKey,
                sourceLabel: child.sourceLabel,
                generateDate: formatDate(todayDate()),
                parentAsins: [],
                spus: [],
                platforms: [],
                stores: [],
                groups: [],
                sites: [],
                owners: [],
                ruleNames: [],
                methods: [],
                childItems: [],
                shipCoverageDays: 0,
                orderCoverageDays: 0,
                safetyDays: 0,
                shipSuggestedQty: 0,
                orderSuggestedQty: 0
              };
            }
            var parent = map[rowKey];
            parent.childItems.push(child);
            parent.shipSuggestedQty += child.shipSuggestedQty;
            parent.orderSuggestedQty += child.orderSuggestedQty;
            parent.parentAsins.push(child.parentAsin);
            parent.spus.push(child.spu);
            parent.platforms.push(child.platform);
            parent.stores.push(child.store);
            parent.groups.push(child.groupName);
            parent.sites.push(child.site);
            parent.owners.push(child.owner);
            parent.ruleNames.push(child.ruleName);
            methodNamesForChild(child).forEach(function(methodName) {
              parent.methods.push(methodName);
            });
            parent.shipCoverageDays = Math.max(parent.shipCoverageDays, child.shipCoverageDays);
            parent.orderCoverageDays = Math.max(parent.orderCoverageDays, child.orderCoverageDays);
            parent.safetyDays = Math.max(parent.safetyDays, child.safetyDays);
          });
        });
        return Object.keys(map).map(function(key) {
          var parent = map[key];
          parent.parentAsins = uniqueList(parent.parentAsins);
          parent.spus = uniqueList(parent.spus);
          parent.platforms = uniqueList(parent.platforms);
          parent.stores = uniqueList(parent.stores);
          parent.groups = uniqueList(parent.groups);
          parent.sites = uniqueList(parent.sites);
          parent.owners = uniqueList(parent.owners);
          parent.ruleNames = uniqueList(parent.ruleNames);
          parent.methods = uniqueOrderedList(parent.methods);
          parent.parentAsinText = parent.parentAsins.join(' / ') || '-';
          parent.spuText = parent.spus.join(' / ') || '-';
          parent.platformText = parent.platforms.join(' / ') || '-';
          parent.storeText = parent.stores.join(' / ') || '-';
          parent.groupText = formatGroupText(parent.groups);
          parent.siteText = parent.sites.join(' / ') || '-';
          parent.ownerText = parent.owners.join(' / ') || '-';
          parent.methodText = methodText(parent.methods);
          parent.ruleText = parent.ruleNames.join(' / ');
          parent.shipCycleText = coverageCycleText(parent.shipCoverageDays, parent.safetyDays);
          parent.orderCycleText = coverageCycleText(parent.orderCoverageDays, parent.safetyDays);
          return parent;
        }).sort(function(a, b) {
          return activeSuggestionQty(b) - activeSuggestionQty(a) ||
            a.parentCode.localeCompare(b.parentCode) ||
            String(a.sourceLabel).localeCompare(String(b.sourceLabel), 'zh-CN');
        });
      }

      function currentParentList() {
        parentSuggestions = filterParentRows(aggregateParentSuggestions(filterChildren()));
        return parentSuggestions;
      }

      function metricCardHtml(label, value, hint) {
        return '<button type="button" class="metric-card" data-metric="all">' +
          '<span class="metric-label">' + escapeHtml(label) + '</span>' +
          '<strong class="metric-value">' + formatNum(value) + '</strong>' +
          '<span class="metric-hint">' + escapeHtml(hint) + '</span>' +
        '</button>';
      }

      function sumBy(items, key) {
        return items.reduce(function(sum, item) { return sum + item[key]; }, 0);
      }

      function renderMetrics(list) {
        var grid = document.getElementById('metric-grid');
        var note = document.getElementById('metric-note');
        if (!grid || !note) return;
        grid.innerHTML = '';
        grid.style.display = 'none';
        note.style.display = 'none';
      }

      function renderSuggestionTabs() {
        document.querySelectorAll('.page-top-tab').forEach(function(tab) {
          var active = tab.getAttribute('data-suggestion-type') === activeSuggestionType;
          tab.classList.toggle('active', active);
          tab.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        document.getElementById('cycle-head').innerHTML = activeCycleLabel();
        document.getElementById('qty-head').textContent = activeQtyLabel();
        var riskHead = document.getElementById('risk-head');
        if (riskHead) {
          riskHead.innerHTML = riskHeaderHtml('风险评级');
          riskHead.style.display = activeSuggestionType === 'ship' ? '' : 'none';
        }
      }

      function generatedDocCount(item) {
        var qty = activeSuggestionQty(item);
        if (qty <= 0) return 0;
        if (activeSuggestionType === 'order') return 1;
        return groupChildrenByMethod(item).length;
      }

      function generatedDocCellHtml(item) {
        var count = generatedDocCount(item);
        if (!count) return '-';
        return '<span class="doc-gen-count">' + count + ' 张</span>';
      }

      function qtyCellHtml(item) {
        var qty = activeSuggestionQty(item);
        if (qty > 0) {
          return '<span class="qty-num">' + formatNum(qty) + '</span>';
        }
        return '<span class="qty-num qty-zero" title="当前库存及在途已覆盖目标周期，本次' +
          activeTypeLabel() + '建议量为 0">0 <span class="qty-zero-mark">ⓘ</span></span>';
      }

      function renderTable() {
        var list = currentParentList();
        renderMetrics(list);
        renderSuggestionTabs();
        var tbody = document.getElementById('suggestion-tbody');
        tbody.innerHTML = '';
        if (!list.length) {
          tbody.innerHTML = '<tr><td class="empty-row" colspan="' + (activeSuggestionType === 'ship' ? 14 : 13) + '">暂无备货建议</td></tr>';
        } else {
          list.forEach(function(item) {
            var tr = document.createElement('tr');
            tr.setAttribute('data-id', item.id);
            tr.className = 'list-row-clickable';
            tr.innerHTML =
              '<td><button type="button" class="parent-code-link" data-id="' + escapeHtml(item.id) + '">' + escapeHtml(item.parentCode) + '</button></td>' +
              '<td>' + escapeHtml(item.spuText || '-') + '</td>' +
              '<td>' + escapeHtml(item.parentAsinText || '-') + '</td>' +
              '<td>' + escapeHtml(item.platformText || '-') + '</td>' +
              '<td>' + escapeHtml(item.siteText || '-') + '</td>' +
              '<td title="' + escapeHtml(item.storeText || '') + '">' + escapeHtml(item.storeText || '-') + '</td>' +
              '<td>' + escapeHtml(item.groupText || '-') + '</td>' +
              '<td>' + escapeHtml(item.ownerText || '-') + '</td>' +
              '<td>' + listCycleText(item) + '</td>' +
              '<td class="num">' + qtyCellHtml(item) + '</td>' +
              (activeSuggestionType === 'ship' ? '<td>' + riskTagHtml(parentShipRisk(item)) + '</td>' : '') +
              '<td>' + generatedDocCellHtml(item) + '</td>' +
              '<td><span class="tag ' + sourceMeta(item.sourceKey).tagClass + '">' + escapeHtml(item.sourceLabel || '-') + '</span></td>' +
              '<td>' + escapeHtml(item.generateDate || '-') + '</td>';
            tbody.appendChild(tr);
          });
        }
      }

      function groupChildrenByMethod(item) {
        var groups = {};
        var order = [];
        item.childItems.forEach(function(child) {
          activeChildMethodRows(child).forEach(function(methodRow) {
            if (methodRow.qty <= 0) return;
            var name = methodRow.methodName || '-';
            if (!groups[name]) {
              groups[name] = { methodName: name, arrivalDate: methodRow.arrivalDate || '-', totalQty: 0, lines: [] };
              order.push(name);
            }
            groups[name].totalQty += methodRow.qty;
            groups[name].lines.push({
              sku: child.childSku,
              sellerSku: child.sellerSku || child.childSku,
              barcode: child.barcode || '-',
              asin: child.asin,
              color: child.color,
              size: child.size,
              tagText: child.tagText,
              safetyDays: child.safetyDays,
              arrivalDate: methodRow.arrivalDate || '-',
              cnAvailable: child.cnAvailable || 0,
              qty: methodRow.qty
            });
          });
        });
        return order.map(function(name) { return groups[name]; })
          .filter(function(group) { return group.lines.length > 0; })
          .sort(function(a, b) { return b.totalQty - a.totalQty; });
      }

      function skuSubText(line) {
        var parts = [];
        if (line.color) parts.push(line.color);
        if (line.size) parts.push(line.size + '码');
        return parts.join(' · ') || (line.asin || '-');
      }

      function methodDetailHtml(item) {
        var groups = groupChildrenByMethod(item);
        if (!groups.length) return '<div class="contrib-empty">暂无发货单据</div>';
        return '<div class="ship-docs-stack">' + groups.map(function(group) {
          var lines = group.lines.sort(function(a, b) { return b.qty - a.qty; });
          var tableHtml = '<table class="detail-table method-sku-table doc-sku-table"><thead><tr>' +
            docTableHeadHtml('发货数量', true) + '</tr></thead><tbody>' + lines.map(function(line) {
              return docLineRowHtml(line, true);
            }).join('') + '</tbody></table>';
          var title = group.methodName + ' · 共 ' + group.lines.length + ' 个 SKU · 合计 ' + formatNum(group.totalQty) + ' 双';
          return docCardHtml(title, scrollableTableWrap(tableHtml), false);
        }).join('') + '</div>';
      }

      function renderDrawerHero(item) {
        var coverageDays = activeCoverageDays(item);
        var subParts = ['目标库存 ' + formatNum(coverageDays) + ' 天', '安全 ' + formatNum(item.safetyDays) + ' 天', '生成 ' + (item.generateDate || '-')];
        document.getElementById('drawer-hero').innerHTML =
          '<div class="hero-card single ' + (activeSuggestionType === 'order' ? 'order' : 'ship') + '">' +
            '<div class="hero-main">' +
              '<div class="hero-label">' + activeTypeLabel() + '建议总量</div>' +
              '<div class="hero-value">' + formatNum(activeSuggestionQty(item)) + '<span class="hero-unit">双</span></div>' +
            '</div>' +
            '<div class="hero-sub">' + escapeHtml(subParts.join(' · ')) + '</div>' +
          '</div>';
      }

      function renderContributionHtml(item) {
        var typeLabel = activeTypeLabel();
        var total = activeSuggestionQty(item) || 0;
        var showRisk = activeSuggestionType === 'ship';
        var rows = item.childItems.map(function(child) {
          return { sku: child.childSku, qty: activeChildSuggestedQty(child), risk: childShipRisk(child) };
        }).filter(function(row) { return row.qty > 0; })
          .sort(function(a, b) { return b.qty - a.qty; });
        var body = rows.map(function(row) {
          var pct = total > 0 ? Math.round(row.qty / total * 100) : 0;
          return '<tr>' +
            '<td><span class="sku-code">' + escapeHtml(row.sku) + '</span></td>' +
            (showRisk ? '<td>' + riskTagHtml(row.risk) + '</td>' : '') +
            '<td class="num strong-num">' + formatNum(row.qty) + '</td>' +
            '<td class="num">' + pct + '%</td>' +
          '</tr>';
        }).join('');
        if (!rows.length) return '<div class="contrib-empty">暂无' + typeLabel + '建议量</div>';
        return scrollableTableWrap(
          '<table class="detail-table contrib-table"><thead><tr><th>SKU</th>' +
          (showRisk ? '<th>' + riskHeaderHtml('SKU风险') + '</th>' : '') +
          '<th class="num">建议总量</th><th class="num">占比</th></tr></thead><tbody>' + body + '</tbody></table>'
        );
      }

      function docTableHeadHtml(qtyColName, withGap) {
        return '<th>SKU</th><th>seller-sku</th><th>条码</th><th class="num">' + escapeHtml(qtyColName) + '</th>' +
          (withGap ? '<th class="num">缺口数量<span class="header-help" tabindex="0" title="缺口数量 = 发货建议量 − 本地仓可用库存" data-tip="缺口数量 = 发货建议量 − 本地仓可用库存">!</span></th>' : '');
      }

      function docLineRowHtml(line, withGap) {
        var gapCell = '';
        if (withGap) {
          var gap = (line.qty || 0) - (line.cnAvailable || 0);
          gapCell = '<td class="num">' + formatNum(gap) + ' 双</td>';
        }
        return '<tr>' +
          '<td><span class="sku-code">' + escapeHtml(line.sku) + '</span></td>' +

          '<td>' + escapeHtml(line.barcode || '-') + '</td>' +
          '<td class="num strong-num">' + formatNum(line.qty || 0) + ' 双</td>' +
          gapCell +
