      function docCardHtml(title, bodyHtml, open) {
        return '<div class="doc-card' + (open ? ' is-open' : '') + '">' +
          '<button type="button" class="doc-card-head">' +
            '<span class="doc-card-title">' + escapeHtml(title) + '</span>' +
            '<span class="doc-card-arrow" aria-hidden="true"></span>' +
          '</button>' +
          '<div class="doc-card-body">' + bodyHtml + '</div>' +
        '</div>';
      }

      function renderShipDocsHtml(item) {
        return methodDetailHtml(item);
      }

      function renderPurchaseDocHtml(item) {
        var lines = item.childItems.map(function(child) {
          return {
            sku: child.childSku,
            sellerSku: child.sellerSku || child.childSku,
            barcode: child.barcode || '-',
            qty: activeChildSuggestedQty(child)
          };
        }).filter(function(line) { return line.qty > 0; })
          .sort(function(a, b) { return b.qty - a.qty; });
        if (!lines.length) return '<div class="contrib-empty">暂无采购单据</div>';
        var total = lines.reduce(function(sum, line) { return sum + line.qty; }, 0);
        var tableHtml = '<table class="detail-table doc-sku-table"><thead><tr>' +
          docTableHeadHtml('采购数量') + '</tr></thead><tbody>' + lines.map(function(line) {
            return docLineRowHtml(line);
          }).join('') + '</tbody></table>';
        return docCardHtml('共 ' + lines.length + ' 个 SKU · 合计 ' + formatNum(total) + ' 双', scrollableTableWrap(tableHtml), true);
      }

      function childTotalInventory(child) {
        return (child.fbaInventory || 0) + (child.fbaInbound || 0) + (child.cnAvailable || 0) + (child.purchaseInbound || 0);
      }

      function calcSummaryMetrics(item) {
        var children = item.childItems || [];
        var avgDaily = children.length
          ? Math.round(children.reduce(function(sum, child) {
            return sum + activeChildForecastSum(child) / Math.max(activeCoverageDays(item), 1);
          }, 0) / children.length)
          : 0;
        var inv = children.reduce(function(sum, child) {
          return sum + activeChildInventoryDeduction(child);
        }, 0);
        return {
          daily: formatNum(avgDaily) + ' 双/天',
          days: formatNum(activeCoverageDays(item)) + ' 天',
          inv: formatNum(inv) + ' 双'
        };
      }

      var CALC_SEG_MAX = 4;

      function calcStepNumber(value) {
        var map = { '①': '1', '②': '2', '③': '3', '④': '4', '⑤': '5' };
        return map[value] || value;
      }

      function calcSegBlock(segNo, title, hint, theadHtml, rowCells, footNoteHtml, tfootHtml, tableClass, open) {
        var body = rowCells.map(function(cells, index) {
          return '<tr' + (index >= CALC_SEG_MAX ? ' class="calc-extra-row" hidden' : '') + '>' + cells + '</tr>';
        }).join('');
        var more = rowCells.length > CALC_SEG_MAX
          ? '<button type="button" class="calc-more-btn" data-action="toggle-calc-rows">展开全部 ' + rowCells.length + ' 个 ▾</button>'
          : '';
        var tableClassName = 'detail-table calc-seg-tbl' + (tableClass ? ' ' + tableClass : '');
        return '<div class="calc-seg' + (open ? ' is-open' : '') + '">' +
          '<button type="button" class="calc-seg-head">' +
            '<span class="seg-no">' + escapeHtml(calcStepNumber(segNo)) + '</span>' +
            '<span class="calc-seg-title">' + escapeHtml(title) + '</span>' +
            '<span class="seg-hint">' + escapeHtml(hint || '') + '</span>' +
            '<span class="calc-seg-arrow" aria-hidden="true"></span>' +
          '</button>' +
          '<div class="calc-seg-body">' +
            '<div class="seg-tbl-wrap"><table class="' + tableClassName + '"><thead>' + theadHtml +
              '</thead><tbody>' + body + '</tbody>' + (tfootHtml || '') + '</table></div>' +
            (footNoteHtml || '') + more +
          '</div>' +
        '</div>';
      }

      function calcCondCell(text) {
        var value = text || '-';
        var needsToggle = value.length > 12;
        return '<td class="cond-td"><div class="cond-cell">' +
          '<span class="cond-text" title="' + escapeHtml(value) + '">' + escapeHtml(value) + '</span>' +
          (needsToggle ? '<button type="button" class="cond-toggle" data-action="toggle-cond">展开</button>' : '') +
        '</div></td>';
      }

      function filteredCalcChildren(item) {
        return item.childItems.filter(function(child) {
          if (drawerCalcFilter.color && child.color !== drawerCalcFilter.color) return false;
          if (drawerCalcFilter.size && child.size !== drawerCalcFilter.size) return false;
          return true;
        });
      }

      function drawerCalcFilterBarHtml(item) {
        var colors = uniqueList(item.childItems.map(function(c) { return c.color; }));
        var sizes = uniqueList(item.childItems.map(function(c) { return c.size; }));
        var colorOpts = '<option value="">全部颜色</option>' + colors.map(function(c) {
          return '<option value="' + escapeHtml(c) + '"' + (drawerCalcFilter.color === c ? ' selected' : '') + '>' + escapeHtml(c) + '</option>';
        }).join('');
        var sizeOpts = '<option value="">全部尺码</option>' + sizes.map(function(s) {
          return '<option value="' + escapeHtml(s) + '"' + (drawerCalcFilter.size === s ? ' selected' : '') + '>' + escapeHtml(s) + '</option>';
        }).join('');
        return '<div class="sku-filter-bar">' +
          '<div class="filter-item"><span class="filter-label">颜色</span><select class="filter-control w-160" id="drawer-calc-color">' + colorOpts + '</select></div>' +
          '<div class="filter-item"><span class="filter-label">尺码</span><select class="filter-control w-120" id="drawer-calc-size">' + sizeOpts + '</select></div>' +
        '</div>';
      }

      function renderCalcProcessHtml(item) {
        var isOrder = activeSuggestionType === 'order';
        var sorted = filteredCalcChildren(item).sort(function(a, b) {
          return activeChildSuggestedQty(b) - activeChildSuggestedQty(a);
        });
        function skuTd(child) {
          var meta = [child.color, child.size].filter(Boolean).join(' · ');
          return '<td><div class="sku-cell"><span class="sku-code">' + escapeHtml(child.childSku) + '</span>' +
            (meta ? '<span class="sku-sub">' + escapeHtml(meta) + '</span>' : '') + '</div></td>';
        }

        // ① 每月销量
        var months = nextMonthsFromToday(12);
        var seg1Head = '<tr><th>SKU</th>' + months.map(function(m) {
          return '<th class="num sales-period-col">' + escapeHtml(m.label) + '</th>';
        }).join('') + '</tr>';
        var seg1Rows = sorted.map(function(child) {
          var monthly = monthlySalesForChild(child.baseSales, months);
          return skuTd(child) + monthly.map(function(v) {
            return '<td class="num sales-period-col">' + formatNum(v) + '</td>';
          }).join('');
        });

        // ② 备货天数（目标库存天数拆解）
        var seg2Head = isOrder
          ? '<tr><th>SKU</th><th class="num">生产周期</th><th class="num">质检</th><th class="num">提货准备</th><th class="num">最长物流</th><th class="num">安全天数</th><th class="num">采购频率</th><th class="num">目标库存天数</th></tr>'
          : '<tr><th>SKU</th><th class="num">最长物流</th><th class="num">安全天数</th><th class="num">发货频率</th><th class="num">目标库存天数</th></tr>';
        var seg2Rows = sorted.map(function(child) {
          var longest = Math.max(0, child.shipCoverageDays - child.safetyDays - child.shipFrequencyDays);
          if (isOrder) {
            return skuTd(child) +
              '<td class="num">' + formatNum(child.purchaseLead) + '</td>' +
              '<td class="num">' + formatNum(child.qualityInspection) + '</td>' +
              '<td class="num">' + formatNum(child.pickupPrep) + '</td>' +
              '<td class="num">' + formatNum(longest) + '</td>' +
              '<td class="num">' + formatNum(child.safetyDays) + '</td>' +
              '<td class="num">' + formatNum(child.purchaseFrequency) + '</td>' +
              '<td class="num strong-num">' + formatNum(child.orderCoverageDays) + ' 天</td>';
          }
          return skuTd(child) +
            '<td class="num">' + formatNum(longest) + '</td>' +
            '<td class="num">' + formatNum(child.safetyDays) + '</td>' +
            '<td class="num">' + formatNum(child.shipFrequencyDays) + '</td>' +
            '<td class="num strong-num">' + formatNum(child.shipCoverageDays) + ' 天</td>';
        });

        // ③ 库存抵扣
        var seg3Head = '<tr><th>SKU</th><th class="num">平台仓</th><th class="num">物流在途</th><th class="num">本地仓</th><th class="num">采购在途</th><th class="num">总库存</th></tr>';
        var seg3Rows = sorted.map(function(child) {
          var totalInv = (child.fbaInventory || 0) + (child.fbaInbound || 0) + (child.cnAvailable || 0) + (child.purchaseInbound || 0);
          return skuTd(child) +
            '<td class="num">' + formatNum(child.fbaInventory || 0) + '</td>' +
            '<td class="num">' + formatNum(child.fbaInbound || 0) + '</td>' +
            '<td class="num">' + formatNum(child.cnAvailable || 0) + '</td>' +
            '<td class="num">' + formatNum(child.purchaseInbound || 0) + '</td>' +
            '<td class="num strong-num">' + formatNum(totalInv) + '</td>';
        });

        var dailyAvg = sorted.length
          ? (sorted.reduce(function(s, c) { return s + (c.baseSales || 0); }, 0) / sorted.length).toFixed(2)
          : '0';
        var coverDays = activeCoverageDays(item);
        var inventoryTotal = sorted.reduce(function(sum, child) {
          return sum + activeChildInventoryDeduction(child);
        }, 0);
        return drawerCalcFilterBarHtml(item) +
          calcSegBlock('①', '每月销量', '日均 ≈ ' + dailyAvg + ' 件/天', seg1Head, seg1Rows, '', '', 'calc-sales-table') +
          calcSegBlock('②', '备货天数', '目标库存天数 ' + (coverDays ? formatNum(coverDays) + ' 天' : '-'), seg2Head, seg2Rows, '', '') +
          calcSegBlock('③', '库存抵扣', formatNum(inventoryTotal) + ' 件', seg3Head, seg3Rows, '', '');
      }

      function activeChildCoverageDays(child) {
        return activeSuggestionType === 'order' ? child.orderCoverageDays : child.shipCoverageDays;
      }

      function childDemandScale(child) {
        var base = Math.max(1, child.baseSales || 1);
        var coverage = Math.max(activeChildCoverageDays(child), 1);
        var rawSum = forecastSum(base, coverage);
        return rawSum > 0 ? activeChildForecastSum(child) / rawSum : 1;
      }

      function childDailyDemand(child, day) {
        var base = Math.max(1, child.baseSales || 1);
        return Math.max(1, forecastAt(base, day) * childDemandScale(child));
      }

      function parentDailyDemand(item, day) {
        return (item.childItems || []).reduce(function(sum, child) {
          return sum + childDailyDemand(child, day);
        }, 0);
      }

      function avgParentDailyDemand(item) {
        var days = 7;
        var total = 0;
        for (var i = 0; i < days; i += 1) {
          total += parentDailyDemand(item, i);
        }
        return Math.max(1, total / days);
      }

      function shortestFreightDays(item) {
        var min = null;
        (item.childItems || []).forEach(function(child) {
          var lead = child.logisticsLeadDays != null ? child.logisticsLeadDays : child.methodLeadDays;
          if (lead == null) return;
          lead = Math.max(0, toInt(lead, 0));
          if (min == null || lead < min) min = lead;
        });
        return min == null ? 0 : min;
      }

      function shortestPurchaseArrivalDays(item) {
        var freightDays = shortestFreightDays(item);
        var min = null;
        (item.childItems || []).forEach(function(child) {
          var days = toInt(child.procurementDeliveryDays, 0) + freightDays;
          if (min == null || days < min) min = days;
        });
        return min == null ? freightDays : min;
      }

      function addTrendEvent(events, day, qty) {
        var safeQty = Math.max(0, Math.round(qty || 0));
        if (!safeQty) return;
        var safeDay = Math.max(0, toInt(day, 0));
        events[safeDay] = (events[safeDay] || 0) + safeQty;
      }

      function buildStockTrendEvents(item) {
        var events = {};
        (item.childItems || []).forEach(function(child) {
          var freightDays = child.logisticsLeadDays != null ? child.logisticsLeadDays : child.methodLeadDays;
          freightDays = Math.max(0, toInt(freightDays, 0));
          addTrendEvent(events, freightDays, child.fbaInbound);
          if (activeSuggestionType === 'order') {
            addTrendEvent(events, freightDays, child.cnAvailable);
            addTrendEvent(events, toInt(child.procurementDeliveryDays, 0) + freightDays, child.purchaseInbound);
          }
          activeChildMethodRows(child).forEach(function(methodRow) {
            addTrendEvent(events, methodRow.arrivalDays, methodRow.qty);
          });
        });
        return events;
      }

      function buildSpuStockTrendData(item) {
        var children = item.childItems || [];
        var events = buildStockTrendEvents(item);
        var maxEventDay = Object.keys(events).reduce(function(max, key) {
          return Math.max(max, toInt(key, 0));
        }, 0);
        var horizon = Math.max(7, activeCoverageDays(item));
        var stock = children.reduce(function(sum, child) {
          return sum + (child.fbaInventory || 0);
        }, 0);
        var labels = [];
        var values = [];
        for (var day = 0; day <= horizon; day += 1) {
          if (events[day]) stock += events[day];
          stock = Math.max(0, stock - parentDailyDemand(item, day));
          labels.push(formatDate(addDays(todayDate(), day)).slice(5));
          values.push(Math.round(stock));
        }
        return {
          labels: labels,
          values: values,
          startQty: children.reduce(function(sum, child) { return sum + (child.fbaInventory || 0); }, 0),
          eventQty: Object.keys(events).reduce(function(sum, key) { return sum + events[key]; }, 0),
          horizon: horizon,
          avgDaily: avgParentDailyDemand(item),
          spu: item.spuText || item.parentCode
        };
      }

      function niceChartMax(value) {
        var safe = Math.max(10, value || 10);
        var base = Math.pow(10, Math.floor(Math.log10(safe)));
        var n = safe / base;
        var nice = n <= 2 ? 2 : (n <= 5 ? 5 : 10);
        return nice * base;
      }

      function renderStockTrendSvg(trend) {
        var width = 760;
        var height = 240;
        var left = 54;
        var right = 18;
        var top = 24;
        var bottom = 34;
        var plotW = width - left - right;
        var plotH = height - top - bottom;
        var maxValue = niceChartMax(Math.max.apply(null, trend.values.concat([trend.startQty, trend.eventQty, 1])));
        var lastIndex = Math.max(1, trend.values.length - 1);
        function xAt(index) {
          return left + plotW * (index / lastIndex);
        }
        function yAt(value) {
          return top + plotH * (1 - Math.max(0, value) / maxValue);
        }
        var grid = [];
        for (var i = 0; i <= 4; i += 1) {
          var value = maxValue * i / 4;
          var y = yAt(value);
          grid.push('<line class="stock-trend-grid" x1="' + left + '" y1="' + y + '" x2="' + (width - right) + '" y2="' + y + '"></line>');
          grid.push('<text class="stock-trend-label" x="' + (left - 8) + '" y="' + (y + 4) + '" text-anchor="end">' + formatNum(Math.round(value)) + '</text>');
        }
        var tickStep = Math.max(1, Math.round(lastIndex / 12));
        var xTicks = [];
        for (var tickDay = 0; tickDay <= lastIndex; tickDay += tickStep) {
          xTicks.push(tickDay);
        }
        if (xTicks[xTicks.length - 1] !== lastIndex) xTicks.push(lastIndex);
        xTicks.forEach(function(index) {
          var x = xAt(index);
          grid.push('<line class="stock-trend-grid" x1="' + x + '" y1="' + top + '" x2="' + x + '" y2="' + (height - bottom) + '"></line>');
          grid.push('<text class="stock-trend-label" x="' + x + '" y="' + (height - 10) + '" text-anchor="middle">' + escapeHtml(trend.labels[index]) + '</text>');
        });
        var points = trend.values.map(function(value, index) {
          return xAt(index) + ',' + yAt(value);
        }).join(' ');
        var areaPath = 'M' + xAt(0) + ',' + (height - bottom) + ' L' +
          trend.values.map(function(value, index) {
            return xAt(index) + ',' + yAt(value);
          }).join(' L') +
          ' L' + xAt(lastIndex) + ',' + (height - bottom) + ' Z';
        return '<svg class="stock-trend-svg" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="库存走势图">' +
          grid.join('') +
          '<line class="stock-trend-axis" x1="' + left + '" y1="' + (height - bottom) + '" x2="' + (width - right) + '" y2="' + (height - bottom) + '"></line>' +
          '<line class="stock-trend-axis" x1="' + left + '" y1="' + top + '" x2="' + left + '" y2="' + (height - bottom) + '"></line>' +
          '<path class="stock-trend-area" d="' + areaPath + '"></path>' +
          '<polyline class="stock-trend-line" points="' + points + '"></polyline>' +
        '</svg>';
      }

      function renderStockTrendChartHtml(item) {
        var trend = buildSpuStockTrendData(item);
        return '<div class="forecast-chart-card drawer-stock-trend-card">' +
          '<div class="forecast-chart-head">' +
            '<div class="forecast-chart-title">库存走势</div>' +
            '<div class="forecast-chart-meta">未来 ' + formatNum(trend.horizon) + ' 天 · 日均约 ' + formatNum(Math.round(trend.avgDaily)) + ' 双</div>' +
          '</div>' +
          '<div class="stock-trend-svg-wrap">' + renderStockTrendSvg(trend) + '</div>' +
        '</div>';
      }

      function buildSpuTimeline(item) {
        var children = item.childItems || [];
        var fba = children.reduce(function(sum, child) { return sum + (child.fbaInventory || 0); }, 0);
        var fbaInbound = children.reduce(function(sum, child) { return sum + (child.fbaInbound || 0); }, 0);
        var local = children.reduce(function(sum, child) { return sum + (child.cnAvailable || 0); }, 0);
        var purchaseInbound = children.reduce(function(sum, child) { return sum + (child.purchaseInbound || 0); }, 0);
        var daily = avgParentDailyDemand(item);
        var freightDays = shortestFreightDays(item);
        var purchaseDays = shortestPurchaseArrivalDays(item);
        var sourceRows = [
          { key: 'fba', label: '平台仓', qty: fba, availableFrom: 0, solidClass: 'solid-green', dashedClass: '' },
          { key: 'fbaInbound', label: '物流在途', qty: fbaInbound, availableFrom: freightDays, solidClass: 'solid-blue', dashedClass: 'dashed-blue' },
          { key: 'local', label: '本地仓', qty: local, availableFrom: freightDays, solidClass: 'solid-yellow', dashedClass: 'dashed-yellow' },
          { key: 'purchaseInbound', label: '采购在途', qty: purchaseInbound, availableFrom: purchaseDays, solidClass: 'solid-yellow', dashedClass: 'dashed-yellow' }
        ];
        var cursor = 0;
        return sourceRows.map(function(row) {
          var sellableDays = Math.max(0, Math.round((row.qty || 0) / daily));
          var start = row.qty > 0 ? Math.max(row.availableFrom, cursor) : row.availableFrom;
          var end = start + sellableDays;
          if (row.qty > 0) cursor = end;
          return {
            key: row.key,
            label: row.label,
            qty: row.qty,
            sellableDays: sellableDays,
            availableFrom: row.availableFrom,
            solidClass: row.solidClass,
            dashedClass: row.dashedClass,
            solidIntervals: sellableDays > 0 ? [{ start: start, end: end }] : [],
            dashedIntervals: row.availableFrom > 0 ? [{ start: 0, end: row.availableFrom }] : []
          };
        });
      }

      function timelinePanelSummary(item) {
        var rows = buildSpuTimeline(item);
        var totalQty = rows.reduce(function(sum, row) { return sum + row.qty; }, 0);
        var totalDays = rows.reduce(function(sum, row) { return sum + row.sellableDays; }, 0);
        return formatNum(totalQty) + ' 双 / 可售 ' + formatNum(totalDays) + ' 天';
      }

      function getWeekStartMonday(date) {
        var d = new Date(date.getTime());
        var day = d.getDay();
        var diff = d.getDate() - day + (day === 0 ? -6 : 1);
        d.setDate(diff);
        return d;
      }

      function buildDistWeeks(count) {
        var weekStart = getWeekStartMonday(todayDate());
        var weeks = [];
        for (var i = 0; i < count; i += 1) {
          var d = addDays(weekStart, i * 7);
          weeks.push({
            weekIndex: i,
            weekLabel: 'W+' + i,
            month: d.getMonth() + 1
          });
        }
        return weeks;
      }

      function distDataFromTimeline(item) {
        var rows = buildSpuTimeline(item);
        var maxDay = rows.reduce(function(max, row) {
          var solidMax = (row.solidIntervals || []).reduce(function(s, seg) { return Math.max(s, seg.end); }, 0);
          var dashedMax = (row.dashedIntervals || []).reduce(function(s, seg) { return Math.max(s, seg.end); }, 0);
          return Math.max(max, solidMax, dashedMax);
        }, activeCoverageDays(item));
        return {
          horizonWeeks: Math.max(8, Math.min(18, Math.ceil((maxDay + 7) / 7))),
          rows: rows
        };
      }

      function renderInvDistHeaderHtml(weeks) {
        var monthGroups = [];
        var currentMonth = null;
        var currentGroup = null;
        weeks.forEach(function(week, index) {
          if (week.month !== currentMonth) {
            if (currentGroup) monthGroups.push(currentGroup);
            currentMonth = week.month;
            currentGroup = { month: week.month, count: 1, startIndex: index };
          } else {
            currentGroup.count += 1;
          }
        });
        if (currentGroup) monthGroups.push(currentGroup);
        var monthRow = '<tr class="inventory-dist-header-month">' + monthGroups.map(function(group) {
          return '<th colspan="' + group.count + '">' + group.month + '月</th>';
        }).join('') + '</tr>';
        var weekRow = '<tr class="inventory-dist-header-week">' + weeks.map(function(week) {
          return '<th>' + escapeHtml(week.weekLabel) + '</th>';
        }).join('') + '</tr>';
        return monthRow + weekRow;
      }

      function renderInvDistRightBodyHtml(distData, weeks) {
        return distData.rows.map(function(rowData) {
          var cells = weeks.map(function(week, index) {
            var weekStartDay = index * 7;
            var blocks = [];
            function pushBlock(cssClass, leftDay, rightDay) {
              var leftDayInWeek = Math.max(leftDay, weekStartDay);
              var rightDayInWeek = Math.min(rightDay, weekStartDay + 7);
              if (!cssClass || rightDayInWeek <= leftDayInWeek) return;
              var leftPct = ((leftDayInWeek - weekStartDay) / 7) * 100;
              var widthPct = ((rightDayInWeek - leftDayInWeek) / 7) * 100;
              blocks.push('<div class="dist-block ' + cssClass + '" style="left:' + leftPct + '%;width:' + widthPct + '%;"></div>');
            }
            (rowData.dashedIntervals || []).forEach(function(seg) {
              pushBlock(rowData.dashedClass, seg.start, seg.end);
            });
            (rowData.solidIntervals || []).forEach(function(seg) {
              pushBlock(rowData.solidClass, seg.start, seg.end);
            });
            return '<td class="dist-cell"><div class="dist-cell-inner">' + blocks.join('') + '</div></td>';
          }).join('');
          return '<tr>' + cells + '</tr>';
        }).join('');
      }

      function renderForecastTimelineHtml(item) {
        var distData = distDataFromTimeline(item);
        var weeks = buildDistWeeks(distData.horizonWeeks);
        var leftBody = distData.rows.map(function(row) {
          return '<tr class="inventory-type-row">' +
            '<td>' + escapeHtml(row.label) + '</td>' +
            '<td>' + formatNum(row.qty) + ' / ' + formatNum(row.sellableDays) + ' 天</td>' +
          '</tr>';
        }).join('');
        return '<div class="forecast-chart-card drawer-inv-dist-card">' +
          '<div class="forecast-chart-title-row">' +
            '<div class="forecast-chart-title">库存销售时段</div>' +
            '<div class="inventory-dist-legend">' +
              '<span class="legend-item"><span class="legend-color" style="background:#52c41a;"></span>平台仓</span>' +
              '<span class="legend-item"><span class="legend-color" style="background:#1890ff;"></span>物流在途</span>' +
              '<span class="legend-item"><span class="legend-color" style="background:#faad14;"></span>本地仓 / 采购在途</span>' +
              '<span class="legend-item"><span class="legend-color legend-dashed" style="border-color:#1890ff;"></span>物流等待</span>' +
              '<span class="legend-item"><span class="legend-color legend-dashed" style="border-color:#faad14;"></span>采购等待</span>' +
            '</div>' +
          '</div>' +
          '<div class="inventory-distribution-container">' +
            '<div class="inventory-dist-left">' +
              '<table class="inventory-dist-table">' +
                '<thead>' +
                  '<tr class="inventory-dist-header-month"><th>库存类型</th><th>总数 / 可售天数</th></tr>' +
                  '<tr class="inventory-dist-header-week"><th></th><th></th></tr>' +
                '</thead>' +
                '<tbody>' + leftBody + '</tbody>' +
              '</table>' +
            '</div>' +
            '<div class="inventory-dist-right">' +
              '<div class="inventory-dist-scroll">' +
                '<table class="inventory-dist-table">' +
                  '<thead>' + renderInvDistHeaderHtml(weeks) + '</thead>' +
                  '<tbody>' + renderInvDistRightBodyHtml(distData, weeks) + '</tbody>' +
                '</table>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      function renderForecastResultHtml(item) {
        return '<div class="forecast-chart-stack">' +
          renderStockTrendChartHtml(item) +
          renderForecastTimelineHtml(item) +
        '</div>';
      }

      function renderDrawerAccordions(item) {
        var typeLabel = activeTypeLabel();
        var isOrder = activeSuggestionType === 'order';
        var qtySummary = formatNum(activeSuggestionQty(item)) + ' 双';
        var docQty = item.childItems.reduce(function(sum, child) { return sum + activeChildSuggestedQty(child); }, 0);
        var docHtml = isOrder ? renderPurchaseDocHtml(item) : renderShipDocsHtml(item);
        var docTitle = isOrder ? '采购单据' : '发货单据';
        var panels = [
          collapsePanelHtml('contrib', typeLabel + '建议构成', qtySummary, renderContributionHtml(item), false),
          collapsePanelHtml('calc', '计算逻辑', calcSummaryMetrics(item).daily, renderCalcProcessHtml(item), false),
          collapsePanelHtml('docs', docTitle, formatNum(docQty) + ' 双', docHtml, true),
          collapsePanelHtml('forecast', '预计结果', timelinePanelSummary(item), renderForecastResultHtml(item), false)
        ];
        document.getElementById('drawer-accordions').innerHTML =
          '<div class="drawer-accordion-stack">' + panels.join('') + '</div>';
      }

      function openDrawer(item) {
        currentSuggestion = item;
        drawerCalcFilter = { color: '', size: '' };
        document.querySelectorAll('#suggestion-tbody tr').forEach(function(row) {
          row.classList.toggle('active', row.getAttribute('data-id') === item.id);
        });
        document.getElementById('drawer-title').innerHTML = '父体 ' + escapeHtml(item.parentCode) +
          ' <span class="drawer-title-mute">· ' + escapeHtml(item.platformText || '-') + ' · ' + escapeHtml(item.storeText || '-') + '</span>';
        document.getElementById('drawer-subtitle').textContent =
          (item.sourceLabel || '-') + ' · 站点 ' + (item.siteText || '-') + ' · ' + (item.groupText || '-') +
          ' · 负责人 ' + (item.ownerText || '-') + ' · 生成日期 ' + (item.generateDate || '-') +
          ' · 父ASIN ' + (item.parentAsinText || '-');
        renderDrawerHero(item);
        renderDrawerAccordions(item);
        document.getElementById('drawer-mask').classList.add('show');
        document.getElementById('detail-drawer').classList.add('open');
        document.getElementById('detail-drawer').setAttribute('aria-hidden', 'false');
        document.getElementById('drawer-body').scrollTop = 0;
      }

      function closeDrawer() {
        document.getElementById('drawer-mask').classList.remove('show');
        document.getElementById('detail-drawer').classList.remove('open');
        document.getElementById('detail-drawer').setAttribute('aria-hidden', 'true');
      }

      function findSuggestion(id) {
        return parentSuggestions.filter(function(item) { return item.id === id; })[0];
      }

      function render() {
        renderTable();
      }

      function setSuggestionType(type) {
        var nextType = type === 'order' ? 'order' : 'ship';
        if (activeSuggestionType === nextType) return;
        activeSuggestionType = nextType;
        render();
        if (currentSuggestion && document.getElementById('detail-drawer').classList.contains('open')) {
          var latest = findSuggestion(currentSuggestion.id);
          if (latest) openDrawer(latest);
        }
      }

      function resetFilters() {
        document.getElementById('filter-keyword').value = '';
        document.getElementById('filter-owner').value = '';
        document.getElementById('filter-platform').value = '';
        document.getElementById('filter-site').value = '';
        document.getElementById('filter-store').value = '';
        document.getElementById('filter-parent-asin').value = '';
        document.getElementById('filter-group').value = '';
        document.getElementById('filter-gen-date').value = formatDate(todayDate());
        render();
      }

      function initFilterGenDate() {
        var el = document.getElementById('filter-gen-date');
        if (el && !el.value) el.value = formatDate(todayDate());
      }

      function showAction(message) {
        alert(message);
      }

      function initSidebarMenu() {
        var appLayout = document.querySelector('.app-layout');
        var backdrop = document.getElementById('sidebar-backdrop');
        var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
        var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
        var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
        var replenishPanel = document.getElementById('replenish-submenu');
        var protoPanel = document.getElementById('proto-submenu');
        var systemPanel = document.getElementById('system-submenu');
        if (!appLayout || !backdrop) return;

        function restorePrimaryCurrent() {
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.add('active');
          });
        }

        function closeAllSubmenus() {
          appLayout.classList.remove('submenu-open');
          [replenishPanel, protoPanel, systemPanel].forEach(function(panel) {
            if (panel) panel.classList.remove('open');
          });
          [replenishTrigger, protoTrigger, systemTrigger].forEach(function(trigger) {
            if (trigger) trigger.classList.remove('active');
          });
          restorePrimaryCurrent();
        }

        function bindToggle(trigger, panel) {
          if (!trigger || !panel) return;
          trigger.addEventListener('click', function(e) {
            e.preventDefault();
            var willOpen = !panel.classList.contains('open');
            closeAllSubmenus();
            if (willOpen) {
              appLayout.classList.add('submenu-open');
              panel.classList.add('open');
              trigger.classList.add('active');
            }
          });
        }

        bindToggle(replenishTrigger, replenishPanel);
        bindToggle(protoTrigger, protoPanel);
        bindToggle(systemTrigger, systemPanel);
        backdrop.addEventListener('click', closeAllSubmenus);
        document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
          a.addEventListener('click', closeAllSubmenus);
        });
        document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
          item.addEventListener('click', function(e) { e.preventDefault(); });
        });
      }

      buildSuggestions();
      populateListFilters();
      initFilterGenDate();
      render();
      initSidebarMenu();

      document.getElementById('btn-search').addEventListener('click', render);
      document.getElementById('btn-reset').addEventListener('click', resetFilters);
      document.querySelectorAll('.page-top-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          setSuggestionType(tab.getAttribute('data-suggestion-type'));
        });
      });
      document.getElementById('suggestion-tbody').addEventListener('click', function(e) {
        var row = e.target.closest('tr[data-id]');
        if (!row) return;
        var item = findSuggestion(row.getAttribute('data-id'));
        if (!item) return;
        openDrawer(item);
      });
      document.getElementById('drawer-body').addEventListener('click', function(e) {
        var collapseHead = e.target.closest('.collapse-head');
        if (collapseHead) {
          var panel = collapseHead.closest('.collapse-panel');
          if (panel) panel.classList.toggle('is-open');
          return;
        }
        var logicHead = e.target.closest('.logic-step-head');
        if (logicHead) {
          var step = logicHead.closest('.logic-step');
          if (step) step.classList.toggle('is-open');
          return;
        }
        var calcSegHead = e.target.closest('.calc-seg-head');
        if (calcSegHead) {
          var calcSeg = calcSegHead.closest('.calc-seg');
          if (calcSeg) calcSeg.classList.toggle('is-open');
          return;
        }
        var docHead = e.target.closest('.doc-card-head');
        if (docHead) {
          var docCard = docHead.closest('.doc-card');
          if (docCard) docCard.classList.toggle('is-open');
          return;
        }
        var calcRowsBtn = e.target.closest('[data-action="toggle-calc-rows"]');
        if (calcRowsBtn) {
          var seg = calcRowsBtn.closest('.calc-seg');
          if (!seg) return;
          var rows = seg.querySelectorAll('.calc-extra-row');
          var opening = Array.prototype.some.call(rows, function(row) { return row.hidden; });
          rows.forEach(function(row) { row.hidden = !opening; });
          calcRowsBtn.textContent = opening ? '收起 ▴' : '展开全部 ' + (rows.length + CALC_SEG_MAX) + ' 个 ▾';
          return;
        }
        var condBtn = e.target.closest('[data-action="toggle-cond"]');
        if (condBtn) {
          var cond = condBtn.closest('.cond-cell');
          if (!cond) return;
          var condExpanded = cond.classList.toggle('expanded');
          condBtn.textContent = condExpanded ? '收起' : '展开';
          return;
        }
        var btn = e.target.closest('[data-action="toggle-rule"]');
        if (!btn) return;
        var cell = btn.closest('.rule-cell');
        if (!cell) return;
        var expanded = cell.classList.toggle('expanded');
        btn.textContent = expanded ? '收起' : '展开';
      });
      document.getElementById('drawer-body').addEventListener('change', function(e) {
        if (e.target.id !== 'drawer-calc-color' && e.target.id !== 'drawer-calc-size') return;
        if (e.target.id === 'drawer-calc-color') drawerCalcFilter.color = e.target.value;
        else drawerCalcFilter.size = e.target.value;
        var calcBody = document.querySelector('#drawer-body [data-panel="calc"] .collapse-body');
        if (calcBody && currentSuggestion) calcBody.innerHTML = renderCalcProcessHtml(currentSuggestion);
      });
      document.getElementById('drawer-mask').addEventListener('click', closeDrawer);
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.querySelectorAll('.drawer-anchor').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var body = document.getElementById('drawer-body');
          var target = document.getElementById(btn.getAttribute('data-anchor'));
          if (!target) return;
          body.scrollTop = target.offsetTop - body.offsetTop - 4;
          document.querySelectorAll('.drawer-anchor').forEach(function(item) {
            item.classList.toggle('active', item === btn);
          });
        });
      });
      document.getElementById('drawer-export').addEventListener('click', function() {
        showAction('导出计算明细入口：' + (currentSuggestion ? currentSuggestion.parentCode : ''));
      });
      ['btn-export-top', 'btn-export-table'].forEach(function(id) {
        var btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('click', function() {
          showAction('导出备货建议入口');
        });
      });
      ['btn-plan-top'].forEach(function(id) {
        var btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('click', function() {
          showAction('生成计划入口');
        });
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeDrawer();
        }
      });
    })();
  </script>
</body>
</html>
