<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #303133;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 88px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: row;
      overflow: visible;
      background: transparent;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.08);
      z-index: 1200;
    }

    .sidebar-primary {
      width: 88px;
      background: linear-gradient(180deg, #2f47a6 0%, #1f2a78 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    .sidebar-brand {
      width: 100%;
      padding: 6px 0 14px;
      text-align: center;
    }

    .sidebar-brand h2 {
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .sidebar-nav {
      width: 100%;
      padding: 4px 0;
    }

    .primary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 58px;
      margin: 6px 10px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 12px;
    }

    .primary-item:hover,
    .primary-item.active {
      background: #0d5bff;
      color: #fff;
    }

    .item-icon {
      font-size: 16px;
      width: auto;
    }

    .item-label {
      line-height: 1;
    }

    .sidebar-submenu-panel {
      position: fixed;
      left: 88px;
      top: 0;
      bottom: 0;
      width: 184px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 18px 14px;
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.24s ease, opacity 0.2s ease;
      z-index: 1202;
      box-shadow: 4px 0 18px rgba(0, 0, 0, 0.07);
    }

    .sidebar-submenu-panel.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .submenu-title {
      font-size: 24px;
      color: #111827;
      margin-bottom: 14px;
    }

    .submenu-item {
      display: block;
      color: #374151;
      text-decoration: none;
      padding: 10px 10px;
      margin-bottom: 6px;
      border-radius: 8px;
      font-size: 14px;
    }

    .submenu-item:hover {
      background: #f3f4f6;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1190;
    }

    .app-layout.submenu-open .sidebar-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .main-content {
      flex: 1;
      min-height: 100vh;
      margin-left: 88px;
      background: #fff;
    }

    .home-cache-card {
      margin: 24px;
      max-width: 520px;
      padding: 20px 22px;
      background: #fff;
      border: 1px solid #ebeef5;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .home-cache-card h1 {
      font-size: 16px;
      font-weight: 600;
      color: #303133;
      margin-bottom: 8px;
    }

    .home-cache-card p {
      font-size: 13px;
      color: #909399;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .home-cache-btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      font-size: 13px;
      color: #606266;
      background: #fff;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      cursor: pointer;
    }

    .home-cache-btn:hover {
      color: #f56c6c;
      border-color: #fbc4c4;
      background: #fef0f0;
    }

    @media (max-width: 768px) {
      .sidebar-submenu-panel,
      .sidebar-backdrop {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-primary">
        <div class="sidebar-brand">
          <h2><span class="brand-icon">📦</span><span>OMS</span></h2>
        </div>
        <nav class="sidebar-nav">
          <a class="primary-item active" href="./index.html" data-primary-current="true"><span class="item-icon">🏠</span><span class="item-label">首页</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">数据决策</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">运营工具</span></a>
          <a class="primary-item" href="#"><span class="item-icon">⚙️</span><span class="item-label">目标</span></a>
          <a class="primary-item" href="#" data-submenu="replenish"><span class="item-icon">⚙️</span><span class="item-label">补货</span></a>
          <a class="primary-item" href="#" data-submenu="system"><span class="item-icon">⚙️</span><span class="item-label">系统配置</span></a>
          <a class="primary-item" href="#" data-submenu="proto"><span class="item-icon">⚙️</span><span class="item-label">初始原型</span></a>
        </nav>
      </div>
      <div class="sidebar-submenu-panel" id="replenish-submenu">
        <a class="submenu-item" href="./补货列表.html">补货列表</a>
      </div>
      <div class="sidebar-submenu-panel" id="system-submenu">
        <div class="submenu-title">系统配置</div>
        <a class="submenu-item" href="./销量预测规则.html">销量预测规则</a>
      </div>
      <div class="sidebar-submenu-panel" id="proto-submenu">
        <div class="submenu-title">初始原型</div>
        <a class="submenu-item" href="./预测规则配置页面_v1.html">备货规则</a>
        <a class="submenu-item" href="./预警页面_v1.html">预警模型</a>
        <a class="submenu-item" href="./预警消息页面_v1.html">预警消息</a>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <main class="main-content">
      <div class="home-cache-card">
        <h1>原型调试</h1>
        <p>一键清除本原型在浏览器中保存的 localStorage（父体列表、销量预测规则、预警规则等），刷新后恢复默认种子数据。</p>
        <button type="button" class="home-cache-btn" id="home-btn-clear-cache">清除本地缓存</button>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var PROTOTYPE_LS_KEYS = [
        'sf_replenish_parent_list_v1',
        'sf_sales_forecast_rules_v1',
        'alertRules',
        'alertRuleIdCounter'
      ];
      var btn = document.getElementById('home-btn-clear-cache');
      if (!btn) return;
      btn.addEventListener('click', function () {
        if (
          !confirm(
            '确定清除浏览器本地缓存？\n将移除父体列表、销量预测规则、预警规则等原型数据，页面会刷新。'
          )
        ) {
          return;
        }
        PROTOTYPE_LS_KEYS.forEach(function (k) {
          try {
            localStorage.removeItem(k);
          } catch (e) {}
        });
        location.reload();
      });
    })();

    function initSidebarMenu() {
      var appLayout = document.querySelector('.app-layout');
      var backdrop = document.getElementById('sidebar-backdrop');
      var replenishTrigger = document.querySelector('.primary-item[data-submenu="replenish"]');
      var protoTrigger = document.querySelector('.primary-item[data-submenu="proto"]');
      var systemTrigger = document.querySelector('.primary-item[data-submenu="system"]');
      var replenishPanel = document.getElementById('replenish-submenu');
      var protoPanel = document.getElementById('proto-submenu');
      var systemPanel = document.getElementById('system-submenu');
      if (!appLayout || !backdrop) return;

      function restorePrimaryCurrent() {
        document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
          el.classList.add('active');
        });
      }

      function closeAllSubmenus() {
        appLayout.classList.remove('submenu-open');
        if (replenishPanel) replenishPanel.classList.remove('open');
        if (protoPanel) protoPanel.classList.remove('open');
        if (systemPanel) systemPanel.classList.remove('open');
        if (replenishTrigger) replenishTrigger.classList.remove('active');
        if (protoTrigger) protoTrigger.classList.remove('active');
        if (systemTrigger) systemTrigger.classList.remove('active');
        restorePrimaryCurrent();
      }

      function bindToggle(trigger, panel) {
        if (!trigger || !panel) return;
        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          var isOpen = panel.classList.contains('open');
          if (isOpen) {
            closeAllSubmenus();
            return;
          }
          appLayout.classList.remove('submenu-open');
          if (replenishPanel) replenishPanel.classList.remove('open');
          if (protoPanel) protoPanel.classList.remove('open');
          if (systemPanel) systemPanel.classList.remove('open');
          if (replenishTrigger) replenishTrigger.classList.remove('active');
          if (protoTrigger) protoTrigger.classList.remove('active');
          if (systemTrigger) systemTrigger.classList.remove('active');
          document.querySelectorAll('.primary-item[data-primary-current]').forEach(function(el) {
            el.classList.remove('active');
          });
          appLayout.classList.add('submenu-open');
          panel.classList.add('open');
          trigger.classList.add('active');
        });
      }

      bindToggle(replenishTrigger, replenishPanel);
      bindToggle(protoTrigger, protoPanel);
      bindToggle(systemTrigger, systemPanel);

      backdrop.addEventListener('click', closeAllSubmenus);

      document.querySelectorAll('.sidebar-submenu-panel a.submenu-item').forEach(function(a) {
        a.addEventListener('click', closeAllSubmenus);
      });

      document.querySelectorAll('.primary-item[href="#"]:not([data-submenu])').forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.preventDefault();
        });
      });
    }

    initSidebarMenu();
  </script>
</body>
</html>
